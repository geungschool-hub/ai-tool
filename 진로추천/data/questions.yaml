# =============================================================
#  questions.yaml — 진단 질문 스크립트 (8문항, ①~⑧ 순서)
# -------------------------------------------------------------
#  · 옵션이 방출하는 tags 의 '키워드'는 majors.yaml 의 track.keywords 와
#    같은 단어집을 써야 매칭됨(두 파일을 잇는 계약).
#  · type: single(택1) / multi(여러개, select 개수 지정) / free(자유응답)
#  · 어려운 입시 용어 금지. 한 번에 한 질문씩.
#  · 환경/건강/경제 등 세부 관심사는 q4(자유응답) keyword_map 으로 가른다.
# =============================================================

meta:
  tone_default: soft_formal     # 부드러운 존댓말 (casual 로 바꾸면 친근 반말)
  intro: "몇 가지만 물어볼게요. 정답은 없으니 끌리는 대로 골라주면 돼요. (5~10분)"

questions:
  # ① 좋아하는 활동
  - id: q1_activity
    order: 1
    type: single
    prompt: "이런 활동 중에 제일 끌리는 건 뭐예요?"
    options:
      - { label: "자연·생물 관찰하기",              tags: [자연관찰, 생물] }
      - { label: "직접 실험하고 만들기",             tags: [실험, 만들기] }
      - { label: "기계·기기를 조립하거나 고치기",     tags: [만들기, 기계, 공학] }
      - { label: "컴퓨터·코딩으로 무언가 만들기",     tags: [컴퓨터, 데이터, 만들기] }
      - { label: "데이터·숫자 분석하기",             tags: [데이터, 수학] }
      - { label: "글쓰기·생각 정리하기",             tags: [글쓰기] }
      - { label: "사람 돕고 가르치기",               tags: [사람돕기, 사람응대, 교육] }
      - { label: "그림·디자인으로 표현하기",          tags: [디자인, 예체능, 만들기] }
      - { label: "운동하고 몸 움직이기",             tags: [스포츠, 예체능] }

  # ② 강한 과목 2개
  - id: q2_strong_subject
    order: 2
    type: multi
    select: 2
    prompt: "자신 있는 과목을 딱 두 개만 골라줄래요?"
    options:
      - { label: "국어",   tags: [국어, 글쓰기] }
      - { label: "영어",   tags: [영어] }
      - { label: "수학",   tags: [수학] }
      - { label: "과학",   tags: [과학] }
      - { label: "사회",   tags: [사회] }
      - { label: "예체능", tags: [예체능] }

  # ③ 약한/싫은 과목 → 감점 신호
  - id: q3_weak_subject
    order: 3
    type: single
    prompt: "반대로, 좀 피하고 싶은 과목이 있다면요?"
    options:
      - { label: "수학",          tags: [수학] }
      - { label: "과학",          tags: [과학] }
      - { label: "국어",          tags: [국어] }
      - { label: "영어",          tags: [영어] }
      - { label: "사회",          tags: [사회] }
      - { label: "딱히 없어요",    tags: [] }

  # ④ 관심 사회 이슈 (자유 응답) — 세부 관심사를 키워드로 추출
  - id: q4_issue
    order: 4
    type: free
    prompt: "요즘 관심 가는 사회 문제나 이슈가 있다면 한 문장으로 적어줄래요? (없으면 그냥 엔터)"
    # 자유응답에서 아래 단어가 보이면 해당 키워드를 가점. 매칭 안 돼도 무해.
    keyword_map:
      # 환경 계열
      환경:    [환경]
      생태:    [생태, 환경]
      기후:    [기후, 환경]
      온난화:  [기후, 환경]
      미세먼지: [환경, 건강]
      쓰레기:  [환경, 공학]
      폐기물:  [환경, 공학]
      재활용:  [환경, 공학]
      에너지:  [공학, 환경]
      # 도시
      도시:    [도시]
      교통:    [도시]
      주거:    [도시, 사회]
      부동산:  [도시, 경제]
      # 건강·의료
      건강:    [건강]
      질병:    [건강, 생물]
      감염병:  [건강, 생물]
      의료:    [건강, 사람돕기]
      간호:    [건강, 사람돕기]
      약:      [건강]
      # 경제·사회
      경제:    [경제, 사회]
      금융:    [경제]
      취업:    [경제, 사회]
      불평등:  [사회, 복지]
      복지:    [복지, 사람돕기]
      범죄:    [심리, 사회, 법]
      심리:    [심리, 사람돕기]
      # 법
      법:      [법, 사회]
      법률:    [법, 사회]
      변호사:  [법]
      판사:    [법]
      검사:    [법]
      소송:    [법]
      인권:    [법, 사회]
      # 교육
      교육:    [교육, 사람돕기]
      교사:    [교육, 사람돕기]
      선생님:  [교육, 사람돕기]
      학교:    [교육, 사람돕기]
      입시:    [교육, 사회]
      # 예체능(디자인·미술 / 체육·스포츠)
      디자인:  [디자인, 예체능]
      미술:    [디자인, 예체능]
      그림:    [디자인, 예체능]
      예술:    [예체능]
      스포츠:  [스포츠, 예체능]
      운동:    [스포츠, 건강]
      체육:    [스포츠, 교육]
      # 기술
      인공지능: [컴퓨터, 공학]
      에이아이: [컴퓨터, 공학]
      로봇:    [기계, 공학]
      컴퓨터:  [컴퓨터]
      # 국제·미디어
      국제:    [국제, 사회]
      외교:    [국제, 사회]
      전쟁:    [국제, 사회]
      난민:    [국제, 복지]
      언론:    [미디어, 사회]
      미디어:  [미디어]
      뉴스:    [미디어, 사회]

  # ⑤ 졸업 후 선호 진로 형태
  - id: q5_career_type
    order: 5
    type: single
    prompt: "졸업하면 어떤 형태로 일하고 싶어요?"
    options:
      - { label: "기업에 취업",              tags: [취업형] }
      - { label: "연구·대학원",              tags: [연구형] }
      - { label: "창업",                     tags: [창업형] }
      - { label: "공무원·공공기관",          tags: [공공형] }
      - { label: "아직 잘 모르겠어요",        tags: [] }

  # ⑥ 선호 근무·생활 환경
  - id: q6_environment
    order: 6
    type: single
    prompt: "일할 때 어떤 환경이 더 편할 것 같아요?"
    options:
      - { label: "사무실에서 차분하게",       tags: [실내사무] }
      - { label: "현장·야외를 누비며",        tags: [현장야외, 야외] }
      - { label: "실험실에서 분석하며",       tags: [실험실] }
      - { label: "사람을 직접 응대하며",      tags: [사람응대, 사람돕기] }

  # ⑦ 지역 선호 (가점·타이브레이크용, 강한 필터 아님)
  - id: q7_region
    order: 7
    type: single
    prompt: "대학 지역은 어디가 좋아요?"
    options:
      - { label: "수도권",        value: 수도권 }
      - { label: "지방 거점도시",  value: 지방거점 }
      - { label: "상관없어요",     value: 무관 }

  # ⑧ 현재 내신 등급대 (5등급제) → 추천 대학 티어 결정
  - id: q8_grade
    order: 8
    type: single
    prompt: "지금 내신은 대략 어느 정도예요? (몰라도 괜찮아요)"
    options:
      - { label: "1~2등급",        value: top }
      - { label: "3등급",          value: mid_high }
      - { label: "4~5등급",        value: mid }
      - { label: "잘 모르겠어요",   value: 모름 }
