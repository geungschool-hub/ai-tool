  # ═══════════════════ 예체능 계열 ═══════════════════
  - id: art_design
    name: 디자인·미술
    college: 미술대학 / 조형대학 / 예술대학
    one_liner: 그림·디자인으로 생각을 시각화하는 분야. 그리기·만들기와 창의적 표현을 좋아하면 잘 맞아요.
    keywords: [예체능, 디자인, 만들기, 미디어, 창업형]
    majors: [시각디자인과, 산업디자인과, 회화과, 공예과, 조소과]
    universities:
      top:
        - { name: 서울대학교, college: 미술대학, major: 디자인과 }
        - { name: 홍익대학교, college: 미술대학, major: 시각디자인과·산업디자인과 }
      mid_high:
        - { name: 국민대학교, college: 조형대학, major: 시각디자인학과·공업디자인학과 }
        - { name: 서울과학기술대학교, college: 조형대학, major: 디자인학과(시각·산업) }
      mid:
        - { name: 경북대학교, college: 예술대학, major: 디자인학과·미술학과 }
        - { name: 부산대학교, college: 예술대학, major: 디자인학과 }
    careers:
      - 디자이너(시각·UX·제품·패션)
      - 미술작가·일러스트레이터
      - 미술교사(교직 이수 시)
      - 광고·콘텐츠·브랜딩
    notes: >
      ⚠ 디자인·미술은 대부분 실기(그림·포트폴리오) 전형 비중이 큼 → 내신 등급만으로 입결을 가늠하기 어려움.
      위 티어는 일반전형 기준 참고치이며, 실기 위주 전형은 평가 기준이 다름.
      단과대 이름이 대학마다 미술대학(서울대·홍익대)/조형대학(국민대·서울과기대)/예술대학(경북대·부산대)/
      디자인대학 등으로 제각각. 홍익대 미대는 실기 없는 비실기(학생부) 전형도 운영(연도별 확인).
