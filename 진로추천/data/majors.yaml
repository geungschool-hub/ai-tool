# =============================================================
#  majors.yaml — 계열·학과·대학 매핑 데이터 (MVP: 환경 계열)
# -------------------------------------------------------------
#  · 코드와 분리된 순수 데이터. 학과·대학 추가/수정은 이 파일만 고치면 됨.
#  · 모든 대학·학과명은 2026-06 기준 실제 대학 페이지에서 검증함(source 참고).
#  · 없는 학과·대학을 임의로 만들지 말 것(hallucination 금지).
#    검증 못 한 항목은 name 에 "확인 필요" 로 표기.
#  · keywords = questions.yaml 옵션이 방출하는 태그와 같은 단어집(두 파일을 잇는 계약).
# =============================================================

meta:
  version: "0.3"
  scope: "환경 5 + 공학 4 + 의생명 4 + 인문사회 5 + 법학 1 + 교육 2 + 예체능 2 = 총 23트랙. 전부 실제 대학 페이지 검증."
  # q8 내신 등급대 → universities 의 어느 칸을 보여줄지 결정
  grade_bands: [top, mid_high, mid, 모름]
  region_options: [수도권, 지방거점, 무관]
  # 티어 라벨의 의미(상담용 안내 문구)
  tier_labels:
    top: "상위권"
    mid_high: "중상위권"
    mid: "중위권"

tracks:
  # ───────────────────────────────────────────────────────────
  - id: env_eco_restore
    name: 환경생태·복원
    college: 농생대 / 자연대
    one_liner: 생태계 보전·복원과 산림·자연자원 관리에 초점. 관찰력과 야외 활동을 좋아하면 잘 맞아요.
    keywords: [자연관찰, 생물, 야외, 생태, 복원, 과학, 연구형, 현장야외, 환경]
    majors:
      - 환경생태공학부
      - 산림과학부
      - 산림환경자원학과
      - 산림자원학과
    universities:
      top:
        - { name: 고려대학교, college: 생명과학대학, major: 환경생태공학부 }
        - { name: 서울대학교, college: 농업생명과학대학, major: 산림과학부 }
      mid_high:
        - { name: 경북대학교, college: 농업생명과학대학, major: 산림과학·조경학부 }
        - { name: 충남대학교, college: 농업생명과학대학, major: 산림환경자원학과 }
      mid:
        - { name: 강원대학교, college: 산림환경과학대학, major: 산림자원학과 }
        - { name: 충북대학교, college: 농업생명환경대학, major: 산림학과 }
    careers:
      - 생태복원·환경영향평가 기업
      - 국립공원공단·산림청 등 공공기관
      - 환경부·지자체 환경직 공무원
      - 대학원 진학(생태·산림 연구)
    notes: >
      고려대 환경생태공학부는 '공대'가 아니라 생명과학대학 소속(복원 분야에 가장 부합).
      강원대는 과거 '산림과학부' 통합에서 현재 개별 학과 체제로 개편됨 — 모집단위 재확인 권장.
      충북대 소속 단과대는 일반적인 '농업생명과학대학'이 아니라 '농업생명환경대학'.
    source:
      - "고려대 환경생태공학부 https://lifesci.korea.ac.kr/lifesci/faculty/faculty4.do"
      - "서울대 산림과학부 https://cals.snu.ac.kr/academics/undergraduate?deptidx=27"
      - "경북대 산림과학·조경학부 https://land.knu.ac.kr/"
      - "충남대 산림환경자원학과 https://forestry.cnu.ac.kr/ , https://cals.cnu.ac.kr/cals/major/major03.do"
      - "강원대 산림환경과학대학 https://forest.kangwon.ac.kr/forest/department/intro.do"
      - "충북대 산림학과 https://forestscience.cbnu.ac.kr/"

  # ───────────────────────────────────────────────────────────
  - id: env_engineering
    name: 환경공학
    college: 공대
    one_liner: 수질·대기·폐기물 처리 등 환경 문제를 공학적으로 해결. 수학·화학과 실험·설계를 좋아하면 잘 맞아요.
    keywords: [수학, 화학, 과학, 실험, 만들기, 공학, 취업형, 실험실, 현장야외, 환경]
    majors:
      - 환경공학과
      - 건설환경공학과
      - 환경에너지공학과
    universities:
      top:
        - { name: 서울대학교, college: 공과대학, major: 건설환경공학부 }
        - { name: 한양대학교, college: 공과대학, major: 건설환경공학과 }
      mid_high:
        - { name: 부산대학교, college: 공과대학, major: 환경공학과 }
        - { name: 경북대학교, college: 공과대학, major: 환경공학과 }
        - { name: 충남대학교, college: 공과대학, major: 환경공학과 }
      mid:
        - { name: 전남대학교, college: 공과대학, major: 환경에너지공학과 }
    careers:
      - 환경 엔지니어·환경기사
      - 환경컨설팅·환경설비 기업
      - K-water·환경공단 등 공공기관
      - 대기업 EHS(환경안전) 부서
    notes: >
      서울대는 학과 홈 표기 '건설환경공학부'와 공과대학 공식 '건설환경도시공학부'가 혼용 — 토목·도시 포함, 환경공학은 세부영역.
      고려대(서울)에는 독립 환경공학과가 없고 '건축사회환경공학부' 내 환경 트랙으로 존재.
      서울과기대 환경공학과는 '공과대학'이 아니라 '에너지바이오대학' 소속이라 본 트랙 기준에서 제외함.
    source:
      - "서울대 건설환경공학부 https://cee.snu.ac.kr/ , https://eng.snu.ac.kr/"
      - "한양대 건설환경공학과 http://civil.hanyang.ac.kr/"
      - "부산대 환경공학과 https://pnuenv.pusan.ac.kr/"
      - "경북대 환경공학과 https://env.knu.ac.kr/"
      - "충남대 환경공학과 https://envi.cnu.ac.kr/"
      - "전남대 환경에너지공학과 https://eng.jnu.ac.kr/"

  # ───────────────────────────────────────────────────────────
  - id: env_atmos_climate
    name: 대기·기후과학
    college: 자연대
    one_liner: 대기·기후·지구환경을 과학적으로 연구. 과학·수학과 데이터 분석을 좋아하면 잘 맞아요.
    keywords: [과학, 수학, 자연관찰, 데이터, 연구형, 실내사무, 실험실, 기후, 환경]
    majors:
      - 대기과학과
      - 대기환경과학과
      - 지구환경과학부
    universities:
      top:
        - { name: 서울대학교, college: 자연과학대학, major: 지구환경과학부 }
        - { name: 연세대학교, college: 이과대학, major: 대기과학과 }
      mid_high:
        - { name: 부산대학교, college: 자연과학대학, major: 대기환경과학과 }
        - { name: 경북대학교, college: 자연과학대학, major: 지구시스템과학부 천문대기과학전공 }
      mid:
        - { name: 국립공주대학교, college: 자연과학대학, major: 대기과학과 }
        - { name: 국립강릉원주대학교, college: 자연과학대학, major: 대기환경과학과 }
    careers:
      - 기상청·기상직 공무원
      - 기후·대기환경 연구원(연구소·대학원)
      - 환경·에너지 기업 데이터 분석
      - 재난·환경 컨설팅
    notes: >
      대기과학 계열은 전국 개설 대학이 7곳 안팎으로 적음 — 위 6곳이 주요 학과 대부분.
      서울대는 단독 '대기과학과'가 아니라 '지구환경과학부' 내 대기과학전공.
      연세대 소속 단과대 명칭은 '이과대학'(타 대학의 자연과학대학에 해당하는 연세대 공식 명칭).
      경북대는 '지구시스템과학부 천문대기과학전공'으로 통합 편제(입시 모집도 학부 단위).
    source:
      - "서울대 지구환경과학부 https://sees.snu.ac.kr/"
      - "연세대 대기과학과 https://atmos.yonsei.ac.kr/"
      - "부산대 대기환경과학과 https://atmos.pusan.ac.kr/"
      - "경북대 지구시스템과학부 https://hanl.knu.ac.kr/"
      - "공주대 대기과학과 https://atmos.kongju.ac.kr/"
      - "강릉원주대 대기환경과학과 https://atmos.gwnu.ac.kr/"

  # ───────────────────────────────────────────────────────────
  - id: env_urban_policy
    name: 환경·도시정책
    college: 사회대 / 도시과학대
    one_liner: 환경·도시 문제를 정책·행정·사회과학으로 다룸. 글쓰기·사람 돕기와 공공 분야를 좋아하면 잘 맞아요.
    keywords: [사회, 글쓰기, 사람돕기, 공공형, 실내사무, 사람응대, 도시, 환경, 복지]
    majors:
      - 도시행정학과
      - 도시사회학과
      - 지리학과
      - 도시계획·부동산학과
    universities:
      top:
        - { name: 서울시립대학교, college: 도시과학대학(인문사회계열), major: 도시행정학과 }
        - { name: 서울대학교, college: 사회과학대학, major: 지리학과 }
      mid_high:
        - { name: 서울시립대학교, college: 도시과학대학(인문사회계열), major: 도시사회학과 }
        - { name: 중앙대학교, college: 사회과학대학, major: 도시계획·부동산학과 }
      mid:
        - { name: 단국대학교, college: 사회과학대학, major: 도시계획·부동산학부 }
    careers:
      - 환경직·행정직 공무원
      - 도시·환경 정책 연구원
      - 공공기관(지자체·환경/국토 관련)
      - 환경대학원 진학 후 정책 전문가
    notes: >
      ⚠ '환경정책/환경행정' 독립 학부는 한국 4년제에 사실상 없음(대부분 대학원 과정).
      사회과학적 환경 진로의 실제 통로는 도시·행정·지리 계열 — 그래서 트랙명을 '환경·도시정책'으로 현실화함.
      서울시립대 도시행정/도시사회학과는 '사회과학대'가 아니라 '도시과학대학'(인문사회+자연 혼합) 소속.
      학부는 도시·행정·지리로 진학 후 환경대학원(예: 서울대 환경대학원)으로 심화하는 경로가 현실적.
    source:
      - "서울시립대 도시행정학과 https://www.uos.ac.kr/urbansciences/urbanadmin/main.do"
      - "서울시립대 도시사회학과 https://www.uos.ac.kr/urbansciences/usocio/"
      - "서울대 지리학과(사회과학대) https://geog.snu.ac.kr/"
      - "중앙대 도시계획·부동산학과(사회과학대) https://society.cau.ac.kr/class/sub07.asp"
      - "단국대 사회과학대 학과목록 https://www.dankook.ac.kr/web/sosci/"

  # ───────────────────────────────────────────────────────────
  - id: env_health
    name: 환경보건
    college: 보건/의생명
    one_liner: 환경이 사람 건강에 미치는 영향과 보건·위생을 다룸. 생물·실험과 사람 돕기를 좋아하면 잘 맞아요.
    keywords: [생물, 과학, 실험, 사람돕기, 사람응대, 실험실, 건강, 환경, 공공형]
    majors:
      - 환경보건학과
      - 보건환경융합과학부
      - 산업보건학전공
    universities:
      top:
        # ⚠ 상위권 자연대 학부 단위가 희소함(서울대는 보건대학원만 운영, 학부 없음).
        - { name: 고려대학교, college: 보건과학대학, major: 보건환경융합과학부(환경보건안전 트랙) }
      mid_high:
        - { name: 순천향대학교, college: 자연과학대학, major: 환경보건학과 }
        - { name: 대구가톨릭대학교, college: 바이오메디대학, major: 산업보건학전공 }
      mid:
        # 검증된 추가 학과를 찾지 못함 — 임의 생성하지 않고 비워둠(확장 시 보강).
        - { name: 확인 필요, college: 확인 필요, major: 확인 필요 }
    careers:
      - 환경보건 공무원(보건직)
      - 산업위생관리·보건안전 관리자
      - 국립환경과학원 등 공공기관
      - 환경·보건 연구원(대학원 진학)
    notes: >
      환경보건 학부는 개설 대학이 희소함(검증된 곳 3곳). 채우려 임의 학과를 만들지 않음.
      서울대 환경보건학과는 '보건대학원' 석·박사 과정으로 학부과정 없음.
      연세대 보건과학대학 '환경공학부'는 순수 환경공학이라 본 트랙(환경보건)에서는 제외.
      '환경이 건강에 미치는 영향'에 가장 정확히 맞는 단일 학부는 순천향대 환경보건학과.
    source:
      - "고려대 보건환경융합과학부 https://hes.korea.ac.kr/ , https://chs.korea.ac.kr/undergraduate/hes.html"
      - "순천향대 환경보건학과 https://home.sch.ac.kr/ehs/index.jsp"
      - "대구가톨릭대 산업보건학전공 https://academics.cu.ac.kr/occuhealth/"
      - "(서울대 환경보건학과=대학원) https://health.snu.ac.kr/"

  # ═══════════════════ 공학 계열 ═══════════════════
  - id: mech_robot
    name: 기계·로봇공학
    college: 공대
    one_liner: 기계·로봇·자동차 등을 설계하고 만드는 분야. 손으로 만들기와 수학·물리를 좋아하면 잘 맞아요.
    keywords: [만들기, 기계, 공학, 수학, 과학, 취업형, 실험실, 현장야외]
    majors: [기계공학부, 기계공학과, 기계로봇에너지공학과, 로봇공학과]
    universities:
      top:
        - { name: 서울대학교, college: 공과대학, major: 기계공학부 }
        - { name: 한양대학교, college: 공과대학, major: 기계공학부 }
