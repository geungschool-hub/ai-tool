<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1인 1역 수행 기록 · 2학년 7반</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
/* ── 리셋 & 기본 ── */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --primary: #c94f7f;        /* 로즈 핑크 — 주 동작 */
  --primary-dark: #a93c66;
  --primary-light: #fceef4;
  --primary-mid: #f2cede;
  --accent: #d9a441;         /* 골드 — 오늘 표시·왕관 */
  --teacher: #5f4260;        /* 플럼 — 담임 화면 */
  --teacher-light: #f3eef5;
  --teacher-mid: #ded2e2;
  --bg: #fdf8fa;
  --card: #ffffff;
  --text: #33202b;
  --text-sub: #8a6d7c;
  --border: #f0dae4;
  --disabled: #ece8ea;
  --disabled-text: #a89ba3;
  --danger: #d64545;
  --radius: 14px;
  --radius-sm: 10px;
}

html, body {
  height: 100%;
  overflow: hidden;          /* 스크롤은 각 화면 내부 스크롤러가 담당 (iOS 먹통 방지) */
  background: var(--bg);
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
}

/* ── 앱 래퍼 ── */
#app {
  max-width: 480px;
  margin: 0 auto;
  height: 100vh;   /* dvh 미지원 구형 브라우저 폴백 */
  height: 100dvh;
  display: flex;
  flex-direction: column;
  background: var(--card);
  box-shadow: 0 0 40px rgba(0,0,0,0.08);
  position: relative;
  overflow: hidden;
}

/* ── 화면 전환 ── */
.screen { display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
.screen.active { display: flex; }

/* ── 하단 크레딧 ── */
.credit {
  flex-shrink: 0;
  text-align: center;
  font-size: 11px;
  color: #c2a8b4;
  padding: 8px 0 4px;
}

/* ════════════════════════
   입장 화면
════════════════════════ */
#screen-entry {
  padding: 0 0 env(safe-area-inset-bottom, 16px);
}

.entry-header {
  background: linear-gradient(160deg, #d76a97 0%, #c14b7b 100%);
  color: white;
  padding: 32px 24px 26px;
  padding-top: calc(32px + env(safe-area-inset-top, 0px));
  text-align: center;
  flex-shrink: 0;
}
.entry-header .app-crown { display: block; margin: 0 auto 10px; filter: drop-shadow(0 2px 3px rgba(120,40,70,0.35)); }
.entry-header h1 { font-size: 21px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
.entry-header p { font-size: 14px; opacity: 0.9; }

.entry-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 24px 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.entry-label {
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-sub);
}

/* 번호 그리드 */
.number-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.num-btn {
  aspect-ratio: 1;
  border: 2px solid var(--border);
  background: var(--card);
  border-radius: var(--radius-sm);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.08s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  min-height: 52px;
}
.num-btn .num-btn-name {
  font-size: 10.5px;
  font-weight: 500;
  color: var(--text-sub);
  max-width: 92%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.num-btn:active { transform: scale(0.92); background: var(--primary-light); border-color: var(--primary); }

/* 담임 버튼 */
.teacher-btn-wrap {
  flex-shrink: 0;
  padding: 8px 20px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid var(--border);
  background: var(--card);
}
.teacher-btn {
  width: 100%;
  padding: 14px;
  background: var(--teacher-light);
  border: 1.5px solid var(--teacher-mid);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  color: var(--teacher);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
  min-height: 48px;
}
.teacher-btn:active { background: var(--teacher-mid); border-color: var(--teacher); color: var(--teacher); }

/* 오류 메시지 */
.entry-error {
  text-align: center;
  font-size: 14px;
  color: var(--danger);
  min-height: 20px;
}

/* ════════════════════════
   학생 기록 화면
════════════════════════ */
#screen-record {
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

/* 상단 바 */
.record-header {
  background: var(--primary);
  color: white;
  padding: 16px 16px 14px;
  padding-top: calc(16px + env(safe-area-inset-top, 0px));
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  flex-shrink: 0;
}
.record-header-info { flex: 1; }
.record-header-name {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.3;
}
.record-header-role {
  font-size: 13px;
  opacity: 0.85;
  margin-top: 2px;
}
.header-back-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 12px;
  cursor: pointer;
  flex-shrink: 0;
  min-height: 48px;
  min-width: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.header-back-btn:active { background: rgba(255,255,255,0.35); }

/* 역할 안내 접이식 */
.role-guide {
  background: var(--primary-light);
  border-bottom: 1px solid var(--primary-mid);
  flex-shrink: 0;
}
.role-guide-toggle {
  width: 100%;
  padding: 12px 16px;
  background: none;
  border: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  cursor: pointer;
  min-height: 44px;
}
.role-guide-toggle .arrow { transition: transform 0.2s; font-size: 11px; }
.role-guide-toggle.open .arrow { transform: rotate(180deg); }
.role-guide-body {
  display: none;
  padding: 0 16px 12px;
  font-size: 15px;
  color: #8a4f68;
  line-height: 1.7;
  white-space: pre-line;
}
.role-guide-body.open { display: block; }

/* 주차 네비게이션 */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.week-nav-btn {
  background: var(--primary-light);
  border: 1px solid var(--primary-mid);
  border-radius: 8px;
  color: var(--primary);
  font-size: 20px;
  width: 44px;
  height: 44px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.week-nav-btn:active { background: var(--primary-mid); }
.week-nav-btn:disabled { opacity: 0.35; cursor: default; }
.week-nav-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  line-height: 1.5;
}
.week-nav-sub {
  font-size: 11px;
  color: var(--text-sub);
  font-weight: 400;
}

/* 읽기 전용 배너 */
.readonly-banner {
  display: none;
  background: #fdf3e3;
  color: #9a6a1f;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  padding: 8px;
  flex-shrink: 0;
}
.readonly-banner.show { display: block; }

/* 요일 탭 */
.day-tabs {
  display: flex;
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
  background: var(--card);
}
.day-tab {
  flex: 1;
  padding: 10px 4px 8px;
  border: none;
  background: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: color 0.15s;
  min-height: 52px;
  position: relative;
}
.day-tab .tab-day { font-size: 14px; }
.day-tab .tab-date { font-size: 11px; color: var(--text-sub); }
.day-tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}
.day-tab.active .tab-date { color: var(--primary); }
.day-tab.today .tab-day::after {
  content: '';
  display: block;
  width: 5px;
  height: 5px;
  background: var(--accent);
  border-radius: 50%;
  position: absolute;
  top: 6px;
  right: calc(50% - 14px);
}
.day-tab.disabled {
  opacity: 0.4;
  cursor: default;
  pointer-events: none;
}
.day-tab .tab-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary);
  display: none;
}
.day-tab.has-record .tab-dot { display: block; }

/* 기록 입력 영역 */
.record-body {
  flex: 1;
  min-height: 0;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.record-date-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-sub);
}
.record-textarea {
  width: 100%;
  flex: 1;
  min-height: 180px;
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-size: 16px;
  font-family: inherit;
  color: var(--text);
  resize: none;
  line-height: 1.7;
  background: var(--card);
  transition: border-color 0.15s;
  -webkit-user-select: text;
  user-select: text;
}
.record-textarea:focus {
  outline: none;
  border-color: var(--primary);
}
.record-textarea:disabled {
  background: var(--disabled);
  color: var(--disabled-text);
  cursor: default;
}

/* 저장 버튼 (하단 고정) */
.record-footer {
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid var(--border);
  background: var(--card);
  flex-shrink: 0;
}
.save-btn {
  width: 100%;
  padding: 15px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.08s;
  min-height: 52px;
}
.save-btn:active { transform: scale(0.98); background: var(--primary-dark); }
.save-btn:disabled {
  background: var(--disabled);
  color: var(--disabled-text);
  cursor: default;
}

/* ── 토스트 ── */
#toast {
  position: fixed;
  bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: white;
  padding: 10px 20px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  max-width: 86vw;
  text-align: center;
  line-height: 1.5;
  z-index: 9999;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── 공통 모달 ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 500;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -10px 32px rgba(90, 35, 60, 0.16);
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: slideUp 0.28s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.modal-handle {
  width: 36px;
  height: 4px;
  background: #d1d5db;
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
}
.modal-header {
  padding: 12px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
.modal-close {
  background: #f3f4f6;
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  font-size: 18px;
  cursor: pointer;
  color: var(--text-sub);
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-body {
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

/* ── 비밀번호 키패드 모달 ── */
.pw-display {
  font-size: 32px;
  letter-spacing: 14px;
  text-align: center;
  color: var(--primary);
  margin: 8px 0 20px;
  font-weight: 700;
  min-height: 44px;
}
.pw-keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.pw-key {
  padding: 16px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  color: var(--text);
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
}
.pw-key:active { background: var(--primary-light); border-color: var(--primary); }
.pw-error {
  color: var(--danger);
  font-size: 13px;
  text-align: center;
  margin-top: 10px;
  min-height: 20px;
  white-space: pre-line;   /* \n 줄바꿈 표시 */
  line-height: 1.45;
}

/* ════════════════════════
   담임 화면
════════════════════════ */
#screen-teacher {
  overflow: hidden;
}
.teacher-header {
  background: var(--teacher);
  color: white;
  padding: 16px;
  padding-top: calc(16px + env(safe-area-inset-top, 0px));
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.teacher-header h2 { font-size: 17px; font-weight: 700; }
.teacher-header-sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }
.teacher-back-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 12px;
  cursor: pointer;
  min-height: 44px;
}

.teacher-week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--card);
}
.teacher-week-nav .week-nav-btn {
  background: var(--teacher-light);
  border-color: var(--teacher-mid);
  color: var(--teacher);
}
.unrecorded-badge {
  font-size: 12px;
  color: var(--danger);
  font-weight: 600;
  background: #fff0ee;
  border: 1px solid #fcd9d3;
  border-radius: 999px;
  padding: 3px 10px;
}

/* 전체 현황 표 */
.overview-scroll {
  flex: 1;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}
.overview-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  table-layout: fixed;
}
.overview-table th {
  background: #fdf1f6;
  color: var(--primary);
  font-weight: 700;
  padding: 7px 6px;
  border-bottom: 2px solid var(--primary-mid);
  text-align: center;
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 1;
}
.overview-table th .th-date {
  display: block;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-sub);
}
.overview-table th.col-today {
  background: #fdf3dd;
  color: #9a6a1f;
}
.overview-table th.col-name {
  text-align: left;
  padding-left: 12px;
  width: 88px;
  position: sticky;
  left: 0;
  z-index: 2;
  background: #fbe7f0;
}
.overview-table td {
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  vertical-align: middle;
  cursor: pointer;
}
.overview-table td.col-name {
  text-align: left;
  padding-left: 12px;
  background: var(--card);
  position: sticky;
  left: 0;
  z-index: 1;
  cursor: pointer;
}
.overview-table tr:last-child td { border-bottom: none; }
.overview-table tr:hover td { background: var(--primary-light); }
.overview-table tr:hover td.col-name { background: var(--primary-light); }

.td-name-main { font-weight: 600; font-size: 13px; }
.td-name-role { font-size: 11px; color: var(--text-sub); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 76px; }

.td-check {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.td-check-icon { color: var(--primary); font-size: 14px; font-weight: 700; }
.td-check-preview {
  font-size: 10px;
  color: var(--text-sub);
  max-width: 72px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.td-empty { color: #dcd0d6; font-size: 18px; }
.overview-table td.col-today { background: #fffaf1; }
.overview-table td.col-today .td-empty { color: var(--danger); opacity: 0.5; }
.td-week-count {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 0 5px;
  border-radius: 999px;
  background: var(--primary-light);
  color: var(--primary);
  margin-left: 3px;
  vertical-align: 1px;
}
.td-week-count.full { background: #fdf3dd; color: #9a6a1f; }
.td-week-count.zero { background: #f2edf0; color: var(--text-sub); }

/* 좁은 화면: 판독 불가한 미리보기 대신 ✔ 만 */
@media (max-width: 420px) {
  .td-check-preview { display: none; }
  .overview-table td { padding: 10px 4px; }
}

/* 기록 상세 모달 */
#record-detail-modal .modal-box { border-radius: 20px 20px 0 0; }
.detail-student-info {
  font-size: 13px;
  color: var(--text-sub);
  margin-bottom: 10px;
}
.detail-content {
  font-size: 16px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 14px;
  min-height: 80px;
}
.detail-empty { color: var(--text-sub); font-style: italic; }

/* 학생 이력 모달 */
.student-history-week {
  margin-bottom: 16px;
}
.history-week-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--primary-mid);
}
.history-day-item {
  padding: 6px 10px;
  border-radius: 8px;
  margin-bottom: 5px;
  background: var(--bg);
}
.history-day-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 2px;
}
.history-day-content { font-size: 15px; color: var(--text); white-space: pre-wrap; }
.history-empty { color: var(--text-sub); font-size: 14px; text-align: center; padding: 20px; }

/* ── 담임 하단 툴바 ── */
.teacher-toolbar {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.toolbar-btn {
  flex: 1;
  min-width: calc(33% - 4px);

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
}

// ── 공용 확인 다이얼로그 (파괴적 동작은 danger:true → 빨간 확인 버튼) ──
let confirmResolve = null;   // 열려 있는 다이얼로그의 resolve (중복 호출 시 누수 방지)
function showConfirm({ title, msg, okLabel = '확인', cancelLabel = '취소', danger = false }) {
  return new Promise(resolve => {
    if (confirmResolve) confirmResolve(false);   // 이전 다이얼로그는 취소 처리
    confirmResolve = resolve;
    const overlay = document.getElementById('confirm-dialog');
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-msg').textContent = msg;
    const okBtn = document.getElementById('confirm-ok');
    const cancelBtn = document.getElementById('confirm-cancel');
    okBtn.textContent = okLabel;
    cancelBtn.textContent = cancelLabel;
    okBtn.classList.toggle('danger', danger);
    const done = (result) => {
      overlay.classList.remove('show');
      okBtn.onclick = cancelBtn.onclick = null;
      confirmResolve = null;
      resolve(result);
    };
    okBtn.onclick = () => done(true);
    cancelBtn.onclick = () => done(false);
    overlay.classList.add('show');
  });
}

// ── 학생 PIN 과다 시도 방지 (auth/too-many-requests 사전 예방) ──
// 연속 실패가 쌓이면 키패드를 잠시 잠가, 서버가 기기/IP를 차단하기 전에 멈추게 함
let spwFailCount = 0;     // 연속 실패 횟수
let spwLockUntil = 0;     // 이 시각(ms)까지 입력 잠금
let spwLockTimer = null;

function spwIsLocked() { return Date.now() < spwLockUntil; }

function startSpwLock(seconds, baseMsg) {
  spwLockUntil = Date.now() + seconds * 1000;
  const errEl = document.getElementById('spw-error');
  clearInterval(spwLockTimer);
  const tick = () => {
    const remain = Math.ceil((spwLockUntil - Date.now()) / 1000);
    if (remain <= 0) {
      clearInterval(spwLockTimer);
      spwLockTimer = null;
      spwFailCount = 0;
      errEl.textContent = '이제 다시 입력할 수 있어요.';
      return;
    }
    errEl.textContent = `${baseMsg}\n(${remain}초 후 다시 시도 가능)`;
  };
  tick();
  spwLockTimer = setInterval(tick, 1000);
}

let clientIP = null;

async function fetchClientIP() {
  if (clientIP !== null) return clientIP;
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 3000);
    const res = await fetch('https://api.ipify.org?format=json', { signal: controller.signal });
    clearTimeout(timer);
    const data = await res.json();
    clientIP = data.ip || '';
  } catch {
    clientIP = '';
  }
  return clientIP;
}

function getToday() {
  const d = new Date();
  return { y: d.getFullYear(), m: d.getMonth()+1, d: d.getDate(), dow: d.getDay() };
}

// ISO 주차 번호
function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
  const w1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d - w1) / 86400000 - 3 + (w1.getDay()+6)%7) / 7);
}

// 주차의 월요일 Date 반환
function getMondayOfWeek(year, week) {
  const jan4 = new Date(year, 0, 4);
  const jan4dow = (jan4.getDay()+6)%7;
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - jan4dow + (week-1)*7);
  return monday;
}

// 현재 주차 기준 오프셋 → {year, week}
let weekOffset = 0;

function getCurrentWeekInfo() {
  const today = new Date();
  const baseWeek = getISOWeek(today);
  const baseYear = today.getFullYear();

  const monday = getMondayOfWeek(baseYear, baseWeek);
  monday.setDate(monday.getDate() + weekOffset * 7);

  const year = monday.getFullYear();
  const week = getISOWeek(monday);

  // 이번 주 월~금 날짜
  const dates = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d);
  }

  // 월차 계산 (해당 월의 몇 번째 주)
  const firstMonday = getMondayOfWeek(dates[0].getFullYear(), getISOWeek(dates[0]));
  const monthWeekNum = Math.ceil((dates[0].getDate() + (new Date(dates[0].getFullYear(), dates[0].getMonth(), 1).getDay()+6)%7) / 7);

  return { year, week, dates, monthWeekNum, month: dates[0].getMonth()+1 };
}

function isCurrentWeek() { return weekOffset === 0; }

function isFutureDate(date) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  return d > today;
}

function isTodayDate(date) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  return d.getTime() === today.getTime();
}

function formatDate(date) {
  return `${date.getMonth()+1}/${date.getDate()}`;
}

  info.dates.forEach((date, i) => {

    btn.className = 'day-tab';
    const future = isFutureDate(date);
    const hasRecord = getCached(DAYS_KEY[i]) !== '';

    if (i === activeDayIndex) btn.classList.add('active');
    if (i === todayIdx) btn.classList.add('today');
    if (future) btn.classList.add('disabled');
    if (hasRecord) btn.classList.add('has-record');

    btn.innerHTML = `
      <span class="tab-day">${DAYS_KO[i]}</span>
      <span class="tab-date">${formatDate(date)}</span>
      <span class="tab-dot"></span>

    if (!future) {
      btn.addEventListener('click', () => switchDay(i, info, readonly));
    }
    tabsEl.appendChild(btn);
  });
}

  const key = draftKey(info, dayKey);
  const textarea = document.getElementById('record-textarea');
  // 읽기전용(지난주·미래)에는 초안을 보여주지 않음 — 저장된 기록만
  textarea.value = (!isReadonly && drafts[key] !== undefined) ? drafts[key].val : getCached(dayKey);
  textarea.disabled = isReadonly;
  textarea.placeholder = isReadonly
    ? (future ? '아직 기록할 수 없어요' : '지난주 기록은 볼 수만 있어요')
    : getPlaceholder(currentStudent.role);

  const newTA = textarea.cloneNode(true);
  textarea.parentNode.replaceChild(newTA, textarea);
  newTA.addEventListener('input', () => {
    drafts[key] = { val: newTA.value, base: getCached(dayKey) };
  });
}

let isSavingEdit = false;

function getCachedRecord(studentId, year, week, dayKey) {
  const wk = weekKey(year, week);
  return rolesCache?.[studentId]?.[wk]?.[dayKey] || '';
}

function renderTeacherView() {
  const info = getTeacherWeekInfo();

  document.getElementById('t-week-label').textContent =
    `${info.year}년 ${info.month}월 ${info.monthWeekNum}주차`;
  document.getElementById('t-week-range').textContent =
    `${formatDate(info.dates[0])} ~ ${formatDate(info.dates[4])}`;

  const todayIdx = info.dates.findIndex(d => isTodayDate(d));
  if (todayIdx >= 0) {
    const unrecorded = STUDENTS.filter(s =>
      getCachedRecord(s.id, info.year, info.week, DAYS_KEY[todayIdx]) === ''
    ).length;
    document.getElementById('unrecorded-badge').textContent = `오늘 미기록 ${unrecorded}명`;
  } else {
    // 주말·다른 주에는 주간 기록 요약으로 대체
    let filled = 0;
    STUDENTS.forEach(s => DAYS_KEY.forEach(dk => {
      if (getCachedRecord(s.id, info.year, info.week, dk)) filled++;
    }));
    document.getElementById('unrecorded-badge').textContent =
      `이번 주 기록 ${filled}/${STUDENTS.length * 5}`;
  }

  // 요일 헤더에 날짜 병기 + 오늘 열 강조
  for (let i = 0; i < 5; i++) {
    const th = document.getElementById('th-day-' + i);
    if (!th) continue;
    th.innerHTML = `${DAYS_KO[i]}<span class="th-date">${formatDate(info.dates[i])}</span>`;
    th.classList.toggle('col-today', i === todayIdx);
  }

  document.getElementById('t-btn-next-week').disabled = teacherWeekOffset >= 0;

  renderOverviewTable(info);
}

function getTeacherWeekInfo() {
  const today = new Date();
  const baseWeek = getISOWeek(today);
  const monday = getMondayOfWeek(today.getFullYear(), baseWeek);
  monday.setDate(monday.getDate() + teacherWeekOffset * 7);

  const year = monday.getFullYear();
  const week = getISOWeek(monday);
  const dates = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d);
  }
  const monthWeekNum = Math.ceil(
    (dates[0].getDate() + (new Date(dates[0].getFullYear(), dates[0].getMonth(), 1).getDay()+6)%7) / 7
  );
  return { year, week, dates, monthWeekNum, month: dates[0].getMonth()+1 };
}

function renderOverviewTable(info) {
  document.getElementById('overview-table').classList.remove('editing');
  const tbody = document.getElementById('overview-tbody');
  tbody.innerHTML = '';
  const todayIdx = info.dates.findIndex(d => isTodayDate(d));

  STUDENTS.forEach(s => {
    const tr = document.createElement('tr');

    const weekCount = DAYS_KEY.filter(dk => getCachedRecord(s.id, info.year, info.week, dk)).length;
    const countClass = weekCount === 5 ? ' full' : (weekCount === 0 ? ' zero' : '');

    const tdName = document.createElement('td');
    tdName.className = 'col-name';
    tdName.innerHTML = `<div class="td-name-main">${s.num} ${s.name}<span class="td-week-count${countClass}">${weekCount}/5</span></div><div class="td-name-role">${s.role}</div>`;
    tdName.addEventListener('click', () => openStudentHistory(s));
    tr.appendChild(tdName);

    DAYS_KEY.forEach((dk, i) => {
      const td = document.createElement('td');
      if (i === todayIdx) td.classList.add('col-today');
      const content = getCachedRecord(s.id, info.year, info.week, dk);
      if (content) {
        td.innerHTML = `<div class="td-check">
          <span class="td-check-icon">✔</span>
          <span class="td-check-preview">${escapeHtml(content.replace(/\n/g,' '))}</span>
        </div>`;
      } else {
        td.innerHTML = `<span class="td-empty">·</span>`;
      }
      td.addEventListener('click', () => openRecordDetail(s, info.dates[i], dk, content));
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

function renderHistoryModal(student, studentData, title) {
  document.getElementById('history-modal-title').textContent = title;
  const body = document.getElementById('history-modal-body');

  // 정상 형식 키만 통과 — 오염된 키로 인한 XSS·TypeError 차단
  const wkKeys = Object.keys(studentData).filter(wk => /^\d{4}_W\d{1,2}$/.test(wk)).sort().reverse(); // "2025_W16" 형태

  if (wkKeys.length === 0) {
    body.innerHTML = '<div class="history-empty">아직 기록이 없어요.</div>';
  } else {
    body.innerHTML = wkKeys.map(wk => {
      const [yr, wn] = wk.split('_');
      const week = parseInt(wn.replace('W',''));
      const monday = getMondayOfWeek(parseInt(yr), week);
      const endFri = new Date(monday); endFri.setDate(monday.getDate()+4);
      const dayData = studentData[wk] || {};
      const items = DAYS_KEY.map((dk, i) => {
        const val = dayData[dk];
        if (!val) return '';
        const d = new Date(monday); d.setDate(monday.getDate()+i);
        return `<div class="history-day-item">
          <div class="history-day-label">${DAYS_KO[i]} ${formatDate(d)}</div>
          <div class="history-day-content">${escapeHtml(val)}</div>
        </div>`;
      }).join('');
      return `<div class="student-history-week">
        <div class="history-week-title">${yr}년 W${week} (${formatDate(monday)}~${formatDate(endFri)})</div>
        ${items || '<div style="font-size:12px;color:var(--text-sub);padding:4px 0">기록 없음</div>'}
      </div>`;
    }).join('');
  }
  document.getElementById('student-history-modal').classList.add('show');
}

// ══════════════════════════════════════
let spwMode = 'enter';   // 'enter' | 'set-first' | 'set-confirm'
let spwBuffer = '';
let spwFirstPw = '';
let spwStudent = null;

function openStudentPwModal(mode, student) {
  spwStudent = student;
  spwBuffer = '';
  spwFirstPw = '';
  spwMode = mode === 'set' ? 'set-first' : 'enter';
  updateSpwUI();
  document.getElementById('spw-error').textContent = '';
  document.getElementById('student-pw-modal').classList.add('show');
}

function updateSpwUI() {
  document.getElementById('spw-display').textContent = '　';
  document.getElementById('spw-student-name').textContent =
    `${spwStudent.num}번 ${spwStudent.name}`;
  const subtitle = document.getElementById('spw-subtitle');
  const title = document.getElementById('spw-title');
  if (spwMode === 'enter') {
    title.textContent = '🔒 비밀번호 입력';
    subtitle.textContent = '비밀번호 4자리를 입력해주세요.';
  } else if (spwMode === 'set-first') {
    title.textContent = '🔑 비밀번호 설정';
    subtitle.textContent = '처음 입장이에요.\n사용할 비밀번호 4자리를 설정하세요.';
  } else {
    title.textContent = '🔑 비밀번호 확인';
    subtitle.textContent = '한 번 더 입력해주세요.';
  }
}

function spwInput(d) {
  if (spwIsLocked()) return;
  if (spwBuffer.length >= 4) return;
  spwBuffer += d;
  document.getElementById('spw-display').textContent = '●'.repeat(spwBuffer.length);
  if (spwBuffer.length === 4) setTimeout(spwConfirm, 180);
}

function spwDelete() {
  spwBuffer = spwBuffer.slice(0, -1);
  const disp = document.getElementById('spw-display');
  disp.textContent = spwBuffer.length ? '●'.repeat(spwBuffer.length) : '　';
}

async function spwConfirm() {
  if (spwBuffer.length < 4) return;
  const errEl = document.getElementById('spw-error');

  if (spwMode === 'enter') {
    if (spwIsLocked()) return;
    // Firebase Auth 로그인
    showLoading(true, '확인 중...');
    try {
      await auth.signInWithEmailAndPassword(
        studentEmail(spwStudent), spwBuffer + '#s27'
      );
      spwFailCount = 0;
      document.getElementById('student-pw-modal').classList.remove('show');
      proceedAsStudent(spwStudent);
    } catch(e) {
      spwBuffer = '';
      document.getElementById('spw-display').textContent = '　';
      if (e?.code === 'auth/too-many-requests') {
        // 서버가 이미 차단 → 더 두드리지 않도록 90초 잠금
        startSpwLock(90, '로그인 시도가 많아 잠시 잠겼어요.');
      } else {
        spwFailCount++;
        if (spwFailCount >= 5) {
          // 차단당하기 전에 선제적으로 60초 쉬게 함
          startSpwLock(60, '여러 번 틀렸어요. 잠깐 쉬었다 다시 해요.');
        } else {
          errEl.textContent = authErrorMessage(e);
        }
      }
    } finally {
      showLoading(false);
    }

  } else if (spwMode === 'set-first') {
    spwFirstPw = spwBuffer;
    spwBuffer = '';
    spwMode = 'set-confirm';
    updateSpwUI();
    errEl.textContent = '';

  } else { // set-confirm
    if (spwBuffer === spwFirstPw) {
      showLoading(true, '설정 중...');
      try {
        // Firebase Auth 계정 생성
        const cred = await auth.createUserWithEmailAndPassword(
          studentEmail(spwStudent), spwBuffer + '#s27'
        );
        // UID를 DB에 저장 (write-once: 보안 규칙으로 보호)
        await db.ref(`studentMeta/${spwStudent.id}/uid`).set(cred.user.uid);
        document.getElementById('student-pw-modal').classList.remove('show');
        showToast('비밀번호가 설정됐어요 🔑');
        proceedAsStudent(spwStudent);
      } catch(e) {
        spwBuffer = '';
        document.getElementById('spw-display').textContent = '　';
        if (e?.code === 'auth/too-many-requests') {
          startSpwLock(90, '시도가 많아 잠시 잠겼어요.');
        } else if (e?.code === 'auth/network-request-failed') {
          errEl.textContent = '인터넷 연결이 불안정해요.\n잠시 후 다시 시도해주세요.';
        } else {
          errEl.textContent = '저장 실패. 다시 시도해주세요.' + (e?.code ? '\n(' + e.code + ')' : '');
        }
      } finally {
        showLoading(false);
      }
    } else {
      spwBuffer = '';
      spwFirstPw = '';
      spwMode = 'set-first';
      updateSpwUI();
      document.getElementById('spw-error').textContent = '비밀번호가 일치하지 않아요.\n처음부터 다시 입력해주세요.';
    }
  }
}

async function resetStudentPw(studentId) {
  const student = STUDENTS.find(s => s.id === studentId);
  const ok = await showConfirm({
    title: '비밀번호 초기화',
    msg: `${student?.name}의 비밀번호를 초기화할까요?\n다음 입장 때 새로 설정하게 돼요.`,
    okLabel: '초기화', cancelLabel: '취소', danger: true,
  });
  if (!ok) return;
  try {
    const snap = await db.ref(`studentMeta/${studentId}/resetCount`).once('value');
    const current = snap.val() || 0;
    // resetCount 증가 → 학생 이메일이 변경되어 기존 계정과 분리
    // uid null → 다음 로그인 시 신규 계정 생성으로 인식
    await db.ref(`studentMeta/${studentId}`).update({
      resetCount: current + 1,
      uid: null,
    });
    showToast(`${student?.name} 비밀번호 초기화 완료 ✔`);
    await renderPwResetList(); // 목록 즉시 갱신
  } catch {
    showToast('초기화 실패 ❌');
  }
}

let logListener = null;

document.getElementById('btn-view-log').addEventListener('click', openLogModal);
document.getElementById('log-modal-close').addEventListener('click', closeLogModal);
document.getElementById('log-modal').addEventListener('click', function(e) {
  if (e.target === this) closeLogModal();
});

function openLogModal() {
  document.getElementById('log-modal').classList.add('show');
  const body = document.getElementById('log-modal-body');
  body.innerHTML = '<div class="log-empty">불러오는 중...</div>';

  if (logListener) db.ref('logs').off('value', logListener);

  logListener = db.ref('logs').limitToLast(100).on('value', (snap) => {
    const data = snap.val();
    if (!data) {
      body.innerHTML = '<div class="log-empty">아직 변경 기록이 없습니다.</div>';
      return;
    }
    const entries = Object.entries(data)
      .map(([k, v]) => ({ key: k, ...v }))
      .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

    body.innerHTML = entries.map(entry => {
      const student = STUDENTS.find(s => s.id === entry.studentId);
      if (!student) return '';
      const ts = entry.timestamp ? new Date(entry.timestamp) : null;
      const timeStr = ts ? formatLogTime(ts) : '';
      const dayIdx = DAYS_KEY.indexOf(entry.dayKey);
      const dayLabel = dayIdx >= 0 ? DAYS_KO[dayIdx] : escapeHtml(entry.dayKey);
      const dateStr = getDateFromWkDay(entry.wk, entry.dayKey);
      const isDelete = !entry.value;
      const preview = isDelete
        ? '(내용 삭제됨)'
        : entry.value.replace(/\n/g, ' ').slice(0, 50) + (entry.value.length > 50 ? '…' : '');
      const actorBadge = entry.actor === 'teacher'
        ? '<span class="log-actor-teacher">담임</span>' : '';
      const ipBadge = entry.ip ? `<span class="log-ip">${escapeHtml(entry.ip)}</span>` : '';
      return `<div class="log-item${isDelete ? ' log-delete' : ''}">
        <div class="log-item-header">
          <span class="log-time">${timeStr}</span>
          <span class="log-name">${student.num} ${student.name}</span>
          ${actorBadge}
          <span class="log-day">${dateStr}(${dayLabel})</span>
        </div>
        ${ipBadge}
        <div class="log-preview">${escapeHtml(preview)}</div>
      </div>`;
    }).join('');
  });
}

function closeLogModal() {
  document.getElementById('log-modal').classList.remove('show');
  if (logListener) {
    db.ref('logs').off('value', logListener);
    logListener = null;
  }
}

function formatLogTime(date) {
  const now = new Date();
  const isToday = date.toDateString() === now.toDateString();
  const h = date.getHours();
  const m = String(date.getMinutes()).padStart(2, '0');
  const ampm = h < 12 ? '오전' : '오후';
  const h12 = h % 12 || 12;
  if (isToday) return `오늘 ${ampm} ${h12}:${m}`;
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  if (date.toDateString() === yesterday.toDateString()) return `어제 ${ampm} ${h12}:${m}`;
  return `${date.getMonth()+1}/${date.getDate()} ${ampm} ${h12}:${m}`;
}

function getDateFromWkDay(wk, dayKey) {
  if (!wk) return '';
  try {
    const [yr, wn] = wk.split('_');
    const week = parseInt(wn.replace('W', ''));
    const monday = getMondayOfWeek(parseInt(yr), week);
    const dayIdx = DAYS_KEY.indexOf(dayKey);
    const d = new Date(monday);
    d.setDate(monday.getDate() + Math.max(dayIdx, 0));
    return formatDate(d) + ' ';
  } catch { return ''; }
}

let isEditMode = false;

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// CSV 내보내기
document.getElementById('btn-export-csv').addEventListener('click', () => {
  const info = getTeacherWeekInfo();
  const header = ['이름','역할', ...DAYS_KO];
  const rows = STUDENTS.map(s => [
    s.name, s.role,
    ...DAYS_KEY.map(dk => (getCachedRecord(s.id, info.year, info.week, dk) || '').replace(/\n/g,' '))

// JSON 불러오기 (Firebase에 병합 업로드)
document.getElementById('btn-import-json').addEventListener('click', () => {
  document.getElementById('t-import-file').click();
});
document.getElementById('t-import-file').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      const incoming = parsed.data || parsed;
      // incoming은 { studentId: { weekKey: { dayKey: value } } } 형태
      if (!Object.keys(incoming).length) { showToast('올바른 백업 파일이 아닙니다'); return; }
      const ok = await showConfirm({
        title: '백업 복원',
        msg: '백업 데이터를 업로드해 기존 데이터와 병합합니다.\n(기존 기록을 지우지 않아요)',
        okLabel: '병합 업로드', cancelLabel: '취소',
      });
      if (!ok) return;
      showLoading(true, '업로드 중...');
      const writes = [];
      for (const [sid, weeks] of Object.entries(incoming)) {
        for (const [wk, days] of Object.entries(weeks)) {
          for (const [dk, val] of Object.entries(days)) {
            if (val) writes.push(db.ref(`roles/${sid}/${wk}/${dk}`).set(val));
          }
        }
      }
      await Promise.all(writes);
      showLoading(false);
      showToast(`업로드 완료 📂`);
    } catch (err) {
      showLoading(false);
      showToast('파일 읽기 오류');
    }
  };
  reader.readAsText(file, 'utf-8');
  e.target.value = '';
});

// 편집 모드 토글 — 저장 시 실제로 바뀐 셀만 기록 (변경로그 도배·불필요 쓰기 방지)
function exitEditMode() {
  isEditMode = false;
  pendingTeacherRefresh = false;
  const btn = document.getElementById('btn-edit-mode');
  btn.classList.remove('active');
  btn.textContent = '✏️ 편집 모드';
}

document.getElementById('btn-edit-mode').addEventListener('click', async () => {
  if (isEditMode) {
    const info = getTeacherWeekInfo();
    const wk = weekKey(info.year, info.week);
    const writes = [];
    let changed = 0;
    document.querySelectorAll('.edit-cell-textarea').forEach(ta => {
      const { sid, dk } = ta.dataset;
      if (ta.value === ta.dataset.base) return;   // 바뀌지 않은 셀은 건너뜀
      changed++;
      writes.push(
        db.ref(`roles/${sid}/${wk}/${dk}`).set(ta.value || null)
          .then(() => logChange(sid, wk, dk, ta.value, 'teacher'))   // 성공한 쓰기만 로그
      );
    });
    if (changed) {
      isSavingEdit = true;
      showLoading(true, '저장 중...');
      try {
        await Promise.all(writes);
        showToast(`바뀐 ${changed}칸을 저장했어요 ✔`);
      } catch {
        // 실패 시 편집 모드 유지 — 타이핑한 내용을 지키고 재시도 가능하게
        showToast('저장이 안 됐어요 — 편집 내용은 그대로 있어요.\n다시 저장을 눌러주세요');
        return;
      } finally {
        isSavingEdit = false;
        showLoading(false);
      }
    } else {
      showToast('바뀐 내용이 없어요');
    }
    exitEditMode();
    renderTeacherView();
  } else {
    isEditMode = true;
    document.getElementById('btn-edit-mode').classList.add('active');
    document.getElementById('btn-edit-mode').textContent = '💾 편집 저장';
    renderOverviewTableEditMode(getTeacherWeekInfo());
  }
});

function renderOverviewTableEditMode(info) {
  document.getElementById('overview-table').classList.add('editing');
  const tbody = document.getElementById('overview-tbody');
  tbody.innerHTML = '';
  STUDENTS.forEach(s => {
    const tr = document.createElement('tr');
    const tdName = document.createElement('td');
    tdName.className = 'col-name';
    tdName.innerHTML = `<div class="td-name-main">${s.num} ${s.name}</div><div class="td-name-role">${s.role}</div>`;
    tr.appendChild(tdName);
    DAYS_KEY.forEach((dk) => {
      const td = document.createElement('td');
      const val = getCachedRecord(s.id, info.year, info.week, dk);
      const ta = document.createElement('textarea');
      ta.className = 'edit-cell-textarea';
      ta.value = val;
      ta.dataset.sid = s.id;
      ta.dataset.dk = dk;
      ta.dataset.base = val;   // 저장 시 변경 여부 비교 기준
      td.appendChild(ta);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ══════════════════════════════════════
//  최근 입장 기록
// ══════════════════════════════════════
function getRecentEntries() {
  const raw = localStorage.getItem('recent_entries');
  return raw ? JSON.parse(raw) : [];
}
function addRecentEntry(studentId) {
  let recent = getRecentEntries().filter(id => id !== studentId);
  recent.unshift(studentId);
  recent = recent.slice(0, 3);
  localStorage.setItem('recent_entries', JSON.stringify(recent));
}
function renderRecentButtons() {
  const recent = getRecentEntries();
  const wrap = document.getElementById('recent-section');
  if (!wrap) return;
  if (recent.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  const btnsEl = document.getElementById('recent-btns');
  btnsEl.innerHTML = recent.map(id => {
    const s = STUDENTS.find(x => x.id === id);
    if (!s) return '';
    return `<button class="recent-btn" onclick="quickEnter('${s.id}')">
      ${s.num}<span>${s.name}</span>
    </button>`;
  }).join('');
}
function quickEnter(studentId) {
  const s = STUDENTS.find(x => x.id === studentId);
  if (s) enterAsStudent(s);
}

// 학생 Firebase Auth 이메일 생성
// resetCount가 증가하면 이메일이 바뀌어 기존 계정과 분리됨
function studentEmail(student) {
  const rc = student._resetCount || 0;
  return `s${student.id}c${rc}@c27.local`;
}

async function enterAsStudent(student) {
  showLoading(true);
  try {
    const [uidSnap, rcSnap] = await Promise.all([
      db.ref(`studentMeta/${student.id}/uid`).once('value'),
      db.ref(`studentMeta/${student.id}/resetCount`).once('value'),
    ]);
    student._hasAccount  = uidSnap.val() !== null;
    student._resetCount  = rcSnap.val() || 0;
  } catch {
    // 연결 실패를 신규 가입으로 오인하면 안 됨 (기존 학생이 PIN 재설정 화면을 보게 됨)
    showLoading(false);
    showToast('연결이 불안정해요. 잠시 후 다시 눌러주세요 📶');
    return;
  } finally {
    showLoading(false);
  }

  if (!student._hasAccount) {
    openStudentPwModal('set', student);
  } else {
    openStudentPwModal('enter', student);
  }
}

function proceedAsStudent(student) {
  addRecentEntry(student.id);
  currentStudent = student;
  weekOffset = 0;
  document.getElementById('entry-error').textContent = '';
  fetchClientIP();
  openRecordScreen();
}
