<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>생명과학 복습 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  :root{
    --blue-pastel:#C5E3F7;
    --green-pastel:#C3E9CC;
    --blue-dark:#1255A0;
    --green-dark:#2A7A38;
    --red-accent:#C0392B;
    --amber:#E67E22;
    --purple:#7B5EA7;
    --text-main:#1A1A1A;
    --text-light:#555;
    --line:#BBBBBB;
    --bg:#E1F2FC;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-main);}
  body{min-height:100vh;display:flex;justify-content:center;padding:16px;}
  .container{width:100%;max-width:820px;}

  .card{background:#fff;border-radius:16px;padding:24px;margin-bottom:14px;box-shadow:0 4px 16px rgba(18,85,160,.06);}
  .btn{display:inline-block;padding:14px 28px;min-height:48px;border:none;border-radius:99px;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s ease;font-family:inherit;}
  .btn-primary{background:var(--blue-dark);color:#fff;}
  .btn-primary:hover{background:#0E468A;}
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{background:#B9C7D6;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--text-light);border:2px solid var(--line);}
  .btn-ghost:hover{background:#F0F3F7;}

  /* ===== 공통 헤더 ===== */
  .app-header{background:#fff;border-radius:16px;padding:22px 24px;box-shadow:0 4px 16px rgba(18,85,160,.08);border-left:6px solid var(--blue-dark);margin-bottom:16px;position:relative;}
  .app-header h1{margin:0;font-size:22px;color:var(--blue-dark);font-weight:900;cursor:pointer;user-select:none;display:inline-block;}
  .app-header .sub{margin-top:4px;font-size:13px;color:var(--text-light);}
  .admin-link{background:none;border:1px solid var(--line);font-family:inherit;font-size:13px;color:var(--text-light);cursor:pointer;padding:9px 18px;min-height:40px;border-radius:99px;opacity:.75;transition:all .15s ease;}
  .admin-link:hover{opacity:1;background:#fff;color:var(--blue-dark);border-color:var(--blue-dark);}
  .credit{text-align:center;font-size:11px;color:#888;padding:20px 0 8px;}

  /* ===== 로그인 / 계정 ===== */
  .login-err{color:var(--red-accent);font-size:13px;min-height:18px;margin-top:6px;font-weight:500;}
  .login-who{display:inline-block;background:var(--blue-pastel);color:var(--blue-dark);font-weight:700;font-size:14px;padding:7px 16px;border-radius:99px;margin-bottom:14px;}
  .account-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border-radius:12px;padding:10px 16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(18,85,160,.05);font-size:13px;}
  .account-bar .acct-who{font-weight:700;color:var(--blue-dark);}
  .account-bar .acct-who small{font-weight:500;color:var(--text-light);}
  .logout-btn{background:none;border:1px solid var(--line);color:var(--text-light);font-family:inherit;font-size:12px;font-weight:600;padding:7px 14px;min-height:36px;border-radius:99px;cursor:pointer;flex-shrink:0;}
  .logout-btn:hover{border-color:var(--red-accent);color:var(--red-accent);}
  .intro-prog{display:flex;gap:10px;justify-content:center;margin:4px 0 20px;flex-wrap:wrap;}
  .intro-prog .ip-box{background:#F5F8FC;border-radius:10px;padding:10px 16px;min-width:88px;}
  .intro-prog .ip-num{font-size:22px;font-weight:900;color:var(--blue-dark);line-height:1.1;}
  .intro-prog .ip-num.review{color:var(--amber);}
  .intro-prog .ip-num.done{color:var(--green-dark);}
  .intro-prog .ip-lbl{font-size:11.5px;color:var(--text-light);margin-top:3px;}

  /* ===== 완성도 도넛 + 캐릭터 ===== */
  .donut{position:relative;display:inline-flex;flex-shrink:0;}
  .donut .donut-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--blue-dark);}
  .completion{display:flex;align-items:center;justify-content:center;gap:22px;margin:6px 0 14px;flex-wrap:wrap;}
  .char{text-align:center;min-width:96px;}
  .char .face{font-size:50px;line-height:1;}
  .char .msg{font-size:13px;color:var(--text-light);margin-top:6px;font-weight:700;}
  .prog-sub{font-size:12.5px;color:var(--text-light);text-align:center;margin-bottom:2px;}
  .qc-prog{display:flex;align-items:center;gap:7px;}
  .qc-prog .qc-face{font-size:20px;line-height:1;}

  .screen{display:none;}
  .screen.active{display:block;}

  /* ===== 허브 (퀴즈 목록) ===== */
  .unit-group{margin-bottom:20px;}
  .unit-title{font-size:14px;font-weight:700;color:var(--text-light);margin:0 0 10px 4px;display:flex;align-items:center;gap:8px;}
  .unit-title::before{content:'';width:14px;height:14px;border-radius:4px;background:var(--blue-dark);}
  .unit-title.green::before{background:var(--green-dark);}
  .unit-title.amber::before{background:var(--amber);}
  .unit-title.purple::before{background:var(--purple);}
  .quiz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
  .quiz-card{background:#fff;border-radius:16px;padding:18px 20px;box-shadow:0 4px 16px rgba(18,85,160,.06);border-top:5px solid var(--blue-dark);cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;display:flex;flex-direction:column;text-align:left;border-left:none;border-right:none;border-bottom:none;font-family:inherit;width:100%;}
  .quiz-card.green{border-top-color:var(--green-dark);}
  .quiz-card.amber{border-top-color:var(--amber);}
  .quiz-card.purple{border-top-color:var(--purple);}
  .quiz-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(18,85,160,.14);}
  .quiz-card:active{transform:translateY(-1px);}
  .qc-tag{display:inline-block;align-self:flex-start;padding:4px 11px;border-radius:99px;background:var(--blue-pastel);color:var(--blue-dark);font-size:11px;font-weight:700;margin-bottom:10px;}
  .quiz-card.green .qc-tag{background:var(--green-pastel);color:var(--green-dark);}
  .quiz-card.amber .qc-tag{background:#FDE9C9;color:var(--amber);}
  .quiz-card.purple .qc-tag{background:#EAE2F5;color:var(--purple);}
  .qc-title{font-size:17px;font-weight:900;color:var(--text-main);line-height:1.35;margin-bottom:6px;}
  .qc-sub{font-size:12.5px;color:var(--text-light);line-height:1.5;flex:1;}
  .qc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
  .qc-count{font-size:12px;color:var(--text-light);font-weight:500;}
  .qc-go{font-size:13px;font-weight:700;color:var(--blue-dark);}
  .quiz-card.green .qc-go{color:var(--green-dark);}
  .quiz-card.amber .qc-go{color:var(--amber);}
  .quiz-card.purple .qc-go{color:var(--purple);}
  .hub-empty{padding:40px 24px;text-align:center;color:var(--text-light);font-size:14px;}
  .conn-status{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#888;margin-top:6px;}
  .conn-dot{width:8px;height:8px;border-radius:50%;background:#ccc;}
  .conn-dot.ok{background:#2A7A38;}
  .conn-dot.err{background:#C0392B;}

  /* ===== 뒤로가기 바 ===== */
  .back-bar{margin-bottom:12px;}
  .back-btn{background:none;border:none;font-family:inherit;font-size:14px;color:var(--text-light);cursor:pointer;padding:6px 4px;font-weight:500;}
  .back-btn:hover{color:var(--blue-dark);}

  /* ===== 시작화면 ===== */
  .intro-card{padding:32px 28px;text-align:center;}
  .intro-card .intro-tag{display:inline-block;padding:5px 13px;border-radius:99px;background:var(--blue-pastel);color:var(--blue-dark);font-size:12px;font-weight:700;margin-bottom:12px;}
  .intro-card h2{margin:0 0 8px;font-size:22px;color:var(--blue-dark);}
  .intro-card .desc{color:var(--text-light);font-size:14px;margin-bottom:24px;line-height:1.7;}
  .field{margin-bottom:14px;text-align:left;}
  .field label{display:block;font-size:13px;color:var(--text-light);margin-bottom:6px;font-weight:500;}
  .field input{width:100%;padding:14px 16px;font-size:16px;border:2px solid #E0E5EC;border-radius:10px;font-family:inherit;background:#FAFBFD;transition:border-color .15s;}
  .field input:focus{outline:none;border-color:var(--blue-dark);background:#fff;}
  .intro-card .actions{margin-top:20px;}
  .intro-card .btn{width:100%;padding:16px;}
  .hint{margin-top:14px;font-size:12px;color:#999;}

  /* ===== 진행바 ===== */
  .progress-wrap{background:#fff;border-radius:16px;padding:16px 20px;margin-bottom:16px;box-shadow:0 4px 16px rgba(18,85,160,.06);}
  .progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:14px;color:var(--text-light);font-weight:500;}
  .progress-top .who{color:var(--blue-dark);font-weight:700;}
  .progress-top .score{color:var(--green-dark);font-weight:700;}
  .progress-bar{height:10px;background:#E5EAF0;border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue-dark),var(--green-dark));border-radius:99px;width:0%;transition:width .4s ease;}

  /* ===== 퀴즈 ===== */
  .chapter-tag{display:inline-block;padding:5px 12px;border-radius:99px;background:var(--blue-pastel);color:var(--blue-dark);font-size:12px;font-weight:700;margin-bottom:12px;letter-spacing:.3px;}
  .chapter-tag.green{background:var(--green-pastel);color:var(--green-dark);}
  .chapter-tag.amber{background:#FDE9C9;color:var(--amber);}
  .chapter-tag.purple{background:#EAE2F5;color:var(--purple);}
  .q-num{font-size:13px;color:var(--text-light);font-weight:500;margin-bottom:6px;}
  .q-text{font-size:17px;font-weight:500;line-height:1.6;margin:0 0 18px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;min-height:54px;border:2px solid #E0E5EC;border-radius:12px;background:#FAFBFD;font-size:16px;line-height:1.5;cursor:pointer;transition:all .15s ease;color:var(--text-main);text-align:left;font-family:inherit;}
  .opt:hover{border-color:var(--blue-dark);background:#F1F7FD;}
  .opt:active{transform:scale(0.99);}
  .opt .num{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:#E0E5EC;color:var(--text-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
  .opt.selected{border-color:var(--blue-dark);background:#E8F1FB;}
  .opt.selected .num{background:var(--blue-dark);color:#fff;}
  .opt.correct{border-color:var(--green-dark);background:#E8F5EC;}
  .opt.correct .num{background:var(--green-dark);color:#fff;}
  .opt.wrong{border-color:var(--red-accent);background:#FCEEEC;}
  .opt.wrong .num{background:var(--red-accent);color:#fff;}
  .opt.locked{cursor:default;}
  .opt.locked:hover{background:#FAFBFD;border-color:#E0E5EC;}
  .opt.locked.selected:hover{background:#E8F1FB;border-color:var(--blue-dark);}
  .opt.locked.correct:hover{background:#E8F5EC;border-color:var(--green-dark);}
  .opt.locked.wrong:hover{background:#FCEEEC;border-color:var(--red-accent);}
  .feedback{margin-top:14px;padding:12px 16px;border-radius:10px;font-size:14px;line-height:1.6;display:none;}
  .feedback.show{display:block;}
  .feedback.ok{background:#E8F5EC;border-left:4px solid var(--green-dark);color:#1B4E26;}
  .feedback.ng{background:#FCEEEC;border-left:4px solid var(--red-accent);color:#7A1F15;}
  .feedback b{font-weight:700;}

  /* ===== 결과 ===== */
  .result{text-align:center;padding:40px 24px;}
  .result .emoji{font-size:60px;margin-bottom:10px;}
  .result h2{margin:0 0 8px;font-size:24px;color:var(--blue-dark);}
  .result .score-big{font-size:48px;font-weight:900;color:var(--green-dark);margin:18px 0 8px;}
  .result .score-sub{color:var(--text-light);font-size:14px;margin-bottom:24px;}
  .result .breakdown{background:#F5F8FC;border-radius:12px;padding:16px;margin-bottom:24px;text-align:left;font-size:14px;line-height:1.9;}
  .result .breakdown .row{display:flex;justify-content:space-between;}
  .result .breakdown .row b{color:var(--blue-dark);}
  .save-note{font-size:13px;color:var(--text-light);margin:-10px 0 18px;}

  /* ===== 결과 상세(자세히 보기) ===== */
  .review-wrap{margin-top:18px;text-align:left;}
  .review-item{background:#fff;border:1px solid #E0E5EC;border-radius:12px;padding:16px 16px 14px;margin-bottom:12px;}
  .rv-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .rv-no{font-size:13px;font-weight:700;color:var(--text-light);}
  .rv-mark{display:inline-flex;align-items:center;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700;}
  .rv-mark.ok{background:#E8F5EC;color:var(--green-dark);}
  .rv-mark.ng{background:#FCEEEC;color:var(--red-accent);}
  .rv-chapter{font-size:11.5px;color:var(--text-light);margin-left:auto;}
  .rv-q{font-size:15px;font-weight:500;line-height:1.55;margin-bottom:10px;}
  .rv-opt{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border:1.5px solid #ECEFF3;border-radius:9px;font-size:14px;line-height:1.45;margin-bottom:6px;color:var(--text-main);}
  .rv-opt .rv-onum{flex-shrink:0;width:21px;height:21px;border-radius:50%;background:#E5EAF0;color:var(--text-light);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;}
  .rv-opt .rv-otxt{flex:1;}
  .rv-opt .rv-tag{flex-shrink:0;font-size:11px;font-weight:700;padding:1px 8px;border-radius:99px;}
  .rv-opt.correct{border-color:var(--green-dark);background:#EEF8F1;}
  .rv-opt.correct .rv-onum{background:var(--green-dark);color:#fff;}
  .rv-opt.correct .rv-tag{background:var(--green-dark);color:#fff;}
  .rv-opt.mywrong{border-color:var(--red-accent);background:#FDEFED;}
  .rv-opt.mywrong .rv-onum{background:var(--red-accent);color:#fff;}
  .rv-opt.mywrong .rv-tag{background:var(--red-accent);color:#fff;}
  .rv-explain{margin-top:8px;font-size:13px;line-height:1.55;color:var(--text-light);background:#F5F8FC;border-radius:8px;padding:10px 12px;}

  /* ===== 전체 로딩 ===== */
  .full-loading{position:fixed;inset:0;background:rgba(255,255,255,.8);display:none;align-items:center;justify-content:center;z-index:200;}
  .full-loading.show{display:flex;}
  .spinner{width:36px;height:36px;border:3px solid #E0E5EC;border-top-color:var(--blue-dark);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ===== 모바일 (작은 화면) ===== */
  @media (max-width:480px){
    body{padding:12px;}
    .card{padding:18px;border-radius:14px;}
    .app-header{padding:18px 18px;border-radius:14px;margin-bottom:14px;}
    .app-header h1{font-size:19px;}
    .quiz-grid{grid-template-columns:1fr;gap:12px;}
    .quiz-card{padding:16px 16px;}
    .qc-title{font-size:16px;}
    .intro-card{padding:26px 18px;}
    .intro-card h2{font-size:20px;}
    .progress-wrap{padding:14px 16px;}
    .q-text{font-size:16px;}
    .opt{font-size:15.5px;padding:13px 14px;}
    .result{padding:30px 18px;}
    .result .emoji{font-size:46px;}
    .result h2{font-size:21px;}
    .result .score-big{font-size:38px;}
  }
</style>
</head>
<body>
<div class="container">

  <div class="app-header">
    <h1 id="appTitle">🧬 생명과학 복습 퀴즈</h1>
    <div class="sub" id="appSub">학번·이름·PIN으로 로그인하세요</div>
  </div>

  <!-- ===== 로그인 (2단계: 학번/이름 → PIN) ===== -->
  <div id="screen-login" class="screen active">
    <div class="card intro-card">
      <span class="intro-tag">생명과학 복습 퀴즈</span>
      <h2 id="loginTitle">로그인 / 시작하기</h2>
      <div class="desc" id="loginDesc">학번과 이름을 입력하세요.</div>

      <!-- 1단계: 학번 + 이름 -->
      <div id="loginStep1">
        <div class="field">
          <label for="loginSid">학번 (4~5자리)</label>
          <input id="loginSid" type="tel" pattern="[0-9]*" inputmode="numeric" maxlength="5" placeholder="예: 20704">
        </div>
        <div class="field">
          <label for="loginName">이름</label>
          <input id="loginName" type="text" maxlength="10" placeholder="이름">
        </div>
        <div class="login-err" id="loginErr1"></div>
        <div class="actions">
          <button class="btn btn-primary" id="btnNext" onclick="loginNext()" disabled style="width:100%;padding:16px;">연결 중...</button>
        </div>
      </div>

      <!-- 2단계: PIN -->
      <div id="loginStep2" style="display:none;">
        <div class="login-who" id="loginWho"></div>
        <div class="field">
          <label for="loginPin" id="pinLabel">PIN (숫자 4자리)</label>
          <input id="loginPin" type="tel" pattern="[0-9]*" inputmode="numeric" maxlength="4" placeholder="● ● ● ●">
        </div>
        <div class="field" id="pinConfirmField" style="display:none;">
          <label for="loginPin2">PIN 확인 (한 번 더)</label>
          <input id="loginPin2" type="tel" pattern="[0-9]*" inputmode="numeric" maxlength="4" placeholder="● ● ● ●">
        </div>
        <div class="login-err" id="loginErr2"></div>
        <div class="actions">
          <button class="btn btn-primary" id="btnPinSubmit" onclick="loginPinSubmit()" style="width:100%;padding:16px;">로그인</button>
        </div>
        <div style="text-align:center;margin-top:10px;">
          <button class="back-btn" onclick="loginBack()">← 학번·이름 다시 입력</button>
        </div>
      </div>

      <div class="hint">※ 학번·이름으로 학습 진도가 저장됩니다. PIN을 잊으면 선생님께 초기화를 요청하세요.</div>
    </div>
    <div class="conn-status" style="justify-content:center;width:100%;margin-top:10px;">
      <span class="conn-dot" id="connDot"></span><span id="connText">서버 연결 중...</span>
    </div>
    <div style="text-align:center;margin-top:16px;">
      <button class="admin-link" onclick="location.href='admin.html'">🔒 관리자</button>
    </div>
  </div>

  <!-- ===== 허브 (퀴즈 목록) ===== -->
  <div id="screen-hub" class="screen">
    <div class="account-bar" id="accountBar">
      <span class="acct-who" id="acctWho">—</span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
    <div id="hubList"></div>
    <div style="text-align:center;margin-top:18px;">
      <button class="admin-link" onclick="location.href='admin.html'">🔒 관리자</button>
    </div>
  </div>

  <!-- ===== 시작화면 ===== -->
  <div id="screen-intro" class="screen">
    <div class="back-bar"><button class="back-btn" onclick="goHub()">← 퀴즈 목록</button></div>
    <div class="card intro-card">
      <span class="intro-tag" id="introTag">—</span>
      <h2 id="introTitle">퀴즈 시작</h2>
      <div class="desc" id="introDesc"></div>
      <div class="intro-prog" id="introProg"></div>
      <div class="actions">
        <button class="btn btn-primary" id="btnStart" onclick="startQuiz()" style="width:100%;padding:16px;">시작하기 (10문항)</button>
      </div>
      <div class="hint">※ 한 번에 10문항이 무작위로 출제됩니다. 틀린 문제는 다음에 다시 나와요.</div>
    </div>
  </div>

  <!-- ===== 퀴즈 화면 ===== -->
  <div id="screen-quiz" class="screen">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="who" id="whoText">—</span>

      {chapter:'2-6 감염성 질환의 예방',tagClass:'amber',q:'백신 접종과 함께 감염성 질환을 예방하는 행동으로 옳지 <b>않은</b> 것은?',options:['손 씻기','마스크 착용','물 끓여 마시기','감염자와 식기를 함께 쓰기'],answer:3,explain:'손 씻기·마스크·물 끓여 마시기는 감염 경로를 차단합니다. 감염자와 식기를 함께 쓰면 오히려 감염 위험이 커져요.'}

      {chapter:'3-1 염색체의 구조',tagClass:'purple',q:'중심절과 동원체에 대한 설명으로 옳은 것은?',options:['둘 다 염색체를 이루는 부위이다','중심절은 염색체의 한 부위이고, 동원체는 거기에 붙는 단백질 복합체이다','동원체는 염색체 부위이고, 중심절은 거기에 붙는 단백질이다','방추사는 중심절에 직접 붙는다'],answer:1,explain:'중심절은 염색체 부위, 동원체는 중심절에 붙는 단백질 복합체이며, 방추사는 그 동원체에 부착됩니다.'},

      {chapter:'3-1 염색체의 구조',tagClass:'purple',q:'세포가 분열하지 <b>않는</b> 시기(간기)의 염색체 상태로 옳은 것은?',options:['짧고 두꺼운 막대 모양으로 응축되어 있다','풀어진 상태(염색사)로 핵 안에 퍼져 있어 광학 현미경으로 관찰하기 어렵다','핵 밖으로 빠져나와 세포질에 흩어져 있다','항상 두 가닥의 염색분체로 갈라져 있다'],answer:1,explain:'분열하지 않는 시기에는 유전정보를 쉽게 사용하도록 풀어진 염색사 상태로 있어 광학 현미경으로 보기 어렵습니다. 분열기에는 응축되어 막대 모양으로 관찰됩니다.'},

      {chapter:'3-1 염색체의 구조',tagClass:'purple',q:'"염색체는 분열기에만 존재한다"라는 설명에 대한 가장 옳은 평가는?',options:['옳다. 간기에는 염색체가 사라진다','옳다. 염색체는 중기에만 만들어진다','옳지 않다. 염색체는 어느 시기에나 존재하며, 간기에는 풀어진 염색사 형태로 있을 뿐이다','옳지 않다. 염색체는 분열기에도 존재하지 않는다'],answer:2,explain:'염색체와 염색사는 같은 물질의 다른 상태입니다. 간기에는 풀어진 염색사, 분열기에는 응축된 염색체로 관찰됩니다(사라지는 것이 아님).'},
      {chapter:'3-1 염색체의 구조',tagClass:'purple',q:'유전자에 대한 설명으로 옳은 것은?',options:['모든 유전자는 반드시 단백질의 아미노산 서열 정보만 담는다','단백질 정보 외에, 기능을 가지는 RNA의 염기서열 정보를 담는 유전자도 있다','유전자는 DNA가 아니라 히스톤 단백질로 이루어져 있다','한 염색체에는 유전자가 단 하나만 들어 있다'],answer:1,explain:'유전자는 보통 단백질의 아미노산 서열 정보를 담지만, 단백질로 번역되지 않고 기능을 갖는 RNA의 정보를 담는 것도 있습니다. 한 염색체에는 수많은 유전자가 있습니다.'},
      {chapter:'3-1 염색체의 구조',tagClass:'purple',q:'상동염색체에 대한 설명으로 옳은 것은?',options:['모양·크기가 서로 다른 염색체 한 쌍이다','둘 다 아버지로부터 물려받은 것이다','모양·크기가 같은 한 쌍으로, 하나는 아버지·하나는 어머니에게서 물려받는다','한 염색체를 이루는 두 염색분체를 가리킨다'],answer:2,explain:'상동염색체는 모양·크기가 같은 염색체 쌍으로, 부모에게서 각각 하나씩 물려받습니다. (한 염색체의 두 가닥은 ‘염색분체’로 다른 개념)'},
      {chapter:'3-1 염색체의 구조',tagClass:'purple',q:'한 쌍의 상동염색체에서 특정 유전자 자리의 대립유전자 구성과, 한 염색체를 이루는 두 염색분체의 대립유전자 구성을 옳게 비교한 것은?',options:['둘 다 항상 같다','둘 다 항상 다르다','상동염색체의 대립유전자는 같을 수도 다를 수도 있고, 두 염색분체의 구성은 서로 같다','상동염색체는 항상 같고, 두 염색분체는 항상 다르다'],answer:2,explain:'상동염색체는 부모에게서 따로 받아 대립유전자가 같을 수도 다를 수도 있습니다. 반면 두 염색분체는 DNA 복제로 만들어져 구성이 같습니다.'},

      {chapter:'3-1 염색체의 구조',tagClass:'purple',q:'같은 종에 속하는 정상적으로 건강한 두 사람의 핵형이 서로 같으려면 어떤 조건이 필요한가?',options:['나이가 같아야 한다','성별이 같아야 한다','키와 몸무게가 같아야 한다','부모가 같아야 한다'],answer:1,explain:'핵형은 종에 따라 다르고, 같은 종이라도 성염색체 구성이 다르면(남 XY / 여 XX) 핵형이 달라집니다. 따라서 성별이 같아야 핵형이 같습니다. (건강 조건 중요! 핵형이 달라서 유전질환을 갖고 있을 수 있음)'},

      {chapter:'3-1 염색체의 구조',tagClass:'purple',q:'어떤 세포의 핵상이 2n=6으로 표시되었다. 이에 대한 설명으로 옳은 것은?',options:['서로 다른 모양의 염색체가 6쌍 있다','상동염색체가 쌍으로 존재하며, 전체 염색체 수는 6개이다','상동염색체가 하나씩만 있고, 전체 염색체 수는 6개이다','핵상이 2n이면 어떤 생물이든 염색체 수는 항상 6개이다'],answer:1,explain:'2n은 상동염색체가 쌍으로 존재하는 상태, =6은 전체 염색체 수가 6개임을 뜻합니다(상동염색체 3쌍). 같은 2n이라도 종마다 수는 다릅니다.'}

// Firebase는 빈 인덱스/희소 배열을 객체로 복원 → 안전 변환
function toArray(v){
  if(Array.isArray(v)) return v;
  if(v && typeof v === 'object') return Object.values(v);
  return [];
}
function activeCount(quiz){ return quiz.questions.filter(q => !q.hidden).length; }

// 코드의 기본 문항(SEED)을 DB 객체 형태로 변환
function quizToDbObject(quiz, order){
  return {
    unit: quiz.unit, unitColor: quiz.unitColor || 'blue', color: quiz.color || 'blue',
    title: quiz.title, subtitle: quiz.subtitle || '', order: order,
    questions: quiz.questions.map(q => {
      const o = {chapter:q.chapter||'', tagClass:q.tagClass||'', q:q.q, options:q.options, answer:q.answer, explain:q.explain||''};
      if(q.hidden) o.hidden = true;
      return o;
    }),
    updatedAt: firebase.database.ServerValue.TIMESTAMP
  };
}

// DB의 quizzes/ → 화면용 QUIZZES 배열 형태로
function dbToQuizzes(obj){
  return Object.keys(obj).map(id => {
    const z = obj[id] || {};
    return {
      id,
      unit: z.unit || '', unitColor: z.unitColor || 'blue', color: z.color || 'blue',
      title: z.title || id, subtitle: z.subtitle || '',
      order: (typeof z.order === 'number') ? z.order : 9999,
      questions: toArray(z.questions).map(q => ({
        chapter:q.chapter||'', tagClass:q.tagClass||'', q:q.q||'',
        options: toArray(q.options), answer: (typeof q.answer==='number'?q.answer:0),
        explain: q.explain||'', hidden: !!q.hidden
      }))
    };
  }).sort((a,b)=> a.order - b.order || a.id.localeCompare(b.id));
}

let isAuthed = false;
async function initFirebase(){
  try {
    await auth.signInAnonymously();
    isAuthed = true;
    // ① DB에 없는 퀴즈는 기본 문항으로 시드(이미 있으면 건드리지 않음 — 관리자 편집 보존)
    await Promise.all(QUIZZES.map((quiz, i) =>
      db.ref(`quizzes/${quiz.id}`).transaction(cur => (cur === null) ? quizToDbObject(quiz, i*10) : undefined)
    ));
    // ② DB에서 최신 문항 로드 → 출제에 사용 (실패 시 코드 기본 문항으로 폴백)
    try {
      const snap = await db.ref('quizzes').once('value');
      const obj = snap.val();
      if(obj && Object.keys(obj).length){ QUIZZES = dbToQuizzes(obj); }
    } catch(e){ console.error('퀴즈 로드 실패 — 기본 문항으로 진행', e); }
    // ③ 관리자 대시보드용 메타 등록 (드롭다운/통계). questions는 원본 인덱스 정렬 유지(전체), totalQuestions는 노출 문항 수
    await Promise.all(QUIZZES.map(quiz =>
      db.ref(`quizMeta/${quiz.id}`).update({
        title: quiz.title,
        subtitle: quiz.subtitle,
        totalQuestions: activeCount(quiz),
        questions: quiz.questions.map(q => ({chapter:q.chapter, q:q.q, options:q.options, answer:q.answer, hidden: !!q.hidden})),
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      })
    ));
    setConnStatus(true, '서버 연결됨');
    const btn = document.getElementById('btnNext');
    btn.disabled = false; btn.textContent = '다음';
  } catch(e) {
    console.error('Firebase 초기화 실패:', e);
    setConnStatus(false, '서버 연결 실패 — 새로고침해 주세요');
  }
  // 저장된 세션이 있으면 자동 로그인
  const s = loadSession();
  if(s && s.uid){ currentUser = s; enterApp(); }
  else { goScreen('login'); }
}
function setConnStatus(ok, msg){
  const dot = document.getElementById('connDot');
  const txt = document.getElementById('connText');
  if(!dot || !txt) return;
  dot.classList.remove('ok','err');
  dot.classList.add(ok ? 'ok' : 'err');
  txt.textContent = msg;
}

   ========================================================== */
async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function pinHashFor(sid, pin){ return sha256(`${PIN_SALT}|${sid}|${pin}`); }

function loadSession(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }catch(e){ return null; } }
function saveSession(){ try{ localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser)); }catch(e){} }
function clearSession(){ try{ localStorage.removeItem(SESSION_KEY); }catch(e){} }

function showErr1(msg){ document.getElementById('loginErr1').textContent = msg || ''; }

// 학번이 키 — 학번으로 조회(이름은 검증/등록용). 학번은 학교 내 고유.
async function findByStudentId(sid){
  const snap = await db.ref('students').orderByChild('studentId').equalTo(sid).once('value');
  let found = null;
  snap.forEach(ch => { if(!found) found = {uid: ch.key, ...ch.val()}; });
  return found;
}

// 1단계: 학번·이름 확인 → 신규/재방문/초기화 판정 후 PIN 단계로
async function loginNext(){
  if(!isAuthed){ showErr1('서버 연결 중입니다. 잠시 후 다시 시도하세요.'); return; }
  const sid = document.getElementById('loginSid').value.trim();
  const name = document.getElementById('loginName').value.trim();
  showErr1('');
  if(!/^\d{4,5}$/.test(sid)){ showErr1('학번은 4~5자리 숫자여야 합니다.'); return; }
  if(!name){ showErr1('이름을 입력해주세요.'); return; }

  const btn = document.getElementById('btnNext');
  btn.disabled = true; btn.textContent = '확인 중...';
  try {
    const acct = await findByStudentId(sid);
    // 이미 등록된 학번인데 이름이 다르면 거부 (fieldnote 방식)
    if(acct && acct.name && acct.name !== name){
      showErr1('이 학번은 다른 이름으로 등록되어 있어요. 이름을 다시 확인하거나 선생님께 문의하세요.');
      return;
    }
    loginAcct = acct;
    loginPendingSid = sid;
    loginPendingName = name;
    loginMode = (acct && acct.pinHash) ? 'verify' : (acct ? 'reset' : 'new');
    showPinStep();
  } catch(e){
    console.error('학번 조회 실패', e);
    showErr1('오류가 발생했습니다. 다시 시도해주세요.');
  } finally {
    btn.disabled = false;
    if(btn.textContent === '확인 중...') btn.textContent = '다음';
  }
}

function showPinStep(){
  document.getElementById('loginStep1').style.display = 'none';
  document.getElementById('loginStep2').style.display = '';
  document.getElementById('loginWho').textContent = `${loginPendingSid} · ${loginPendingName}`;
  const confirmField = document.getElementById('pinConfirmField');
  const desc = document.getElementById('loginDesc');
  const label = document.getElementById('pinLabel');
  const sub = document.getElementById('btnPinSubmit');
  document.getElementById('loginPin').value = '';
  document.getElementById('loginPin2').value = '';
  showErr2('');
  if(loginMode === 'verify'){
    confirmField.style.display = 'none';
    label.textContent = 'PIN (숫자 4자리)';
    desc.textContent = 'PIN을 입력하세요.';
    sub.textContent = '로그인';
  } else {
    confirmField.style.display = '';
    label.textContent = '새 PIN (숫자 4자리)';
    desc.innerHTML = (loginMode === 'reset')
      ? 'PIN이 초기화된 계정입니다. 사용할 <b>새 PIN</b>을 설정하세요.'
      : '처음이네요! 사용할 <b>PIN</b>을 설정하세요.';
    sub.textContent = (loginMode === 'reset') ? 'PIN 설정하고 시작' : '가입하고 시작';
  }
  document.getElementById('loginPin').focus();
}

// 2단계: PIN 검증(재방문) 또는 설정(신규/초기화)
async function loginPinSubmit(){
  const pin = document.getElementById('loginPin').value.trim();
  showErr2('');
  if(!/^\d{4}$/.test(pin)){ showErr2('PIN은 숫자 4자리여야 합니다.'); return; }
  const btn = document.getElementById('btnPinSubmit');
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '확인 중...';
  try {
    if(loginMode === 'verify'){
      const h = await pinHashFor(loginPendingSid, pin);
      if(h === loginAcct.pinHash){ loginSuccess(loginAcct.uid, loginPendingSid, loginPendingName); return; }
      showErr2('PIN이 올바르지 않습니다.'); return;
    }
    const pin2 = document.getElementById('loginPin2').value.trim();
    if(pin !== pin2){ showErr2('PIN이 일치하지 않습니다. 다시 확인해주세요.'); return; }
    const hash = await pinHashFor(loginPendingSid, pin);
    let uid;
    if(loginAcct){
      uid = loginAcct.uid;
      await db.ref(`students/${uid}`).update({pinHash: hash, name: loginPendingName});
    } else {
      const ref = db.ref('students').push(); uid = ref.key;
      await ref.set({studentId: loginPendingSid, name: loginPendingName, pinHash: hash, createdAt: firebase.database.ServerValue.TIMESTAMP});
    }
    loginSuccess(uid, loginPendingSid, loginPendingName);
  } catch(e){
    console.error('로그인 실패', e);
    showErr2('오류가 발생했습니다. 다시 시도해주세요.');
  } finally {
    btn.disabled = false;
    if(btn.textContent === '확인 중...') btn.textContent = orig;
  }
}

let myProgressAll = {};   // {quizId: {seen, wrong}} — 로그인 직후 한 번에 로드

// 완성도 = (seen 이면서 wrong 아닌 문항 수) / 전체 문항 수
function completionOf(quiz, prog){
  // 숨김 문항은 분모/분자에서 제외 (원본 인덱스는 유지)
  const active = quiz.questions.map((q,i)=>i).filter(i => !quiz.questions[i].hidden);
  const N = active.length;
  if(!N) return 0;
  const seen = (prog && prog.seen) || {};
  const wrong = (prog && prog.wrong) || {};
  let mastered = 0;
  active.forEach(i => { if(seen[i] && !wrong[i]) mastered++; });
  return Math.round(100 * mastered / N);
}

// 원형 도넛 그래프 SVG
function donutSVG(pct, size, stroke){
  pct = Math.max(0, Math.min(100, pct));
  const r = (size - stroke) / 2, cx = size / 2, c = 2 * Math.PI * r;
  const off = c * (1 - pct / 100);
  const color = pct >= 100 ? 'var(--green-dark)' : pct >= 40 ? 'var(--blue-dark)' : pct > 0 ? 'var(--amber)' : '#CBD5E1';
  return `<div class="donut" style="width:${size}px;height:${size}px;">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="#E5EAF0" stroke-width="${stroke}"/>
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
        stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${cx} ${cx})"
        style="transition:stroke-dashoffset .6s ease;"/>
    </svg>
    <div class="donut-pct" style="font-size:${Math.round(size*0.26)}px;">${pct}%</div>
  </div>`;
}

// 진행도에 따른 캐릭터 표정 (0%자다 → 지루 → 웃음 → 신남 → 완성)
function charFace(pct){
  if(pct >= 100) return {emoji:'🥳', msg:'완성! 최고야!'};
  if(pct >= 80)  return {emoji:'😆', msg:'거의 다 왔어!'};
  if(pct >= 40)  return {emoji:'😊', msg:'좋아, 더 가보자!'};
  if(pct > 0)    return {emoji:'😐', msg:'음… 조금 더?'};
  return {emoji:'😴', msg:'쿨쿨… 깨워줘!'};
}

/* ==========================================================
   허브 — 퀴즈 목록 렌더링 (단원별 그룹)
   ========================================================== */
function renderHub(){
  const wrap = document.getElementById('hubList');
  if(!QUIZZES.length){
    wrap.innerHTML = '<div class="card hub-empty">아직 등록된 퀴즈가 없습니다.</div>';
    return;
  }
  // 단원별 그룹화 (배열 등장 순서 유지)
  const groups = [];
  QUIZZES.forEach(quiz => {
    let g = groups.find(x => x.unit === quiz.unit);
    if(!g){ g = {unit:quiz.unit, unitColor:quiz.unitColor||'blue', items:[]}; groups.push(g); }
    g.items.push(quiz);
  });
  wrap.innerHTML = groups.map(g => `
    <div class="unit-group">
      <p class="unit-title ${g.unitColor}">${escapeHtml(g.unit)}</p>
      <div class="quiz-grid">
        ${g.items.map(quiz => {
          const pct = completionOf(quiz, myProgressAll[quiz.id]);
          return `
          <button class="quiz-card ${quiz.color||'blue'}" onclick="openQuiz('${quiz.id}')">
            <span class="qc-tag">${escapeHtml(quiz.unit)}</span>
            <div class="qc-title">${escapeHtml(quiz.title)}</div>
            <div class="qc-sub">${escapeHtml(quiz.subtitle||'')}</div>
            <div class="qc-foot">
              <span class="qc-count">총 ${activeCount(quiz)}문항</span>
              <span class="qc-prog"><span class="qc-face">${charFace(pct).emoji}</span>${donutSVG(pct,40,5)}<span class="qc-go">풀기 →</span></span>
            </div>
          </button>`; }).join('')}
      </div>
    </div>`).join('');
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ==========================================================
   퀴즈 진입 — 시작화면
   ========================================================== */
let currentQuiz = null;          // 선택된 퀴즈 객체
let currentAttempt = 1;
let progressState = {seen:{}, wrong:{}};   // 현재 퀴즈의 진도

async function openQuiz(quizId){
  if(!currentUser){ goScreen('login'); return; }
  currentQuiz = QUIZZES.find(q => q.id === quizId);
  if(!currentQuiz) return;
  document.getElementById('introTag').textContent = currentQuiz.unit;
  document.getElementById('introTitle').textContent = currentQuiz.title;
  document.getElementById('introDesc').innerHTML = escapeHtml(currentQuiz.subtitle||'');
  document.getElementById('appSub').textContent = currentQuiz.title;
  document.getElementById('introProg').innerHTML = '<div class="ip-box"><div class="ip-num">…</div><div class="ip-lbl">진도 불러오는 중</div></div>';
  goScreen('intro');
  // 진도 불러와 요약 표시
  try {
    progressState = await loadProgress(currentQuiz.id);
  } catch(e){ console.error('진도 조회 실패', e); progressState = {seen:{}, wrong:{}}; }
  renderIntroProgress();
}

function renderIntroProgress(){
  const activeIdxs = currentQuiz.questions.map((q,i)=>i).filter(i => !currentQuiz.questions[i].hidden);
  const N = activeIdxs.length;
  const seenN = activeIdxs.filter(i => progressState.seen[i]).length;
  const wrongN = activeIdxs.filter(i => progressState.wrong[i]).length;
  const pct = completionOf(currentQuiz, progressState);
  const ch = charFace(pct);
  document.getElementById('introProg').innerHTML = `
    <div class="completion">
      ${donutSVG(pct, 116, 12)}
      <div class="char"><div class="face">${ch.emoji}</div><div class="msg">${ch.msg}</div></div>
    </div>
    <div class="prog-sub">완성도 <b>${pct}%</b> · 풀어본 ${seenN}/${N}문항 · 복습 대기 ${wrongN}</div>`;
}

function updateWhoText(){
  const badge = currentAttempt > 1
    ? `<span style="display:inline-block;background:#FDE9C9;color:var(--amber);padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700;margin-left:8px;">${currentAttempt}번째 시도</span>`
    : `<span style="display:inline-block;background:#E8F5EC;color:var(--green-dark);padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700;margin-left:8px;">첫 시도</span>`;
  document.getElementById('whoText').innerHTML = `${escapeHtml(currentUser.studentId)} · ${escapeHtml(currentUser.name)}${badge}`;
}

async function startQuiz(){
  if(!currentQuiz) return;
  if(!currentUser){ goScreen('login'); return; }
  if(!isAuthed){ alert('서버에 연결되지 않았습니다. 페이지를 새로고침해 주세요.'); return; }

  const btn = document.getElementById('btnStart');
  btn.disabled = true;
  btn.textContent = '확인 중...';
  let prevCount = 0;
  try {
    progressState = await loadProgress(currentQuiz.id);   // 최신 진도 다시 로드
    prevCount = await getStudentAttemptCount(currentQuiz.id, currentUser.studentId);
  } catch(e){ console.error('시작 준비 실패', e); }
  btn.disabled = false;
  btn.textContent = '시작하기 (10문항)';

  currentAttempt = prevCount + 1;
  updateWhoText();
  resetQuizState();
  goScreen('quiz');
  renderQuestion();
}

/* ==========================================================
   퀴즈 진행
   ========================================================== */
let currentIdx = 0;          // 세션 내 표시 위치 (sessionQ 인덱스)
let userAnswers = {};        // {원본인덱스: 선택지} — 이번 세션에서 푼 것만
let sessionQ = [];           // 이번 시도에 출제되는 원본 문항 인덱스 배열 (≤10)
let score = 0;
let quizStartedAt = null;

function questions(){ return currentQuiz.questions; }
function origIndex(){ return sessionQ[currentIdx]; }     // 현재 화면 문제의 원본 인덱스
function sessionLen(){ return sessionQ.length; }

function shuffle(arr){
  arr = arr.slice();
  for(let i=arr.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

// 출제 선택: ① 복습 대기열(틀린 것) → ② 아직 안 나온 것 → ③ 이미 맞힌 것 순으로 10개 채우고 섞기
function buildSession(){
  const N = questions().length;
  // 숨김 문항은 출제 후보에서 제외 (원본 인덱스 기준)
  const all = Array.from({length:N},(_,i)=>i).filter(i => !questions()[i].hidden);
  const wrong  = all.filter(i => progressState.wrong[i]);
  const unseen = all.filter(i => !progressState.seen[i] && !progressState.wrong[i]);
  const seenOk = all.filter(i => progressState.seen[i] && !progressState.wrong[i]);
  let pick = shuffle(wrong);
  if(pick.length < QUOTA) pick = pick.concat(shuffle(unseen));
  if(pick.length < QUOTA) pick = pick.concat(shuffle(seenOk));
  pick = pick.slice(0, Math.min(QUOTA, all.length));
  return shuffle(pick);
}

function resetQuizState(){
  currentIdx = 0;
  score = 0;
  userAnswers = {};
  sessionQ = buildSession();
  document.getElementById('scoreText').textContent = '0';
  quizStartedAt = Date.now();
  // 결과 화면의 '자세히 보기' 초기화
  const rw = document.getElementById('reviewWrap');
  if(rw){ rw.style.display='none'; rw.innerHTML=''; }
  const bd = document.getElementById('btnDetail');
  if(bd) bd.textContent = '자세히 보기';
}

function renderQuestion(){
  if(currentIdx >= sessionLen()){ finishQuiz(); return; }
  const q = questions()[origIndex()];
  document.getElementById('quizArea').innerHTML = `
    <div class="card">
      <span class="chapter-tag ${q.tagClass||''}">${escapeHtml(q.chapter)}</span>
      <div class="q-num">문제 ${currentIdx+1} / ${sessionLen()}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts">
        ${q.options.map((opt,i)=>`
          <button class="opt" data-idx="${i}" onclick="select(${i})">
            <span class="num">${i+1}</span><span>${opt}</span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div style="margin-top:18px;display:flex;justify-content:flex-end;">
        <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" style="display:none;">
          ${currentIdx === sessionLen()-1 ? '결과 보기' : '다음 문제 →'}
        </button>
      </div>
    </div>`;
  updateProgress();
}

function select(i){
  const oi = origIndex();
  if(oi in userAnswers) return;
  const q = questions()[oi];
  userAnswers[oi] = i;
  document.querySelectorAll('#opts .opt').forEach((el,idx)=>{
    el.classList.add('locked');
    if(idx === q.answer) el.classList.add('correct');
    if(idx === i && i !== q.answer) el.classList.add('wrong');
    if(idx === i && i === q.answer) el.classList.add('selected');
  });
  const fb = document.getElementById('feedback');
  if(i === q.answer){
    score++;
    fb.className = 'feedback ok show';
    fb.innerHTML = `<b>✓ 정답!</b> ${q.explain}`;
  } else {
    fb.className = 'feedback ng show';
    fb.innerHTML = `<b>✗ 오답.</b> 정답은 ${q.answer+1}번. ${q.explain}`;
  }
  document.getElementById('scoreText').textContent = score;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function nextQ(){
  currentIdx++;
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  const total = sessionLen();
  const done = Math.min(currentIdx, total);
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;
}

/* ----- 결과 상세 리뷰 (자세히 보기) ----- */
function buildReviewHtml(){
  const Q = questions();
  return sessionQ.map((oi, pos)=>{
    const q = Q[oi];
    const my = userAnswers[oi];
    const isOk = my === q.answer;
    const opts = q.options.map((opt,i)=>{
      let cls = 'rv-opt', tag = '';
      if(i === q.answer){ cls += ' correct'; tag = '<span class="rv-tag">정답</span>'; }
      if(i === my && my !== q.answer){ cls += ' mywrong'; tag = '<span class="rv-tag">내 답</span>'; }
      return `<div class="${cls}"><span class="rv-onum">${i+1}</span><span class="rv-otxt">${opt}</span>${tag}</div>`;
    }).join('');
    return `<div class="review-item">
      <div class="rv-head">
        <span class="rv-no">문제 ${pos+1}</span>
        <span class="rv-mark ${isOk?'ok':'ng'}">${isOk ? '✓ 정답' : '✗ 오답'}</span>
        <span class="rv-chapter">${escapeHtml(q.chapter)}</span>
      </div>
      <div class="rv-q">${q.q}</div>
      ${opts}
      <div class="rv-explain">${q.explain}</div>
    </div>`;
  }).join('');
}
function toggleDetail(){
  const rw = document.getElementById('reviewWrap');
  const btn = document.getElementById('btnDetail');
  const hidden = rw.style.display === 'none' || !rw.style.display;
  if(hidden){
    if(!rw.innerHTML) rw.innerHTML = buildReviewHtml();
    rw.style.display = 'block';
    btn.textContent = '접기';
    rw.scrollIntoView({behavior:'smooth', block:'start'});
  } else {
    rw.style.display = 'none';
    btn.textContent = '자세히 보기';
  }
}

async function finishQuiz(){
  document.getElementById('fullLoading').classList.add('show');
  let saveOk = true;
  const Q = questions();
  const N = sessionLen();

  // 출제된 문항만 집계 + 진도(seen/wrong) 갱신
  const wrongIdx = [];
  const answersMap = {};
  sessionQ.forEach(oi=>{
    const a = (oi in userAnswers) ? userAnswers[oi] : null;
    answersMap[oi] = a;
    progressState.seen[oi] = true;
    if(a === Q[oi].answer){ delete progressState.wrong[oi]; }
    else { wrongIdx.push(oi); progressState.wrong[oi] = true; }
  });

  const record = {
    studentId: currentUser.studentId,
    name: currentUser.name,
    accountId: currentUser.uid,
    score: score,
    total: N,
    wrongIdx: wrongIdx,
    answers: answersMap,           // {원본인덱스: 선택지} — 부분 출제 호환
    timestamp: new Date().toISOString(),
    elapsedSec: Math.round((Date.now() - quizStartedAt)/1000),
    attempt: currentAttempt
  };
  try {
    await saveResult(currentQuiz.id, record);
    await saveProgress(currentQuiz.id, progressState);
  } catch(e){ saveOk = false; console.error(e); }
  myProgressAll[currentQuiz.id] = {seen: progressState.seen, wrong: progressState.wrong};   // 허브 완성도 갱신
  document.getElementById('fullLoading').classList.remove('show');
  const attempt = currentAttempt;

  // 결과 화면
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalTotal').textContent = N;
  document.getElementById('progressText').textContent = `${N} / ${N}`;
  document.getElementById('progressFill').style.width = '100%';
  const pct = N ? (score/N)*100 : 0;
  let emoji, title, msg;
  if(pct === 100){ emoji='🏆'; title='완벽해요!'; msg='모든 문제를 맞췄어요. 완벽하게 이해했네요!'; }
  else if(pct >= 80){ emoji='🎉'; title='훌륭해요!'; msg='대부분 잘 이해하고 있어요.'; }
  else if(pct >= 60){ emoji='💪'; title='잘 했어요!'; msg='조금만 더 복습하면 완벽해질 거예요.'; }
  else if(pct >= 40){ emoji='📖'; title='더 복습이 필요해요'; msg='학습지를 다시 한번 살펴보세요.'; }
  else { emoji='🔁'; title='다시 도전!'; msg='기본 개념부터 차근차근 복습해보세요.'; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
  const wrongLeft = Object.keys(progressState.wrong).length;
  document.getElementById('saveNote').innerHTML = (saveOk
    ? `결과가 저장되었습니다. (${attempt}번째 시도)`
    : '⚠️ 결과 저장에 실패했어요. 선생님께 알려주세요.')
    + (wrongLeft ? `<br>복습 대기 문항 <b style="color:var(--amber)">${wrongLeft}개</b> — 다음 시도에 다시 나와요.` : '');

  const byChapter = {};
  sessionQ.forEach(oi=>{
    const q = Q[oi];
    if(!byChapter[q.chapter]) byChapter[q.chapter] = {right:0, total:0};
    byChapter[q.chapter].total++;
    if(userAnswers[oi] === q.answer) byChapter[q.chapter].right++;
  });
  document.getElementById('breakdown').innerHTML = Object.entries(byChapter).map(([ch,v])=>`
    <div class="row"><span>${escapeHtml(ch)}</span><b>${v.right} / ${v.total}</b></div>
  `).join('');

  goScreen('result');
}

async function restart(){
  if(!currentQuiz) { goHub(); return; }
  if(!currentUser){ goScreen('login'); return; }
  document.getElementById('fullLoading').classList.add('show');
  let prevCount = 0;
  try {
    progressState = await loadProgress(currentQuiz.id);   // 갱신된 진도로 다음 세션 구성
    prevCount = await getStudentAttemptCount(currentQuiz.id, currentUser.studentId);
  } catch(e){ console.error('다시 풀기 준비 실패', e); }
  document.getElementById('fullLoading').classList.remove('show');
  currentAttempt = prevCount + 1;
  updateWhoText();
  resetQuizState();
  goScreen('quiz');
  renderQuestion();
}
