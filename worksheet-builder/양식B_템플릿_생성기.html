<div class="card">
  <h1>양식 B — 한글 템플릿 생성기</h1>
  <p>버튼을 클릭하면 <strong>.docx 파일</strong>이 다운로드됩니다.<br>한글 또는 Word에서 바로 열 수 있습니다.</p>
  <button id="btn">📄 템플릿 다운로드 (.docx)</button>
  <div id="status"></div>
  <ul class="note">
    <li>섹션제목 4색 (파랑·초록·주황·빨강)</li>
    <li>본문 · 정보박스 · 빈칸텍스트 스타일</li>
    <li>머리말(과목명 + 학번/이름) · 꼬리말(쪽번호)</li>
    <li>표 샘플 포함 · 인터넷 연결 필요(JSZip 로드)</li>
  </ul>
  <div class="how">
    <strong>사용법</strong><br>
    1. 크롬에서 이 파일 열기 (인터넷 연결 필요)<br>
    2. 버튼 클릭 → .docx 다운로드<br>
    3. 한글 또는 Word에서 열기 → F6(스타일) 확인<br>

  </div>

document.getElementById('btn').addEventListener('click', async function() {
  const btn = this;
  const status = document.getElementById('status');

  if (typeof JSZip === 'undefined') {
    alert('JSZip 라이브러리를 불러오지 못했습니다.\n인터넷 연결을 확인하고 페이지를 새로고침하세요.');
    return;
  }

  btn.disabled = true;
  btn.textContent = '생성 중...';
  status.textContent = '';

  try {
    const zip = new JSZip();

    zip.file('[Content_Types].xml', CT_XML);
    zip.file('_rels/.rels', RELS_XML);
    zip.file('word/_rels/document.xml.rels', DOCRELS_XML);
    zip.file('word/settings.xml', SETTINGS_XML);
    zip.file('word/styles.xml', STYLES_XML);
    zip.file('word/header1.xml', HDR_XML);
    zip.file('word/footer1.xml', FTR_XML);
    zip.file('word/document.xml', DOC_XML);

    const blob = await zip.generateAsync({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
      compression: 'DEFLATE',
      compressionOptions: { level: 6 }
    });

    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '양식B_학습지_템플릿.docx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    btn.textContent = '✅ 다운로드 완료';
    status.textContent = '파일이 다운로드됐습니다. 한글 또는 Word에서 열어보세요.';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '📄 템플릿 다운로드 (.docx)';
      status.textContent = '';
    }, 3000);
  } catch(e) {
    alert('오류: ' + e.message);
    btn.disabled = false;
    btn.textContent = '📄 템플릿 다운로드 (.docx)';
  }
});
</script>
</body>
</html>
