<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>수강신청 사전 점검</title>
<style>
  :root{
    --bg:#eef2f7; --card:#ffffff; --ink:#1a2230; --muted:#64748b;
    --line:#dbe2ec; --line-soft:#e8edf3;
    --blue:#2563eb; --blue-d:#1d4ed8; --blue-pale:#e7eefc;
    --green:#16a34a; --green-pale:#e3f5ea; --green-d:#15803d;
    --red:#dc2626; --red-pale:#fdeaea;
    --amber:#d97706; --amber-pale:#fdf0db;
    --shadow:0 1px 3px rgba(20,30,50,.07),0 6px 18px rgba(20,30,50,.07);
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;overscroll-behavior:none;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.45;
    font-size:16px; -webkit-text-size-adjust:100%;
  }
  .hidden{display:none !important;}

  /* ===== 로그인 ===== */
  #screen-login{height:100dvh; display:flex; flex-direction:column; justify-content:center;
       max-width:420px; margin:0 auto; padding:24px 22px calc(24px + env(safe-area-inset-bottom));}
  .login-card{background:var(--card); border:1px solid var(--line); border-radius:18px;
       box-shadow:var(--shadow); padding:26px 22px;}
  .login-card h1{font-size:21px; font-weight:800; letter-spacing:-.02em; margin:0 0 4px;}
  .login-card .sub{font-size:13.5px; color:var(--muted); font-weight:600; margin-bottom:20px;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:12.5px; font-weight:800; color:var(--muted); margin:0 2px 6px;}
  .field input{width:100%; border:1.5px solid var(--line); border-radius:11px; padding:14px;
       font-size:16px; font-weight:600; background:#fbfcfe; color:var(--ink); transition:border-color .12s;}
  .field input:focus{outline:none; border-color:var(--blue); background:#fff;}
  .login-btn{width:100%; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:800;
       color:#fff; background:var(--blue); cursor:pointer; margin-top:7px;}
  .login-btn:disabled{background:#c3ccd9;}
  .login-err{font-size:13px; font-weight:700; color:var(--red); margin:10px 2px 0; min-height:18px;}
  .login-hint{font-size:12px; color:var(--muted); font-weight:600; margin-top:14px; line-height:1.6;}
  .back-link{background:none; border:none; color:var(--muted); font-size:13px; font-weight:700;
       cursor:pointer; padding:6px 0; margin-top:4px;}

  /* ===== 메인 앱 ===== */
  #app{height:100dvh; display:flex; flex-direction:column; max-width:680px; margin:0 auto;
       background:var(--bg); position:relative;}
  .top{flex:none; padding:11px 16px 8px; padding-top:calc(11px + env(safe-area-inset-top));
       display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .top .title{font-size:16px; font-weight:800; letter-spacing:-.02em;}
  .top .title small{display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-top:1px;}
  .who{font-size:11.5px; font-weight:700; color:var(--muted); text-align:right; white-space:nowrap;}
  .who .logout{display:block; color:var(--blue); cursor:pointer; margin-top:2px; font-weight:800;}

  .tabs{flex:none; display:flex; gap:6px; padding:4px 12px 10px;}
  .tab{flex:1; background:var(--card); border:2px solid var(--line); border-radius:12px;
       padding:7px 3px 6px; text-align:center; cursor:pointer; transition:all .14s; position:relative;}
  .tab .t-main{font-size:13.5px; font-weight:800; letter-spacing:-.02em; line-height:1.05; color:var(--ink);}
  .tab .t-count{font-size:15.5px; font-weight:800; margin-top:2px; line-height:1; color:var(--muted);
       font-variant-numeric:tabular-nums;}
  .tab.under .t-count{color:var(--amber);}
  .tab.ok{background:var(--green-pale); border-color:#bfe6cd;}
  .tab.ok .t-count{color:var(--green-d);}
  .tab.over{background:var(--red-pale); border-color:#f3c9c9;}
  .tab.over .t-count{color:var(--red);}
  .tab.active{border-color:var(--blue); box-shadow:0 2px 11px rgba(37,99,235,.22);}
  .tab.active .t-main{color:var(--blue-d);}

  .scroller{flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
       padding:2px 12px 18px;}
  @keyframes slideL{from{opacity:0; transform:translateX(22px);} to{opacity:1; transform:none;}}
  @keyframes slideR{from{opacity:0; transform:translateX(-22px);} to{opacity:1; transform:none;}}
  .scroller.anim-l{animation:slideL .2s ease;}
  .scroller.anim-r{animation:slideR .2s ease;}

  .sem-guide{display:flex; align-items:center; justify-content:space-between; gap:10px;
       background:var(--blue-pale); border:1.5px solid #cdddfb; border-radius:12px;
       padding:11px 14px; margin:6px 0 14px;}
  .sem-guide .g-txt{font-size:14px; font-weight:700; color:var(--blue-d); letter-spacing:-.01em;}
  .sem-guide .g-txt b{font-size:16px;}
  .pick-badge{font-size:14px; font-weight:800; padding:6px 13px; border-radius:99px; white-space:nowrap;
       font-variant-numeric:tabular-nums;}
  .pick-badge.ok{background:var(--green-pale); color:var(--green-d);}
  .pick-badge.under{background:var(--amber-pale); color:var(--amber);}
  .pick-badge.over{background:var(--red-pale); color:var(--red);}

  .grp{margin-bottom:16px;}
  .grp-label{font-size:12px; font-weight:800; color:var(--muted); margin:0 2px 7px;
       letter-spacing:.02em; display:flex; align-items:center; gap:7px;}
  .grp-label .dot{width:9px; height:9px; border-radius:99px; flex:none;}
  .courses{display:flex; flex-direction:column; gap:8px;}
  .course{
    display:flex; align-items:center; gap:11px; padding:13px 14px; border-radius:12px;
    border:1.5px solid var(--line); background:#fff; cursor:pointer; transition:all .12s;
    font-size:15.5px; font-weight:600; min-height:52px;
  }
  .course:active{transform:scale(.99);}
  .course .box{width:24px; height:24px; border-radius:7px; border:2px solid var(--line);
       flex:none; display:flex; align-items:center; justify-content:center; transition:all .12s;}
  .course .box svg{width:15px; height:15px; opacity:0; transform:scale(.5); transition:all .12s;}
  .course.on{border-color:var(--blue); background:var(--blue-pale);}
  .course.on .box{background:var(--blue); border-color:var(--blue);}
  .course.on .box svg{opacity:1; transform:scale(1);}
  .course .cn{flex:1;}

  .nav-row{display:flex; gap:8px; margin-top:8px;}
  .nav-btn{flex:1; padding:13px; border-radius:12px; border:1.5px solid var(--line);
       background:#fff; font-size:14.5px; font-weight:800; color:var(--ink); cursor:pointer;}
  .nav-btn:disabled{opacity:.4;}
  .nav-btn.primary{background:var(--blue); color:#fff; border-color:var(--blue);}

  .panel{flex:none; background:var(--card); border-top:1px solid var(--line);
       box-shadow:0 -4px 20px rgba(20,30,50,.08);
       padding:10px 14px calc(10px + env(safe-area-inset-bottom));}
  .chips{display:flex; gap:6px; margin-bottom:9px;}
  .chip{flex:1; border-radius:10px; padding:8px 6px; text-align:center; cursor:pointer;
       border:1.5px solid var(--line); background:#fbfcfe; transition:all .12s;}
  .chip .ck{font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:4px;}
  .chip .cv{font-size:11px; font-weight:700; color:var(--muted); margin-top:1px;}
  .chip.pass{border-color:#bfe6cd; background:var(--green-pale);}
  .chip.pass .ck{color:var(--green-d);}
  .chip.fail{border-color:#f3c9c9; background:var(--red-pale);}
  .chip.fail .ck{color:var(--red);}
  .detail{font-size:12.5px; font-weight:600; color:var(--muted); text-align:center;
       min-height:17px; margin-bottom:9px; padding:0 4px;}
  .detail.bad{color:var(--red); font-weight:700;}
  .submit{width:100%; border:none; border-radius:12px; padding:15px; font-size:16px; font-weight:800;
       color:#fff; background:#c3ccd9; cursor:pointer; transition:all .15s; letter-spacing:-.01em;}
  .submit.ready{background:var(--green);}
  .submit:disabled{cursor:not-allowed;}
  .submit.submitted{background:var(--blue-d);}
  .credit{text-align:center; font-size:10.5px; color:#9aa6b5; padding:14px 0 4px; font-weight:600;}

  /* 토스트 */
  #toast{position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(20px);
       background:#1a2230; color:#fff; font-size:13.5px; font-weight:700; padding:11px 18px; border-radius:99px;
       opacity:0; transition:all .25s; z-index:90; pointer-events:none; box-shadow:0 6px 20px rgba(0,0,0,.25); max-width:88%; text-align:center;}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .full-loading{position:fixed; inset:0; background:rgba(238,242,247,.7); display:flex; align-items:center;
       justify-content:center; z-index:100;}
  .full-loading.hidden{display:none;}
  .spin{width:34px; height:34px; border:3px solid #d4dce8; border-top-color:var(--blue); border-radius:50%; animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- ===== 로그인 ===== -->
<div id="screen-login" class="hidden">
  <div class="login-card">
    <h1>수강신청 사전 점검</h1>
    <div class="sub" id="loginSub">학번과 이름을 입력하세요</div>

    <!-- 1단계 -->
    <div id="step1">
      <div class="field">
        <label>학번 (5자리)</label>
        <input id="inSid" type="tel" pattern="[0-9]*" inputmode="numeric" maxlength="5" placeholder="예) 20711">
      </div>
      <div class="field">
        <label>이름</label>
        <input id="inName" type="text" placeholder="이름">
      </div>
      <button class="login-btn" id="step1Btn">다음</button>
    </div>

    <!-- 2단계 PIN -->
    <div id="step2" class="hidden">
      <div class="field">
        <label id="pinLabel">PIN (숫자 4자리)</label>
        <input id="inPin" type="tel" pattern="[0-9]*" inputmode="numeric" maxlength="4" placeholder="••••">
      </div>
      <div class="field hidden" id="pin2Field">
        <label>PIN 확인 (한 번 더)</label>
        <input id="inPin2" type="tel" pattern="[0-9]*" inputmode="numeric" maxlength="4" placeholder="••••">
      </div>
      <button class="login-btn" id="step2Btn">시작하기</button>
      <button class="back-link" id="backBtn">← 학번·이름 다시 입력</button>
    </div>

    <div class="login-err" id="loginErr"></div>
    <div class="login-hint">※ 학번·이름으로 내 선택이 저장돼요. PIN을 잊으면 담임선생님께 초기화를 요청하세요.</div>
  </div>
</div>

<!-- ===== 메인 ===== -->
<div id="app" class="hidden">
  <div class="top">
    <div class="title">수강신청 사전 점검
      <small>선택과목을 고르면 조건 충족 여부를 바로 확인해요</small>
    </div>
    <div class="who" id="who"></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="scroller" id="scroller"></div>
  <div class="panel">
    <div class="chips" id="chips"></div>
    <div class="detail" id="detail"></div>
    <button class="submit" id="submitBtn" disabled>과목을 선택해 주세요</button>
    <div class="credit">Claude AI로 이 앱을 제작함 by 고은표</div>
  </div>
</div>

<div id="toast"></div>
<div class="full-loading hidden" id="loading"><div class="spin"></div></div>

const SEMESTERS = [

/* ============================================================
   유틸 (sha256 — 순수 JS, 의존성 없음)
   ============================================================ */
function sha256(ascii){
  function rightRotate(value,amount){return (value>>>amount)|(value<<(32-amount));}
  var mathPow=Math.pow, maxWord=mathPow(2,32), result='', words=[];
  ascii=unescape(encodeURIComponent(ascii));
  var asciiBitLength=ascii.length*8;
  var hash=sha256.h=sha256.h||[], k=sha256.k=sha256.k||[], primeCounter=k.length;
  var isComposite={};
  for(var candidate=2;primeCounter<64;candidate++){
    if(!isComposite[candidate]){
      for(var i=0;i<313;i+=candidate){isComposite[i]=candidate;}
      hash[primeCounter]=(mathPow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56) ascii+='\x00';
  for(var i=0;i<ascii.length;i++){
    var j=ascii.charCodeAt(i);
    if(j>>8) return;
    words[i>>2]|=j<<((3-i)%4)*8;
  }
  words[words.length]=((asciiBitLength/maxWord)|0);
  words[words.length]=(asciiBitLength);
  for(var j=0;j<words.length;){
    var w=words.slice(j,j+=16), oldHash=hash;
    hash=hash.slice(0,8);
    for(var i=0;i<64;i++){
      var w15=w[i-15],w2=w[i-2];
      var a=hash[0],e=hash[4];
      var temp1=hash[7]+(rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]+(w[i]=(i<16)?w[i]:(w[i-16]+(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))+w[i-7]+(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10)))|0);
      var temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(temp1+temp2)|0].concat(hash);
      hash[4]=(hash[4]+temp1)|0;
    }
    for(var i=0;i<8;i++){hash[i]=(hash[i]+oldHash[i])|0;}
  }
  for(var i=0;i<8;i++){
    for(var j=3;j+1;j--){
      var b=(hash[i]>>(j*8))&255;
      result+=((b<16)?0:'')+b.toString(16);
    }
  }
  return result;
}
const pinHashFor = (sid,pin)=> sha256(PIN_SALT+'|'+sid+'|'+pin);

function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'), 2200);
}
const showLoading = v=> document.getElementById('loading').classList.toggle('hidden', !v);

/* ============================================================
   로그인 (학번 키 · 2단계 PIN)
   ============================================================ */
let pendingSid='', pendingName='', loginMode='';   // verify | new | reset
const SESSION_KEY='cc_session_v1';

function showErr(m){ document.getElementById('loginErr').textContent=m||''; }
function parseClass(sid){ return { classNo:parseInt(sid.substr(1,2),10)||0, seq:parseInt(sid.substr(3,2),10)||0 }; }

async function step1(){
  showErr('');
  const sid=document.getElementById('inSid').value.trim();
  const name=document.getElementById('inName').value.trim();
  if(!/^\d{5}$/.test(sid)){ showErr('학번은 5자리 숫자예요. (예: 20711)'); return; }
  if(!name){ showErr('이름을 입력해 주세요.'); return; }
  showLoading(true);
  try{
    const snap = await db.ref('students/'+sid).once('value');
    const acct = snap.val();
    if(acct && acct.name && acct.name !== name){
      showLoading(false);
      showErr('이 학번은 다른 이름으로 등록되어 있어요. 이름을 확인하거나 담임선생님께 문의하세요.');
      return;
    }
    pendingSid=sid; pendingName=name;
    loginMode = (acct && acct.pinHash) ? 'verify' : (acct ? 'reset' : 'new');
    showLoading(false);
    // 2단계 표시
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    const isNew = loginMode!=='verify';
    document.getElementById('pin2Field').classList.toggle('hidden', !isNew);
    document.getElementById('pinLabel').textContent = isNew ? '새 PIN (숫자 4자리)' : 'PIN (숫자 4자리)';
    document.getElementById('loginSub').textContent = isNew ? `${name}님, 사용할 PIN을 정해주세요` : `${name}님, PIN을 입력하세요`;
    document.getElementById('inPin').value=''; document.getElementById('inPin2').value='';
    document.getElementById('inPin').focus();
  }catch(e){ showLoading(false); showErr('접속에 실패했어요. 잠시 후 다시 시도해 주세요.'); console.error(e); }
}

async function step2(){
  showErr('');
  const pin=document.getElementById('inPin').value.trim();
  if(!/^\d{4}$/.test(pin)){ showErr('PIN은 숫자 4자리예요.'); return; }
  showLoading(true);
  try{
    if(loginMode==='verify'){
      const snap=await db.ref('students/'+pendingSid).once('value');
      if(snap.val().pinHash !== pinHashFor(pendingSid,pin)){
        showLoading(false); showErr('PIN이 일치하지 않아요. 잊으셨다면 담임선생님께 초기화를 요청하세요.'); return;
      }
    } else {
      const pin2=document.getElementById('inPin2').value.trim();
      if(pin!==pin2){ showLoading(false); showErr('두 PIN이 서로 달라요. 다시 확인해 주세요.'); return; }
      await db.ref('students/'+pendingSid).update({
        studentId:pendingSid, name:pendingName,
        pinHash:pinHashFor(pendingSid,pin),
        createdAt: firebase.database.ServerValue.TIMESTAMP
      });
    }
    const {classNo,seq}=parseClass(pendingSid);
    currentUser={sid:pendingSid, name:pendingName, classNo, seq};
    localStorage.setItem(SESSION_KEY, JSON.stringify(currentUser));
    showLoading(false);
    enterApp();
  }catch(e){ showLoading(false); showErr('처리에 실패했어요. 다시 시도해 주세요.'); console.error(e); }
}

function backToStep1(){
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('loginSub').textContent='학번과 이름을 입력하세요';
  showErr('');
}

function logout(){
  localStorage.removeItem(SESSION_KEY);
  location.reload();
}

/* ============================================================
   앱 진입 + 이전 선택 복원
   ============================================================ */
async function enterApp(){
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who').innerHTML =
    `${currentUser.classNo}반 ${currentUser.seq}번 · ${currentUser.name}<span class="logout" id="logoutBtn">로그아웃</span>`;
  document.getElementById('logoutBtn').addEventListener('click', logout);

  // 이전 제출 복원
  showLoading(true);
  try{
    const snap=await db.ref('submissions/'+currentUser.sid).once('value');
    const prev=snap.val();
    if(prev && prev.selections){
      Object.keys(prev.selections).forEach(semId=>{
        (prev.selections[semId]||[]).forEach(n=> sel[key(semId,n)]=true);
      });
      lastSubmitted = !!prev.ok;
    }
  }catch(e){ console.error(e); }
  showLoading(false);

  renderTabs(); renderScroller(); update();
}

/* ============================================================
   탭
   ============================================================ */
function renderTabs(){
  document.getElementById('tabs').innerHTML = SEMESTERS.map((s,i)=>`
    <div class="tab" data-i="${i}" id="tab-${s.id}">
      <div class="t-main">${s.short}</div>
      <div class="t-count" id="cnt-${s.id}">0/${s.pick}</div>
    </div>`).join('');
  document.querySelectorAll('.tab').forEach(t=> t.addEventListener('click', ()=> goSem(+t.dataset.i)));
}
function goSem(i){
  i=Math.max(0,Math.min(SEMESTERS.length-1,i));
  if(i===activeIdx) return;
  const dir=i>activeIdx?'l':'r';
  activeIdx=i; detailLock=null;
  renderScroller();
  const sc=document.getElementById('scroller'); sc.scrollTop=0;
  sc.classList.remove('anim-l','anim-r'); void sc.offsetWidth; sc.classList.add('anim-'+dir);
  update();
}

/* ============================================================
   과목 목록
   ============================================================ */
function renderScroller(){
  const sem=SEMESTERS[activeIdx];
  const groups=[]; sem.courses.forEach(c=>{ if(!groups.includes(c.g)) groups.push(c.g); });
  const groupsHtml=groups.map(g=>{
    const color=GROUP_COLORS[g]||'#475569';
    const items=sem.courses.filter(c=>c.g===g).map(c=>{
      const k=key(sem.id,c.n);
      return `<div class="course ${sel[k]?'on':''}" data-k="${k}">
          <span class="box">${CHECK_SVG}</span><span class="cn">${c.n}</span></div>`;
    }).join('');
    return `<div class="grp">
        <div class="grp-label"><span class="dot" style="background:${color}"></span>${g}</div>
        <div class="courses">${items}</div></div>`;
  }).join('');
  const isLast=activeIdx===SEMESTERS.length-1, isFirst=activeIdx===0;
  document.getElementById('scroller').innerHTML=`
    <div class="sem-guide">
      <span class="g-txt">이 학기는 <b>${sem.pick}과목</b> 선택</span>
      <span class="pick-badge" id="badge-${sem.id}"></span>
    </div>
    ${groupsHtml}
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" ${isFirst?'disabled':''}>← 이전 학기</button>
      <button class="nav-btn primary" id="nextBtn" ${isLast?'disabled':''}>다음 학기 →</button>
    </div>`;
  document.querySelectorAll('.course').forEach(el=>{
    el.addEventListener('click', ()=>{
      const k=el.dataset.k; sel[k]=!sel[k];
      el.classList.toggle('on', !!sel[k]); detailLock=null; update();
    });
  });
  const prev=document.getElementById('prevBtn'), next=document.getElementById('nextBtn');
  if(prev) prev.addEventListener('click', ()=> goSem(activeIdx-1));
  if(next) next.addEventListener('click', ()=> goSem(activeIdx+1));
}

/* ============================================================
   집계·검증
   ============================================================ */
function tally(){
  let perSem={}, kse=0, tech=0, total=0;
  SEMESTERS.forEach(s=>perSem[s.id]=0);
  SEMESTERS.forEach(sem=> sem.courses.forEach(c=>{
    if(sel[key(sem.id,c.n)]){ perSem[sem.id]++; total++;
      if(KSE.includes(c.g)) kse++; if(TECH.includes(c.g)) tech++; }
  }));
  return {perSem,kse,tech,total};
}
function selectionsObj(){
  const o={};
  SEMESTERS.forEach(sem=>{ o[sem.id]=sem.courses.filter(c=>sel[key(sem.id,c.n)]).map(c=>c.n); });
  return o;
}

function update(){
  const t=tally();
  SEMESTERS.forEach((sem,i)=>{
    const n=t.perSem[sem.id];
    const tab=document.getElementById('tab-'+sem.id), cnt=document.getElementById('cnt-'+sem.id);
    if(cnt) cnt.textContent=(n===sem.pick?'✓':n)+'/'+sem.pick;
    if(tab){ tab.classList.remove('under','ok','over','active');
      tab.classList.add(n===sem.pick?'ok':(n>sem.pick?'over':'under'));
      if(i===activeIdx) tab.classList.add('active'); }
  });
  const cur=SEMESTERS[activeIdx], cn=t.perSem[cur.id], badge=document.getElementById('badge-'+cur.id);
  if(badge){
    let cls='under', txt=`${cn} / ${cur.pick}`;
    if(cn===cur.pick){cls='ok'; txt=`✓ ${cn} / ${cur.pick}`;}
    else if(cn>cur.pick){cls='over'; txt=`${cn} / ${cur.pick} 초과`;}
    badge.className='pick-badge '+cls; badge.textContent=txt;
  }

  const r1=SEMESTERS.every(s=>t.perSem[s.id]===s.pick);
  const r2=t.kse<=R2_MAX, r3=t.tech>=R3_MIN;
  const badList=SEMESTERS.filter(s=>t.perSem[s.id]!==s.pick);
  const badSems=badList.map(s=>{ const n=t.perSem[s.id];
    return `${s.short} ${n}/${s.pick}(${n>s.pick?'초과':(s.pick-n)+'과목 부족'})`; }).join(', ');

  const chips=[
    {id:'r1', ok:r1, title:'학기별', val:r1?'완료':`${badList.length}곳 남음`,
     detail:r1?'모든 학기를 정확히 선택했어요 👍':`아직 맞춰야 할 학기 → ${badSems}`},
    {id:'r2', ok:r2, title:'국·수·영', val:`${t.kse}과목`,
     detail:r2?`국어·수학·영어 선택 ${t.kse}과목 — 8과목 이하예요 (충족)`
               :`국어·수학·영어는 8과목 이하여야 해요. 지금 ${t.kse}과목으로 ${t.kse-R2_MAX}과목 초과예요.`},
    {id:'r3', ok:r3, title:'기·정·외·교양', val:`${t.tech}과목`,
     detail:r3?`기술·가정/정보·제2외국어/한문·교양 ${t.tech}과목 — 4과목 이상이에요 (충족)`
               :`기술·가정/정보·제2외국어/한문·교양에서 4과목 이상 골라야 해요. 지금 ${t.tech}과목으로 ${R3_MIN-t.tech}과목 부족해요.`},
  ];
  document.getElementById('chips').innerHTML=chips.map(c=>`
    <div class="chip ${c.ok?'pass':'fail'}" data-id="${c.id}">
      <div class="ck">${c.ok?'✓':'!'} ${c.title}</div><div class="cv">${c.val}</div></div>`).join('');
  document.querySelectorAll('.chip').forEach(ch=> ch.addEventListener('click', ()=>{ detailLock=ch.dataset.id; showDetail(chips); }));
  showDetail(chips);

  const allOk=r1&&r2&&r3, btn=document.getElementById('submitBtn');
  btn.disabled=!allOk;
  btn.classList.toggle('ready', allOk && !lastSubmitted);
  btn.classList.toggle('submitted', allOk && lastSubmitted);
  if(allOk) btn.textContent = lastSubmitted ? '✓ 제출 완료 — 수정 후 다시 제출' : '✓ 조건 충족 — 제출하기';
  else btn.textContent = (t.total===0 ? '과목을 선택해 주세요' : '아직 충족하지 않은 조건이 있어요');
}

function showDetail(chips){
  const el=document.getElementById('detail');
  let c=detailLock?chips.find(x=>x.id===detailLock):chips.find(x=>!x.ok);
  if(!c){ el.className='detail'; el.textContent= lastSubmitted?'제출됐어요. 바꾸려면 과목을 고치고 다시 제출하세요.':'세 조건을 모두 충족했어요. 제출할 수 있어요! 🎉'; return; }
  el.className='detail'+(c.ok?'':' bad'); el.textContent=c.detail;
}

/* ============================================================
   제출
   ============================================================ */
async function submit(){
  const btn=document.getElementById('submitBtn'); if(btn.disabled) return;
  const t=tally();
  showLoading(true);
  try{
    await db.ref('submissions/'+currentUser.sid).set({
      studentId:currentUser.sid, name:currentUser.name,
      classNo:currentUser.classNo, seq:currentUser.seq,
      selections:selectionsObj(),
      kse:t.kse, tech:t.tech, total:t.total, ok:true,
      updatedAt: firebase.database.ServerValue.TIMESTAMP
    });
    lastSubmitted=true; showLoading(false);
    toast('제출됐어요! 선생님이 확인할 수 있어요 ✓');
    update();
  }catch(e){ showLoading(false); toast('제출에 실패했어요. 다시 시도해 주세요.'); console.error(e); }
}

/* ============================================================
   스와이프
   ============================================================ */
function bindSwipe(){
  const sc=document.getElementById('scroller');
  let x0=0,y0=0,t0=0;
  sc.addEventListener('touchstart', e=>{ x0=e.touches[0].clientX; y0=e.touches[0].clientY; t0=e.timeStamp; }, {passive:true});
  sc.addEventListener('touchend', e=>{
    const dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-y0;
    if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.7 && (e.timeStamp-t0)<600)
      goSem(dx<0?activeIdx+1:activeIdx-1);
  }, {passive:true});
}

/* ============================================================
   init
   ============================================================ */
document.getElementById('step1Btn').addEventListener('click', step1);
document.getElementById('step2Btn').addEventListener('click', step2);
document.getElementById('backBtn').addEventListener('click', backToStep1);
document.getElementById('submitBtn').addEventListener('click', submit);
document.getElementById('inName').addEventListener('keydown', e=>{ if(e.key==='Enter') step1(); });
document.getElementById('inPin').addEventListener('keydown', e=>{ if(e.key==='Enter' && document.getElementById('pin2Field').classList.contains('hidden')) step2(); });
document.getElementById('inPin2').addEventListener('keydown', e=>{ if(e.key==='Enter') step2(); });
bindSwipe();

// 제목 5번 빠르게 탭 → 교사용 화면
(function(){
  let taps=0, last=0;
  document.querySelectorAll('.login-card h1, .top .title').forEach(el=>{
    el.style.cursor='default';
    el.addEventListener('click', ()=>{
      const now=Date.now();
      taps = (now-last<600) ? taps+1 : 1; last=now;
      if(taps>=5){ taps=0; location.href='admin.html'; }
    });
  });
})();

// 익명 인증 후 세션 복원/로그인 분기
showLoading(true);
firebase.auth().signInAnonymously().then(()=>{
  showLoading(false);
  const saved=localStorage.getItem(SESSION_KEY);
  if(saved){
    try{ currentUser=JSON.parse(saved); enterApp(); return; }catch(e){}
  }
  document.getElementById('screen-login').classList.remove('hidden');
}).catch(e=>{
  showLoading(false);
  document.getElementById('screen-login').classList.remove('hidden');
  showErr('인증에 실패했어요. (익명 로그인 설정 확인 필요)');
  console.error(e);
});
</script>
