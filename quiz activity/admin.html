<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퀴즈 통합 관리자 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="xlsx.full.min.js"></script>
<style>
  :root{
    --blue-pastel:#C5E3F7;
    --green-pastel:#C3E9CC;
    --blue-dark:#1255A0;
    --green-dark:#2A7A38;
    --red-accent:#C0392B;
    --amber:#E67E22;
    --text-main:#1A1A1A;
    --text-light:#555;
    --line:#BBBBBB;
    --bg:#EAF1F8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-main);}
  body{min-height:100vh;display:flex;justify-content:center;padding:16px;}
  .container{width:100%;max-width:980px;}

  .card{background:#fff;border-radius:16px;padding:24px;margin-bottom:14px;box-shadow:0 4px 16px rgba(18,85,160,.06);}
  .btn{display:inline-block;padding:14px 28px;min-height:48px;border:none;border-radius:99px;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s ease;font-family:inherit;}
  .btn-primary{background:var(--blue-dark);color:#fff;}
  .btn-primary:hover{background:#0E468A;}
  .btn-primary:active{transform:scale(0.98);}
  .btn-ghost{background:transparent;color:var(--text-light);border:2px solid var(--line);}
  .btn-ghost:hover{background:#F0F3F7;}
  .btn-danger{background:var(--red-accent);color:#fff;}
  .btn-danger:hover{background:#9E2C1F;}
  .btn-green{background:var(--green-dark);color:#fff;}
  .btn-green:hover{background:#22622D;}
  .btn-mini{padding:8px 14px;font-size:12px;min-height:36px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  .credit{text-align:center;font-size:11px;color:#888;padding:20px 0 8px;}

  /* 화면 전환 */
  .screen{display:none;}
  .screen.active{display:block;}

  /* PIN 게이트 */
  .pin-card{padding:40px 28px;text-align:center;max-width:420px;margin:60px auto 0;}
  .pin-card .logo{font-size:36px;margin-bottom:8px;}
  .pin-card h1{margin:0 0 6px;font-size:22px;color:var(--blue-dark);}
  .pin-card .desc{color:var(--text-light);font-size:13px;margin-bottom:24px;}
  .pin-card input{width:100%;max-width:280px;padding:16px;font-size:20px;text-align:center;border:2px solid #E0E5EC;border-radius:10px;font-family:inherit;background:#FAFBFD;letter-spacing:6px;}
  .pin-card input:focus{outline:none;border-color:var(--blue-dark);background:#fff;}
  .err-msg{color:var(--red-accent);font-size:13px;margin-top:10px;min-height:18px;}
  .conn-status{font-size:11px;color:#888;margin-top:20px;}

  /* 헤더 */
  .head-bar{background:#fff;border-radius:16px;padding:18px 22px;box-shadow:0 4px 16px rgba(18,85,160,.06);border-left:6px solid var(--blue-dark);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .head-bar h1{margin:0;font-size:20px;color:var(--blue-dark);font-weight:900;}
  .head-bar .sub{font-size:12px;color:var(--text-light);margin-top:2px;}

  /* 퀴즈 선택 */
  .quiz-picker{background:#fff;border-radius:16px;padding:14px 20px;box-shadow:0 4px 16px rgba(18,85,160,.06);margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .quiz-picker label{font-size:13px;color:var(--text-light);font-weight:700;}
  .quiz-picker select{flex:1;min-width:200px;padding:10px 14px;font-size:14px;border:2px solid #E0E5EC;border-radius:8px;font-family:inherit;background:#FAFBFD;}
  .quiz-picker select:focus{outline:none;border-color:var(--blue-dark);}
  .picker-info{font-size:12px;color:var(--text-light);}

  /* 통계 */
  .stats-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px;}
  .stat-box{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 4px 16px rgba(18,85,160,.05);}
  .stat-box .label{font-size:12px;color:var(--text-light);}
  .stat-box .val{font-size:24px;font-weight:900;color:var(--blue-dark);margin-top:4px;}

  /* 탭 */
  .admin-tabs{display:flex;gap:6px;background:#fff;border-radius:12px;padding:6px;margin-bottom:14px;box-shadow:0 4px 16px rgba(18,85,160,.06);}
  .admin-tab{flex:1;padding:12px;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:700;color:var(--text-light);border-radius:8px;cursor:pointer;}
  .admin-tab.active{background:var(--blue-dark);color:#fff;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .toolbar input[type="text"]{flex:1;min-width:140px;padding:10px 14px;font-size:14px;border:2px solid #E0E5EC;border-radius:8px;font-family:inherit;}

  /* 테이블 */
  #recordsTable,#studentsTable{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;}
  table.data{width:100%;min-width:560px;border-collapse:collapse;font-size:13px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 16px rgba(18,85,160,.05);}
  table.data th{background:var(--blue-pastel);color:var(--blue-dark);padding:10px 8px;font-weight:700;text-align:center;font-size:12px;}
  table.data td{padding:9px 8px;border-bottom:1px solid #EEF1F5;text-align:center;vertical-align:middle;}
  table.data tr:last-child td{border-bottom:none;}
  table.data tr:hover td{background:#F8FBFE;}
  .badge-score{display:inline-block;padding:2px 10px;border-radius:99px;font-weight:700;font-size:12px;}
  .badge-score.good{background:#E8F5EC;color:var(--green-dark);}
  .badge-score.mid{background:#FDF1E1;color:var(--amber);}
  .badge-score.low{background:#FCEEEC;color:var(--red-accent);}
  .wrong-list{font-size:12px;color:var(--red-accent);font-weight:600;}
  .empty{padding:40px 20px;text-align:center;color:var(--text-light);font-size:14px;}

  /* 문항별 정답률 */
  .qrate-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #EEF1F5;background:#fff;}
  .qrate-row:first-child{border-top-left-radius:10px;border-top-right-radius:10px;}
  .qrate-row:last-child{border-bottom-left-radius:10px;border-bottom-right-radius:10px;border-bottom:none;}
  .qrate-no{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--blue-dark);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
  .qrate-text{flex:1;font-size:13px;color:var(--text-main);line-height:1.4;}
  .qrate-bar-wrap{flex-shrink:0;width:120px;height:8px;background:#E5EAF0;border-radius:99px;overflow:hidden;}
  .qrate-bar{height:100%;border-radius:99px;}
  .qrate-pct{flex-shrink:0;width:50px;text-align:right;font-weight:700;font-size:13px;color:var(--blue-dark);}

  /* 학생 상세 모달 */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:100;align-items:center;justify-content:center;padding:16px;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff;border-radius:16px;padding:24px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;}
  .modal h3{margin:0 0 6px;color:var(--blue-dark);}
  .modal .modal-sub{color:var(--text-light);font-size:13px;margin-bottom:16px;}
  .modal .attempt{background:#F5F8FC;border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:13px;}
  .modal .attempt .at-head{display:flex;justify-content:space-between;margin-bottom:6px;}
  .modal .attempt .at-head b{color:var(--blue-dark);}
  .modal-close{margin-top:14px;text-align:right;}

  /* 전체 로딩 */
  .full-loading{position:fixed;inset:0;background:rgba(255,255,255,.8);display:none;align-items:center;justify-content:center;z-index:200;}
  .full-loading.show{display:flex;}
  .spinner{width:36px;height:36px;border:3px solid #E0E5EC;border-top-color:var(--blue-dark);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ===== 문항 편집기 ===== */
  .ed-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 4px 16px rgba(18,85,160,.06);}
  .ed-sep{width:1px;height:24px;background:var(--line);margin:0 2px;}
  .ed-meta{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 4px 16px rgba(18,85,160,.05);display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .ed-meta .full{grid-column:1/-1;}
  .ed-field label{display:block;font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:4px;}
  .ed-field input,.ed-field select,.ed-field textarea{width:100%;padding:9px 12px;font-size:14px;border:2px solid #E0E5EC;border-radius:8px;font-family:inherit;background:#FAFBFD;}
  .ed-field input:focus,.ed-field select:focus,.ed-field textarea:focus{outline:none;border-color:var(--blue-dark);background:#fff;}
  .ed-field textarea{resize:vertical;min-height:46px;line-height:1.5;}
  .ed-q{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 4px 16px rgba(18,85,160,.05);border-left:5px solid var(--blue-dark);}
  .ed-q.hidden{opacity:.6;border-left-color:var(--line);background:#F6F7F9;}
  .ed-q-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
  .ed-q-no{font-weight:900;color:var(--blue-dark);font-size:14px;}
  .ed-q-no .hidetag{background:#EEE;color:#888;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:6px;}
  .ed-opt{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .ed-opt input[type="radio"]{width:18px;height:18px;flex-shrink:0;accent-color:var(--green-dark);}
  .ed-opt input[type="text"]{flex:1;padding:8px 10px;font-size:14px;border:2px solid #E0E5EC;border-radius:8px;font-family:inherit;}
  .ed-opt .onum{flex-shrink:0;width:22px;text-align:center;font-weight:700;color:var(--text-light);font-size:13px;}
  .ed-hint{font-size:11px;color:var(--text-light);margin:2px 0 8px;}
  .ed-add{width:100%;padding:14px;border:2px dashed var(--blue-dark);background:#F5F9FE;color:var(--blue-dark);border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:30px;}
  .ed-add:hover{background:#EAF3FC;}
  .backup-box{background:#FFF8E8;border:1px solid #F0D9A8;border-radius:12px;padding:14px;margin-bottom:12px;}
  .backup-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 4px;border-bottom:1px solid #F0E4C8;font-size:13px;}
  .backup-row:last-child{border-bottom:none;}

  /* ===== 모바일 (작은 화면) ===== */
  @media (max-width:480px){
    .ed-meta{grid-template-columns:1fr;}
    body{padding:12px;}
    .card{padding:18px;}
    .pin-card{padding:32px 20px;margin-top:36px;}
    .head-bar{padding:16px 16px;}
    .quiz-picker{padding:12px 14px;}
    .stats-summary{grid-template-columns:repeat(2,1fr);}
    .toolbar{gap:6px;}
    .toolbar input[type="text"]{min-width:0;flex:1 1 100%;}
    .modal{padding:18px;}
    .qrate-bar-wrap{width:70px;}
    .qrate-pct{width:42px;}
  }
</style>
</head>
<body>
<div class="container">

  <!-- ===== PIN 게이트 ===== -->
  <div id="screen-pin" class="screen active">
    <div class="card pin-card">
      <div class="logo">🔐</div>
      <h1>관리자 대시보드</h1>
      <div class="desc">PIN을 입력하세요.</div>
      <input id="adminPin" type="password" inputmode="numeric" maxlength="6" placeholder="●●●●●●">
      <div class="err-msg" id="pinErr">&nbsp;</div>
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;">
        <button class="btn btn-ghost" onclick="goHome()">학생 화면</button>
        <button class="btn btn-primary" id="btnLogin" onclick="checkPin()" disabled>연결 중...</button>
      </div>
      <div class="conn-status" id="connStatus">서버 연결 중...</div>
    </div>
  </div>

  <!-- ===== 대시보드 ===== -->
  <div id="screen-dash" class="screen">
    <div class="head-bar">
      <div>
        <h1>📊 퀴즈 통합 대시보드</h1>
        <div class="sub">lifescience-quiz · 모든 퀴즈 결과 한곳에서</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost btn-mini" onclick="refreshAll()">🔄 새로고침</button>
        <button class="btn btn-ghost btn-mini" onclick="goHome()">홈</button>
      </div>
    </div>

    <div class="quiz-picker">
      <label>퀴즈 선택:</label>
      <select id="quizSelect" onchange="onQuizChange()"></select>
      <span class="picker-info" id="quizInfo"></span>
    </div>

    <div class="stats-summary" id="statsSummary"></div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="records" onclick="switchTab('records')">시도 기록</button>
      <button class="admin-tab" data-tab="students" onclick="switchTab('students')">학생별 요약</button>
      <button class="admin-tab" data-tab="questions" onclick="switchTab('questions')">문항별 정답률</button>
      <button class="admin-tab" data-tab="accounts" onclick="switchTab('accounts')">학생 계정</button>
      <button class="admin-tab" data-tab="editor" onclick="switchTab('editor')">✏️ 문항 편집</button>
    </div>

    <div id="tab-records" class="admin-tab-content">
      <div class="toolbar">
        <input type="text" id="searchRecords" placeholder="학번 또는 이름 검색" oninput="renderRecords()">
        <button class="btn btn-green btn-mini" onclick="downloadCSV('records')">CSV 다운로드</button>
        <button class="btn btn-danger btn-mini" onclick="confirmClearAll()">이 퀴즈 기록 전체 삭제</button>
      </div>
      <div id="recordsTable"></div>
    </div>

    <div id="tab-students" class="admin-tab-content" style="display:none;">
      <div class="toolbar">
        <input type="text" id="searchStudents" placeholder="학번 또는 이름 검색" oninput="renderStudents()">
        <button class="btn btn-green btn-mini" onclick="downloadCSV('students')">CSV 다운로드</button>
      </div>
      <div id="studentsTable"></div>
    </div>

    <div id="tab-questions" class="admin-tab-content" style="display:none;">
      <div id="questionsList"></div>
    </div>

    <div id="tab-accounts" class="admin-tab-content" style="display:none;">
      <div style="font-size:12.5px;color:var(--text-light);margin:2px 2px 10px;">전체 학생 계정 (퀴즈 선택과 무관). 진도는 모든 퀴즈 합계입니다.</div>
      <div class="toolbar">
        <input type="text" id="searchAccounts" placeholder="학번 또는 이름 검색" oninput="renderAccounts()">
        <button class="btn btn-ghost btn-mini" onclick="loadAccounts()">🔄 계정 새로고침</button>
      </div>
      <div id="accountsTable"></div>
    </div>

    <div id="tab-editor" class="admin-tab-content" style="display:none;">
      <div style="font-size:12.5px;color:var(--text-light);margin:2px 2px 12px;line-height:1.6;">
        위 <b>퀴즈 선택</b>에서 편집할 퀴즈를 고르세요. 저장하면 학생 화면에 <b>바로 반영</b>됩니다(재배포 불필요).<br>
        ⚠️ 학습 진도 보호를 위해 <b>삭제·순서변경은 불가</b>하며, 안 쓸 문항은 <b>‘숨김’</b> 처리하세요. 새 문항은 항상 맨 끝에 추가됩니다.
      </div>
      <div class="ed-toolbar">
        <button class="btn btn-green btn-mini" onclick="saveQuiz()">💾 저장(반영)</button>
        <button class="btn btn-ghost btn-mini" onclick="newQuiz()">＋ 새 퀴즈</button>
        <span class="ed-sep"></span>
        <button class="btn btn-ghost btn-mini" onclick="exportExcel()">⬇ 엑셀 내보내기</button>
        <button class="btn btn-ghost btn-mini" onclick="document.getElementById('xlsxFile').click()">⬆ 엑셀 가져오기</button>
        <button class="btn btn-ghost btn-mini" onclick="exportJSON()">⬇ JSON</button>
        <button class="btn btn-ghost btn-mini" onclick="document.getElementById('jsonFile').click()">⬆ JSON</button>
        <span class="ed-sep"></span>
        <button class="btn btn-ghost btn-mini" onclick="showBackups()">↩ 백업/복원</button>
        <input type="file" id="xlsxFile" accept=".xlsx,.xls" style="display:none" onchange="importExcel(event)">
        <input type="file" id="jsonFile" accept=".json,application/json" style="display:none" onchange="importJSON(event)">
      </div>
      <div id="backupBox"></div>
      <div id="editorBox"></div>
    </div>
  </div>

  <div class="credit">Claude AI로 이 앱을 제작함 by 고은표</div>
</div>

<!-- 학생 상세 모달 -->
<div class="modal-bg" id="studentModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">학생 시도 기록</h3>
    <div class="modal-sub" id="modalSub"></div>
    <div id="modalBody"></div>
    <div class="modal-close"><button class="btn btn-ghost btn-mini" onclick="closeModal()">닫기</button></div>
  </div>
</div>

<div class="full-loading" id="fullLoading"><div class="spinner"></div></div>

<script>
/* ==========================================================
   Firebase 설정 (학생용 HTML과 동일)
   ========================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyA1yobw0EreDxuIVRr_eaI2XN7BZRtZ9w4",
  authDomain: "lifescience-quiz.firebaseapp.com",
  databaseURL: "https://lifescience-quiz-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "lifescience-quiz",
  storageBucket: "lifescience-quiz.firebasestorage.app",
  messagingSenderId: "1058536346764",
  appId: "1:1058536346764:web:83b6d25dfad6d9fa8b17a9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

/* ==========================================================
   관리자 PIN (SHA-256 해시)
   ========================================================== */
// 기본 PIN: 240518
// 변경: 콘솔(F12)에서 await generatePinHash('새PIN') 실행 후 해시값으로 교체
const ADMIN_PIN_HASH = '00737f60e7ec0a952a14e3e7db1f19bde04b8fd7ce663947fd107c20de5a3413';

async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
window.generatePinHash = async function(pin){
  const h = await sha256(String(pin));
  console.log(`PIN "${pin}" → 해시: ${h}`);
  console.log(`코드 상단의 ADMIN_PIN_HASH 값을 위 해시로 교체하세요.`);
  return h;
};
(async()=>{ const h = await sha256('240518'); console.log(`[관리자] 기본 PIN "240518"의 해시값: ${h}`); console.log(`[관리자] 변경하려면: await generatePinHash('새PIN')`); })();

/* ==========================================================
   배열 안전 변환 — Firebase는 빈 인덱스가 있는 배열을 객체로 복원
   ========================================================== */
function toArray(v){
  if(Array.isArray(v)) return v;
  if(v && typeof v === 'object') return Object.values(v);
  return [];
}

/* ==========================================================
   부팅 — 익명 로그인
   ========================================================== */
let isAuthed = false;
async function initFirebase(){
  try {
    await auth.signInAnonymously();
    isAuthed = true;
    document.getElementById('connStatus').textContent = '서버 연결됨';
    document.getElementById('btnLogin').disabled = false;
    document.getElementById('btnLogin').textContent = '확인';
    document.getElementById('adminPin').focus();
  } catch(e) {
    console.error(e);
    document.getElementById('connStatus').textContent = '⚠️ 서버 연결 실패 — 새로고침해 주세요';
  }
}

/* ==========================================================
   PIN 검증
   ========================================================== */
async function checkPin(){
  if(!isAuthed){ document.getElementById('pinErr').textContent = '서버 연결을 기다려주세요.'; return; }
  const pin = document.getElementById('adminPin').value.trim();
  const errEl = document.getElementById('pinErr');
  if(!pin){ errEl.textContent = 'PIN을 입력하세요.'; return; }
  const hash = await sha256(pin);
  if(hash === ADMIN_PIN_HASH){
    document.getElementById('adminPin').value = '';
    errEl.textContent = '';
    goScreen('dash');
    await loadAll();
  } else {
    errEl.textContent = 'PIN이 일치하지 않습니다.';
  }
}

  if(e.key === 'Enter') checkPin();
});

/* ==========================================================
   데이터 로드
   ========================================================== */
let allQuizMeta = {};   // {quizId: {title, subtitle, totalQuestions, questions[]}}
let allQuizzes = {};    // {quizId: {unit,unitColor,color,title,subtitle,order,questions[{...,explain,hidden}]}}
const ADMIN_SID = '20700';   // 고은표(관리자) 학번 — 통계에서 제외하고 별도 표시
let currentQuizId = '';
let allRecords = [];    // 선택된 퀴즈의 학생 응시 기록 (관리자 제외)
let adminRecords = [];  // 관리자(고은표) 응시 기록 — 통계 미포함, 별도 표시

async function loadAll(){
  document.getElementById('fullLoading').classList.add('show');
  try {
    const [metaSnap, quizSnap] = await Promise.all([
      db.ref('quizMeta').once('value'),
      db.ref('quizzes').once('value')
    ]);
    allQuizMeta = metaSnap.val() || {};
    allQuizzes = quizSnap.val() || {};
    renderQuizSelector();
    const ids = Object.keys(allQuizMeta);
    if(ids.length){
      currentQuizId = ids[0];
      document.getElementById('quizSelect').value = currentQuizId;
      await loadQuizRecords(currentQuizId);
    } else {
      // 메타가 아직 없으면 안내
      document.getElementById('statsSummary').innerHTML = '<div class="card empty" style="grid-column:1/-1;">아직 등록된 퀴즈가 없습니다. 학생용 퀴즈 페이지를 한 번 열면 자동으로 등록됩니다.</div>';
    }
  } catch(e){
    console.error(e);
    alert('데이터 로드 실패: ' + e.message);
  } finally {
    document.getElementById('fullLoading').classList.remove('show');
  }
}

async function refreshAll(){
  if(!currentQuizId){ await loadAll(); return; }
  document.getElementById('fullLoading').classList.add('show');
  try {
    const [metaSnap, quizSnap] = await Promise.all([
      db.ref('quizMeta').once('value'),
      db.ref('quizzes').once('value')
    ]);
    allQuizMeta = metaSnap.val() || {};
    allQuizzes = quizSnap.val() || {};
    renderQuizSelector();
    document.getElementById('quizSelect').value = currentQuizId;
    await loadQuizRecords(currentQuizId);
  } finally {
    document.getElementById('fullLoading').classList.remove('show');
  }
}

function renderQuizSelector(){
  const sel = document.getElementById('quizSelect');
  const ids = Object.keys(allQuizMeta).sort();
  if(!ids.length){
    sel.innerHTML = '<option>— 등록된 퀴즈 없음 —</option>';
    sel.disabled = true;
    return;
  }
  sel.disabled = false;
  sel.innerHTML = ids.map(id =>
    `<option value="${id}">${allQuizMeta[id].title || id}</option>`
  ).join('');
}

async function onQuizChange(){
  currentQuizId = document.getElementById('quizSelect').value;
  document.getElementById('fullLoading').classList.add('show');
  try { await loadQuizRecords(currentQuizId); }
  finally { document.getElementById('fullLoading').classList.remove('show'); }
  // 문항 편집 탭이 열려 있으면 편집기도 갱신
  if(document.getElementById('tab-editor').style.display !== 'none'){ loadEditor(); }
}

async function loadQuizRecords(quizId){
  const snap = await db.ref(`results/${quizId}`).once('value');
  const data = snap.val() || {};
  const records = Object.entries(data).map(([id, r]) => ({id, ...r}));
  // 관리자(고은표) 기록은 통계에서 분리
  adminRecords = records.filter(r => r.studentId === ADMIN_SID);
  allRecords = records.filter(r => r.studentId !== ADMIN_SID);
  const meta = allQuizMeta[quizId] || {};
  document.getElementById('quizInfo').textContent =
    `총 ${meta.totalQuestions || '?'}문항 · ${allRecords.length}건 응시` +
    (adminRecords.length ? ` (관리자 ${adminRecords.length}건 별도)` : '');
  renderSummary();
  renderRecords();
  renderStudents();
  renderQuestionRates();
}

/* ==========================================================
   요약 통계

function renderSummary(){
  const meta = allQuizMeta[currentQuizId];
  const total = meta?.totalQuestions || (allRecords[0]?.total || 0);
  const totalAttempts = allRecords.length;
  const uniqueStudents = new Set(allRecords.map(r => r.studentId)).size;
  const avgScore = totalAttempts ? (allRecords.reduce((s,r)=>s+r.score,0) / totalAttempts).toFixed(1) : '0';
  const pct = (totalAttempts && total) ? Math.round((allRecords.reduce((s,r)=>s+r.score,0) / (totalAttempts * total)) * 100) : 0;
  document.getElementById('statsSummary').innerHTML = `
    <div class="stat-box"><div class="label">총 응시 횟수</div><div class="val">${totalAttempts}</div></div>
    <div class="stat-box"><div class="label">응시 학생 수</div><div class="val">${uniqueStudents}</div></div>
    <div class="stat-box"><div class="label">평균 점수</div><div class="val">${avgScore}<span style="font-size:14px;color:var(--text-light);">/${total}</span></div></div>
    <div class="stat-box"><div class="label">평균 정답률</div><div class="val">${pct}<span style="font-size:14px;color:var(--text-light);">%</span></div></div>
  `;
}

/* ==========================================================
   렌더링 유틸
   ========================================================== */
function scoreBadge(score, total){
  const pct = (score/total)*100;
  const cls = pct >= 80 ? 'good' : pct >= 50 ? 'mid' : 'low';
  return `<span class="badge-score ${cls}">${score}/${total}</span>`;
}
function fmtTime(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  const yy = d.getFullYear(), mm = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0'), mi = String(d.getMinutes()).padStart(2,'0');
  return `${yy}-${mm}-${dd} ${hh}:${mi}`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ==========================================================
   시도 기록 탭
   ========================================================== */
function renderRecords(){
  const q = (document.getElementById('searchRecords')?.value || '').trim().toLowerCase();

  const wrap = document.getElementById('recordsTable');
  const recordRow = r => {
    const wrongIdx = toArray(r.wrongIdx);
    return `<tr>
      <td>${fmtTime(r.timestamp)}</td>
      <td>${escapeHtml(r.studentId||'')}</td>
      <td>${escapeHtml(r.name||'')}</td>

      <td>${r.attempt||1}회차</td>
      <td>${r.elapsedSec ? Math.floor(r.elapsedSec/60)+'분 '+(r.elapsedSec%60)+'초' : '—'}</td>
    </tr>`;
  };
  const tableHead = `<thead><tr>
    <th>응시 시각</th><th>학번</th><th>이름</th><th>점수</th><th>틀린 문항</th><th>시도</th><th>소요</th>
  </tr></thead>`;
  // 관리자(고은표) 기록 — 통계 미포함, 별도 섹션
  const adminSorted = adminRecords.slice().sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));
  const adminBlock = adminSorted.length ? `
    <div style="margin-top:18px;font-size:13px;font-weight:700;color:var(--text-light);">🔒 관리자 응시 기록 (통계 미포함) — ${adminSorted.length}건</div>
    <table class="data" style="opacity:.8;">${tableHead}<tbody>${adminSorted.map(recordRow).join('')}</tbody></table>` : '';
  if(!filtered.length){ wrap.innerHTML = '<div class="card empty">기록이 없습니다.</div>' + adminBlock; return; }
  wrap.innerHTML = `<table class="data">${tableHead}<tbody>${filtered.map(recordRow).join('')}</tbody></table>` + adminBlock;
}

/* ==========================================================
   학생별 요약 탭
   ========================================================== */
function renderStudents(){
  const q = (document.getElementById('searchStudents')?.value || '').trim().toLowerCase();
  const groups = {};
  allRecords.forEach(r => {
    const sid = r.studentId || '';
    if(!groups[sid]) groups[sid] = {studentId:sid, name:r.name, attempts:[]};
    groups[sid].attempts.push(r);
  });
  const list = Object.values(groups)
    .filter(g => !q || g.studentId.includes(q) || (g.name||'').toLowerCase().includes(q))
    .map(g => {
      const sorted = g.attempts.slice().sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));
      const best = g.attempts.reduce((m,a)=>(a.score||0) > (m.score||0) ? a : m, g.attempts[0]);
      const latest = sorted[0];
      return {...g, best, latest, count:g.attempts.length};
    })
    .sort((a,b)=>a.studentId.localeCompare(b.studentId));
  const wrap = document.getElementById('studentsTable');
  if(!list.length){ wrap.innerHTML = '<div class="card empty">학생 기록이 없습니다.</div>'; return; }
  wrap.innerHTML = `<table class="data"><thead><tr>
    <th>학번</th><th>이름</th><th>시도</th><th>최고 점수</th><th>최근 점수</th><th>최근 틀린 문항</th><th>상세</th>
  </tr></thead><tbody>${list.map(g=>{
    const latestWrong = toArray(g.latest.wrongIdx);
    return `<tr>
      <td>${escapeHtml(g.studentId)}</td>
      <td>${escapeHtml(g.name||'')}</td>
      <td>${g.count}회</td>
      <td>${scoreBadge(g.best.score||0, g.best.total||0)}</td>
      <td>${scoreBadge(g.latest.score||0, g.latest.total||0)}</td>
      <td class="wrong-list">${latestWrong.length ? latestWrong.map(i=>i+1).join(', ')+'번' : '—'}</td>
      <td><button class="btn btn-ghost btn-mini" onclick='showStudent("${g.studentId}")'>보기</button></td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function showStudent(studentId){
  const records = allRecords
    .filter(r => r.studentId === studentId)
    .sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));
  if(!records.length) return;
  const meta = allQuizMeta[currentQuizId];
  const questions = toArray(meta?.questions);
  const name = records[0].name || '';
  document.getElementById('modalTitle').textContent = `${studentId} · ${name}`;
  document.getElementById('modalSub').textContent = `${meta?.title || currentQuizId} · 총 ${records.length}회 응시`;
  document.getElementById('modalBody').innerHTML = records.map(r=>{
    const wrongIdx = toArray(r.wrongIdx);
    const ansObj = r.answers || {};
    const wrongDetail = wrongIdx.length ? wrongIdx.map(i=>{
      const userAns = ansObj[i];
      const correctAns = questions[i] ? questions[i].answer : undefined;
      return `${i+1}번(택${userAns===null||userAns===undefined?'?':userAns+1}/정답${correctAns!==undefined?correctAns+1:'?'})`;
    }).join(', ') : '없음 — 만점!';
    return `<div class="attempt">
      <div class="at-head">
        <span>${r.attempt||1}회차 · ${fmtTime(r.timestamp)}</span>
        <b>${r.score||0} / ${r.total||0}</b>
      </div>
      <div>틀린 문항: ${wrongDetail}</div>
    </div>`;
  }).join('');
  document.getElementById('studentModal').classList.add('show');
}
function closeModal(){ document.getElementById('studentModal').classList.remove('show'); }

/* ==========================================================
   문항별 정답률 탭
   ========================================================== */
function renderQuestionRates(){
  const wrap = document.getElementById('questionsList');
  const meta = allQuizMeta[currentQuizId];
  const questions = toArray(meta?.questions);
  if(!allRecords.length){ wrap.innerHTML = '<div class="card empty">데이터가 없습니다.</div>'; return; }
  if(!questions.length){ wrap.innerHTML = '<div class="card empty">퀴즈 문항 정보가 없습니다.</div>'; return; }
  // 부분 출제 호환: answers는 {원본인덱스:선택지} 맵(또는 구버전 배열). 출제 안 된 문항(undefined/null)은 제외
  const stats = questions.map((q,i)=>{
    let right=0, served=0;
    allRecords.forEach(r=>{
      const ans = r.answers ? r.answers[i] : undefined;
      if(ans === null || ans === undefined) return;   // 이 시도엔 출제되지 않음
      served++;
      if(ans === q.answer) right++;
    });
    return {idx:i, q, right, served, pct: served ? Math.round((right/served)*100) : 0};
  });
  wrap.innerHTML = stats.map(s=>{
    const color = s.pct >= 80 ? 'var(--green-dark)' : s.pct >= 50 ? 'var(--amber)' : 'var(--red-accent)';
    const qPlain = (s.q.q || '').replace(/<[^>]+>/g, '');
    return `<div class="qrate-row">
      <div class="qrate-no">${s.idx+1}</div>
      <div class="qrate-text">${escapeHtml(qPlain.length > 70 ? qPlain.slice(0,70)+'…' : qPlain)}<div style="font-size:11px;color:var(--text-light);margin-top:2px;">${escapeHtml(s.q.chapter||'')} · ${s.served}회 출제</div></div>
      <div class="qrate-bar-wrap"><div class="qrate-bar" style="width:${s.pct}%;background:${color};"></div></div>
      <div class="qrate-pct" style="color:${s.served?color:'var(--text-light)'}">${s.served? s.pct+'%' : '—'}</div>
    </div>`;
  }).join('');
}

/* ==========================================================
   CSV 다운로드
   ========================================================== */
function downloadCSV(kind){
  const meta = allQuizMeta[currentQuizId];
  const quizName = meta?.title || currentQuizId;
  let rows = [];
  let filename = '';
  if(kind === 'records'){
    filename = `퀴즈기록_${currentQuizId}_${new Date().toISOString().slice(0,10)}.csv`;
    rows.push(['응시시각','학번','이름','점수','총문항','시도횟수','소요(초)','틀린문항번호','상세응답']);
    allRecords.slice().sort((a,b)=>(a.timestamp||'').localeCompare(b.timestamp||'')).forEach(r=>{
      const questions = toArray(meta?.questions);
      const ansObj = r.answers || {};
      const detail = questions.map((qq,i)=>{
        const a = ansObj[i];
        if(a === null || a === undefined) return `Q${i+1}:-`;   // 미출제
        const correct = qq.answer;
        const mark = (a === correct) ? 'O' : 'X';
        return `Q${i+1}:${a+1}${mark}`;
      }).join(' | ');
      rows.push([fmtTime(r.timestamp), r.studentId||'', r.name||'', r.score||0, r.total||0, r.attempt||1, r.elapsedSec||'', toArray(r.wrongIdx).map(i=>i+1).join(','), detail]);
    });
  } else if(kind === 'students'){
    filename = `학생별요약_${currentQuizId}_${new Date().toISOString().slice(0,10)}.csv`;
    rows.push(['학번','이름','시도횟수','최고점수','최근점수','최근틀린문항']);
    const groups = {};
    allRecords.forEach(r => {
      const sid = r.studentId || '';
      if(!groups[sid]) groups[sid] = {studentId:sid, name:r.name, attempts:[]};
      groups[sid].attempts.push(r);
    });
    Object.values(groups).sort((a,b)=>a.studentId.localeCompare(b.studentId)).forEach(g=>{
      const best = g.attempts.reduce((m,a)=>(a.score||0)>(m.score||0)?a:m, g.attempts[0]);
      const latest = g.attempts.slice().sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''))[0];
      rows.push([g.studentId, g.name||'', g.attempts.length, `${best.score||0}/${best.total||0}`, `${latest.score||0}/${latest.total||0}`, toArray(latest.wrongIdx).map(i=>i+1).join(',')]);
    });
  }
  const csv = rows.map(r => r.map(c => {
    const s = String(c ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

let allStudents = [];          // [{uid, studentId, name, createdAt, pinHash}]

  </tr></thead>`;
  // 관리자(고은표) 계정은 학생 목록과 분리해 별도 표시
  const adminAccts = allStudents.filter(s => s.studentId === ADMIN_SID);
  const list = allStudents
    .filter(s => s.studentId !== ADMIN_SID)
    .filter(s => !q || (s.studentId||'').includes(q) || (s.name||'').toLowerCase().includes(q))
    .sort((a,b)=> (a.studentId||'').localeCompare(b.studentId||'') || (a.name||'').localeCompare(b.name||''));
  const adminBlock = adminAccts.length ? `
    <div style="margin-top:18px;font-size:13px;font-weight:700;color:var(--text-light);">🔒 관리자 계정 (학생 통계 미포함)</div>
    <table class="data" style="opacity:.85;">${tableHead}<tbody>${adminAccts.map(s=>accountRow(s,true)).join('')}</tbody></table>` : '';
  if(!list.length){ wrap.innerHTML = '<div class="card empty">검색 결과가 없습니다.</div>' + adminBlock; return; }
  wrap.innerHTML = `<table class="data">${tableHead}<tbody>${list.map(s=>accountRow(s,false)).join('')}</tbody></table>` + adminBlock;
}

async function resetStudentPin(uid){
  const s = allStudents.find(x=>x.uid===uid); if(!s) return;
  if(!confirm(`${s.studentId} ${s.name} 학생의 PIN을 초기화할까요?\n\n학생은 다음 로그인 때 학번·이름으로 PIN을 새로 설정하게 됩니다.`)) return;
  try { await db.ref(`students/${uid}/pinHash`).remove(); await loadAccounts(); alert('PIN이 초기화되었습니다.'); }
  catch(e){ console.error(e); alert('실패: ' + e.message); }
}

async function editStudentName(uid){
  const s = allStudents.find(x=>x.uid===uid); if(!s) return;
  const nn = prompt('새 이름을 입력하세요:', s.name||'');
  if(nn === null) return;
  const name = nn.trim();
  if(!name){ alert('이름을 입력하세요.'); return; }
  try { await db.ref(`students/${uid}/name`).set(name); await loadAccounts(); }
  catch(e){ console.error(e); alert('실패: ' + e.message); }
}

async function deleteStudent(uid){
  const s = allStudents.find(x=>x.uid===uid); if(!s) return;
  if(!confirm(`⚠️ ${s.studentId} ${s.name} 학생 계정을 삭제할까요?\n\n계정과 모든 학습 진도가 삭제됩니다. (과거 응시 기록은 남습니다)\n되돌릴 수 없습니다.`)) return;
  document.getElementById('fullLoading').classList.add('show');
  try {
    await db.ref(`students/${uid}`).remove();
    await db.ref(`progress/${uid}`).remove();
    await loadAccounts();
  } catch(e){ console.error(e); alert('삭제 실패: ' + e.message); }
  finally { document.getElementById('fullLoading').classList.remove('show'); }
}

/* ==========================================================
   초기화 (선택된 퀴즈의 모든 기록 삭제) — 2단계 PIN 확인
   ========================================================== */
async function confirmClearAll(){
  const meta = allQuizMeta[currentQuizId];
  const name = meta?.title || currentQuizId;
  if(!confirm(`「${name}」의 모든 응시 기록을 삭제할까요?\n\n이 작업은 되돌릴 수 없습니다.`)) return;

  // 한 번 더 PIN 입력 받기 (실수 방지)
  const reenter = prompt('확인을 위해 관리자 PIN을 다시 입력하세요:');
  if(reenter === null) return;
  const reHash = await sha256(reenter.trim());
  if(reHash !== ADMIN_PIN_HASH){
    alert('PIN이 일치하지 않습니다. 삭제가 취소되었습니다.');
    return;
  }

  document.getElementById('fullLoading').classList.add('show');
  try {
    await db.ref(`results/${currentQuizId}`).remove();
    await loadQuizRecords(currentQuizId);
    alert('삭제 완료. 기록이 모두 비워졌습니다.');
  } catch(e){
    console.error(e);
    alert('삭제 실패: ' + e.message + '\n\nFirebase 보안 규칙이 최신인지 확인해주세요.');
  } finally {
    document.getElementById('fullLoading').classList.remove('show');
  }
}

/* ==========================================================
   ✏️ 문항 편집기 (DB의 quizzes/ 를 직접 편집 → 학생 화면 즉시 반영)
   ========================================================== */
let editorQuiz = null;     // 현재 편집 중인 작업본 {id,unit,unitColor,color,title,subtitle,order,questions:[{chapter,tagClass,q,options,answer,explain,hidden}]}
let editorIsNew = false;

function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
function padOpts(a){ a=(a||[]).slice(0,4); while(a.length<4) a.push(''); return a.map(x=>String(x==null?'':x)); }
function colorOptions(sel){ return ['blue','green','amber','purple'].map(c=>`<option value="${c}" ${c===sel?'selected':''}>${c}</option>`).join(''); }
function nextOrder(){ let mx=-1; Object.values(allQuizzes).forEach(z=>{ if(z&&typeof z.order==='number'&&z.order>mx) mx=z.order; }); return (mx<0?0:mx+10); }
function blankQuestion(){ const last=editorQuiz.questions[editorQuiz.questions.length-1]; return {chapter:(last&&last.chapter)||'', tagClass:editorQuiz.color||'purple', q:'', options:['','','',''], answer:0, explain:'', hidden:false}; }

function buildModel(id){
  const z = allQuizzes[id];
  if(z){
    return deepClone({
      id, unit:z.unit||'', unitColor:z.unitColor||'blue', color:z.color||'blue',
      title:z.title||id, subtitle:z.subtitle||'', order:(typeof z.order==='number'?z.order:9999),
      questions: toArray(z.questions).map(q=>({chapter:q.chapter||'',tagClass:q.tagClass||'purple',q:q.q||'',options:padOpts(toArray(q.options)),answer:(typeof q.answer==='number'?q.answer:0),explain:q.explain||'',hidden:!!q.hidden}))
    });
  }
  // 아직 quizzes/에 시드 안 됨 → quizMeta로 폴백(해설 없음)
  const m = allQuizMeta[id] || {};
  return {
    id, unit:'', unitColor:'blue', color:'blue', title:m.title||id, subtitle:m.subtitle||'', order:9999, _fromMeta:true,
    questions: toArray(m.questions).map(q=>({chapter:q.chapter||'',tagClass:'purple',q:q.q||'',options:padOpts(toArray(q.options)),answer:(typeof q.answer==='number'?q.answer:0),explain:'',hidden:!!q.hidden}))
  };
}

function loadEditor(){
  document.getElementById('backupBox').innerHTML='';
  if(editorIsNew && editorQuiz){ renderEditor(); return; }  // 저장 안 한 새 퀴즈 유지
  if(!currentQuizId){ document.getElementById('editorBox').innerHTML='<div class="card empty">위에서 편집할 퀴즈를 선택하거나 [＋ 새 퀴즈]를 누르세요.</div>'; return; }
  editorIsNew=false;
  editorQuiz = buildModel(currentQuizId);
  renderEditor();
}

function renderEditor(){
  const m = editorQuiz; if(!m) return;
  const warn = m._fromMeta ? `<div class="backup-box" style="margin-bottom:12px;">⚠️ 이 퀴즈는 아직 DB에 시드되지 않아 <b>해설이 비어 있습니다</b>. 학생 페이지(index.html)를 한 번 열어 새로고침하면 기본 해설이 채워집니다. 그 전에 저장하면 해설이 빈 채로 덮어쓰여요.</div>` : '';
  const meta = `<div class="ed-meta">
    <div class="ed-field full"><label>제목</label><input id="edTitle" value="${escapeHtml(m.title)}"></div>
    <div class="ed-field full"><label>부제(설명)</label><input id="edSubtitle" value="${escapeHtml(m.subtitle)}"></div>
    <div class="ed-field full"><label>단원명 (허브에서 같은 단원끼리 묶여 표시)</label><input id="edUnit" value="${escapeHtml(m.unit)}" placeholder="예: Ⅲ. 생명의 연속성과 다양성"></div>
    <div class="ed-field"><label>단원 색</label><select id="edUnitColor">${colorOptions(m.unitColor)}</select></div>
    <div class="ed-field"><label>카드 색</label><select id="edColor">${colorOptions(m.color)}</select></div>
  </div>`;
  const qs = m.questions.map((q,i)=>{
    const opts=[0,1,2,3].map(k=>`<div class="ed-opt"><input type="radio" name="ans_${i}" value="${k}" ${q.answer===k?'checked':''}><span class="onum">${k+1}</span><input type="text" class="edOpt${k}" value="${escapeHtml(q.options[k]||'')}" placeholder="보기 ${k+1}"></div>`).join('');
    return `<div class="ed-q ${q.hidden?'hidden':''}" data-qi="${i}">
      <div class="ed-q-head">
        <span class="ed-q-no">문항 ${i+1}${q.hidden?'<span class="hidetag">숨김(출제 안 됨)</span>':''}</span>
        <button class="btn ${q.hidden?'btn-green':'btn-ghost'} btn-mini" onclick="edToggleHide(${i})">${q.hidden?'다시 표시':'숨기기'}</button>
      </div>
      <div class="ed-field" style="margin-bottom:8px;"><label>분류(소단원)</label><input class="edChapter" value="${escapeHtml(q.chapter)}" placeholder="예: 3-1 염색체의 구조"></div>
      <div class="ed-field" style="margin-bottom:8px;"><label>문제 (HTML 태그 &lt;b&gt; 사용 가능)</label><textarea class="edQ" rows="2">${escapeHtml(q.q)}</textarea></div>
      <div class="ed-hint">정답인 보기 왼쪽 ◉를 선택하세요.</div>
      ${opts}
      <div class="ed-field" style="margin-top:8px;"><label>해설</label><textarea class="edExplain" rows="2">${escapeHtml(q.explain)}</textarea></div>
    </div>`;
  }).join('');
  document.getElementById('editorBox').innerHTML = warn + meta + qs + `<button class="ed-add" onclick="edAddQuestion()">＋ 문항 추가 (맨 끝에)</button>`;
}

function syncEditorFromDom(){
  if(!editorQuiz) return;
  const g=id=>document.getElementById(id);
  if(g('edTitle')) editorQuiz.title=g('edTitle').value;
  if(g('edSubtitle')) editorQuiz.subtitle=g('edSubtitle').value;
  if(g('edUnit')) editorQuiz.unit=g('edUnit').value;
  if(g('edUnitColor')) editorQuiz.unitColor=g('edUnitColor').value;
  if(g('edColor')) editorQuiz.color=g('edColor').value;
  document.querySelectorAll('#editorBox .ed-q').forEach(row=>{
    const i=+row.dataset.qi; const q=editorQuiz.questions[i]; if(!q) return;
    q.chapter=row.querySelector('.edChapter').value;
    q.q=row.querySelector('.edQ').value;
    q.options=[0,1,2,3].map(k=>row.querySelector('.edOpt'+k).value);
    const ck=row.querySelector('input[type=radio]:checked');
    q.answer=ck?+ck.value:0;
    q.explain=row.querySelector('.edExplain').value;
  });
}

function edAddQuestion(){ syncEditorFromDom(); editorQuiz.questions.push(blankQuestion()); renderEditor(); window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}); }
function edToggleHide(i){ syncEditorFromDom(); editorQuiz.questions[i].hidden=!editorQuiz.questions[i].hidden; renderEditor(); }

function newQuiz(){
  const id=(prompt('새 퀴즈 ID (저장 후 변경 불가).\n예: 3-3_진화_퀴즈')||'').trim();
  if(!id) return;
  if(allQuizzes[id]||allQuizMeta[id]){ alert('이미 있는 ID입니다. 위 드롭다운에서 선택해 편집하세요.'); return; }
  const title=(prompt('퀴즈 제목:','')||'').trim()||id;
  editorQuiz={id, unit:'', unitColor:'purple', color:'purple', title, subtitle:'', order:nextOrder(), questions:[]};
  editorQuiz.questions.push(blankQuestion());
  editorIsNew=true;
  currentQuizId=id;
  const sel=document.getElementById('quizSelect');
  if(![...sel.options].some(o=>o.value===id)){ const o=document.createElement('option'); o.value=id; o.textContent=title+' (새 퀴즈)'; sel.appendChild(o); }
  sel.disabled=false; sel.value=id;
  document.getElementById('backupBox').innerHTML='';
  renderEditor();
}

function validateEditor(){
  const m=editorQuiz;
  if(!m.title.trim()) return '제목을 입력하세요.';
  for(let i=0;i<m.questions.length;i++){ const q=m.questions[i]; if(q.hidden) continue;
    if(!String(q.q).trim()) return `문항 ${i+1}: 문제를 입력하세요. (안 쓸 문항이면 ‘숨기기’)`;
    for(let k=0;k<4;k++){ if(!String(q.options[k]||'').trim()) return `문항 ${i+1}: 보기 ${k+1}을(를) 입력하세요.`; }
    if(!(q.answer>=0&&q.answer<=3)) return `문항 ${i+1}: 정답을 선택하세요.`;
  }
  return null;
}

function buildDbObj(model){
  return {
    unit:model.unit||'', unitColor:model.unitColor||'blue', color:model.color||'blue',
    title:model.title||'', subtitle:model.subtitle||'',
    order:(typeof model.order==='number'?model.order:nextOrder()),
    questions: model.questions.map(q=>{
      const o={chapter:q.chapter||'', tagClass:q.tagClass||'purple', q:q.q||'', options:padOpts(q.options), answer:(typeof q.answer==='number'?q.answer:0), explain:q.explain||''};
      if(q.hidden) o.hidden=true;
      return o;
    }),
    updatedAt: firebase.database.ServerValue.TIMESTAMP
  };
}

function metaFromObj(obj){
  return {
    title:obj.title, subtitle:obj.subtitle||'',
    totalQuestions: obj.questions.filter(q=>!q.hidden).length,
    questions: obj.questions.map(q=>({chapter:q.chapter,q:q.q,options:q.options,answer:q.answer,hidden:!!q.hidden})),
    updatedAt: firebase.database.ServerValue.TIMESTAMP
  };
}

async function backupCurrent(id){
  try{
    const snap=await db.ref('quizzes/'+id).once('value');
    const cur=snap.val();
    if(cur) await db.ref('quizBackups/'+id).push({data:cur, at:new Date().toISOString()});
  }catch(e){ console.error('백업 실패(무시):', e); }
}

async function saveQuiz(){
  if(!editorQuiz){ alert('편집할 퀴즈가 없습니다.'); return; }
  syncEditorFromDom();
  const err=validateEditor();
  if(err){ alert('저장할 수 없습니다.\n\n'+err); return; }
  const id=editorQuiz.id;
  const activeN=editorQuiz.questions.filter(q=>!q.hidden).length;
  if(!confirm(`「${editorQuiz.title}」을(를) 저장할까요?\n\n출제되는 문항 ${activeN}개 · 학생 화면에 바로 반영됩니다.`)) return;
  document.getElementById('fullLoading').classList.add('show');
  try{
    await backupCurrent(id);
    const obj=buildDbObj(editorQuiz);
    await db.ref('quizzes/'+id).set(obj);
    await db.ref('quizMeta/'+id).update(metaFromObj(obj));
    allQuizzes[id]=obj;
    editorIsNew=false; delete editorQuiz._fromMeta;
    const metaSnap=await db.ref('quizMeta').once('value'); allQuizMeta=metaSnap.val()||{};
    renderQuizSelector(); document.getElementById('quizSelect').value=id;
    editorQuiz=buildModel(id); renderEditor();
    alert('저장 완료! 학생 화면에 반영되었습니다.');
  }catch(e){ console.error(e); alert('저장 실패: '+e.message); }
  finally{ document.getElementById('fullLoading').classList.remove('show'); }
}

/* ----- 백업 / 복원 ----- */
async function showBackups(){
  if(!currentQuizId){ alert('먼저 퀴즈를 선택하세요.'); return; }
  const box=document.getElementById('backupBox');
  box.innerHTML='<div class="backup-box">불러오는 중…</div>';
  try{
    const snap=await db.ref('quizBackups/'+currentQuizId).once('value');
    const obj=snap.val()||{};
    const list=Object.entries(obj).map(([k,v])=>({k,at:v.at,n:(v.data&&v.data.questions?toArray(v.data.questions).length:0)})).sort((a,b)=>(b.at||'').localeCompare(a.at||'')).slice(0,10);
    if(!list.length){ box.innerHTML='<div class="backup-box">저장할 때마다 직전 내용이 자동 백업됩니다. 아직 백업이 없어요.</div>'; return; }
    box.innerHTML='<div class="backup-box"><b style="font-size:13px;">백업에서 되돌리기</b> <span style="font-size:11px;color:#888;">(저장 직전 자동 백업, 최근 10개)</span>'+
      list.map(b=>`<div class="backup-row"><span>${fmtTime(b.at)} · ${b.n}문항</span><button class="btn btn-green btn-mini" onclick="restoreBackup('${b.k}')">이 시점으로 복원</button></div>`).join('')+
      '<div style="text-align:right;margin-top:8px;"><button class="btn btn-ghost btn-mini" onclick="document.getElementById(\'backupBox\').innerHTML=\'\'">닫기</button></div></div>';
  }catch(e){ box.innerHTML='<div class="backup-box">백업 로드 실패: '+escapeHtml(e.message)+'</div>'; }
}

async function restoreBackup(key){
  if(!confirm('이 시점의 문항으로 되돌릴까요?\n\n현재 내용도 복원 전에 한 번 더 백업됩니다.')) return;
  document.getElementById('fullLoading').classList.add('show');
  try{
    const snap=await db.ref('quizBackups/'+currentQuizId+'/'+key).once('value');
    const v=snap.val(); if(!v||!v.data){ alert('백업을 찾을 수 없습니다.'); return; }
    await backupCurrent(currentQuizId);
    await db.ref('quizzes/'+currentQuizId).set(v.data);
    const qs=toArray(v.data.questions);
    await db.ref('quizMeta/'+currentQuizId).update({title:v.data.title, subtitle:v.data.subtitle||'', totalQuestions:qs.filter(q=>!q.hidden).length, questions:qs.map(q=>({chapter:q.chapter,q:q.q,options:q.options,answer:q.answer,hidden:!!q.hidden})), updatedAt:firebase.database.ServerValue.TIMESTAMP});
    allQuizzes[currentQuizId]=v.data;
    document.getElementById('backupBox').innerHTML='';
    editorQuiz=buildModel(currentQuizId); renderEditor();
    alert('복원 완료! 학생 화면에 반영되었습니다.');
  }catch(e){ console.error(e); alert('복원 실패: '+e.message); }
  finally{ document.getElementById('fullLoading').classList.remove('show'); }
}

/* ----- 파일 다운로드 ----- */
function downloadBlob(content, filename, type){
  const blob=new Blob([content], {type:type+';charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ----- JSON 내보내기/가져오기 (전체 백업·복구) ----- */
function exportJSON(){
  if(!Object.keys(allQuizzes).length){ alert('내보낼 문항이 없습니다.'); return; }
  downloadBlob(JSON.stringify(allQuizzes,null,2), `퀴즈문항_전체_${new Date().toISOString().slice(0,10)}.json`, 'application/json');
}
async function importJSON(ev){
  const file=ev.target.files[0]; ev.target.value=''; if(!file) return;
  try{
    const obj=JSON.parse(await file.text());
    if(!obj||typeof obj!=='object'||Array.isArray(obj)) throw new Error('JSON 형식이 올바르지 않습니다.');
    const incoming={};
    Object.keys(obj).forEach(id=>{ const z=obj[id]||{}; const byIdx={};
      toArray(z.questions).forEach((q,i)=>{ byIdx[i]={chapter:q.chapter||'',tagClass:q.tagClass||'purple',q:q.q||'',options:padOpts(toArray(q.options)),answer:(typeof q.answer==='number'?q.answer:0),explain:q.explain||'',hidden:!!q.hidden}; });
      incoming[id]={unit:z.unit||'',unitColor:z.unitColor||'blue',color:z.color||'blue',title:z.title||id,subtitle:z.subtitle||'',order:z.order,byIdx};
    });
    await applyImportedQuizzes(incoming, 'JSON');
  }catch(e){ console.error(e); alert('JSON 가져오기 실패: '+e.message); }
}

/* ----- 엑셀 내보내기/가져오기 ----- */
function exportExcel(){
  if(!Object.keys(allQuizzes).length){ alert('내보낼 문항이 없습니다.'); return; }
  const rows=[['퀴즈ID','단원','unitColor','color','제목','부제','문항번호','분류(chapter)','tagClass','문제','보기1','보기2','보기3','보기4','정답(1~4)','해설','숨김(Y/N)']];
  Object.keys(allQuizzes).sort((a,b)=>{const oa=(typeof allQuizzes[a].order==='number'?allQuizzes[a].order:9999),ob=(typeof allQuizzes[b].order==='number'?allQuizzes[b].order:9999);return oa-ob||a.localeCompare(b);}).forEach(id=>{
    const z=allQuizzes[id]; const qs=toArray(z.questions);
    qs.forEach((q,i)=>{ const o=toArray(q.options);
      rows.push([id, z.unit||'', z.unitColor||'blue', z.color||'blue', z.title||'', z.subtitle||'', i+1, q.chapter||'', q.tagClass||'purple', q.q||'', o[0]||'',o[1]||'',o[2]||'',o[3]||'', (typeof q.answer==='number'?q.answer:0)+1, q.explain||'', q.hidden?'Y':'']);
    });
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:18},{wch:20},{wch:9},{wch:7},{wch:18},{wch:20},{wch:8},{wch:16},{wch:8},{wch:42},{wch:18},{wch:18},{wch:18},{wch:18},{wch:9},{wch:42},{wch:9}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'문항');
  XLSX.writeFile(wb, `퀴즈문항_전체_${new Date().toISOString().slice(0,10)}.xlsx`);
}
async function importExcel(ev){
  const file=ev.target.files[0]; ev.target.value=''; if(!file) return;
  try{
    const wb=XLSX.read(await file.arrayBuffer(), {type:'array'});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:''});
    const incoming={};
    for(let r=1;r<rows.length;r++){
      const row=rows[r]; const id=String(row[0]||'').trim(); if(!id) continue;
      if(!incoming[id]) incoming[id]={unit:String(row[1]||''),unitColor:String(row[2]||'blue')||'blue',color:String(row[3]||'blue')||'blue',title:String(row[4]||id),subtitle:String(row[5]||''),byIdx:{}};
      const qnum=parseInt(row[6],10); const idx=(qnum>0?qnum-1:Object.keys(incoming[id].byIdx).length);
      let ans=parseInt(row[14],10); ans=(ans>=1&&ans<=4)?ans-1:0;
      incoming[id].byIdx[idx]={chapter:String(row[7]||''),tagClass:String(row[8]||'purple')||'purple',q:String(row[9]||''),options:[String(row[10]||''),String(row[11]||''),String(row[12]||''),String(row[13]||'')],answer:ans,explain:String(row[15]||''),hidden:String(row[16]||'').trim().toUpperCase()==='Y'};
    }
    await applyImportedQuizzes(incoming, '엑셀');
  }catch(e){ console.error(e); alert('엑셀 가져오기 실패: '+e.message); }
}

function mergeQuestionsNoShrink(existing, byIdx){
  const out=existing.map(q=>({...q}));
  Object.keys(byIdx).forEach(k=>{ out[+k]=byIdx[k]; });
  for(let i=0;i<out.length;i++){ if(!out[i]) out[i]={chapter:'',tagClass:'purple',q:'(빈 문항)',options:['','','',''],answer:0,explain:'',hidden:true}; }
  return out;
}

async function applyImportedQuizzes(incoming, label){
  const ids=Object.keys(incoming); if(!ids.length){ alert('가져올 데이터가 없습니다.'); return; }
  const summary=ids.map(id=>{
    const ex=allQuizzes[id]?toArray(allQuizzes[id].questions).length:0;
    const maxIdx=Math.max(-1, ...Object.keys(incoming[id].byIdx).map(Number));
    return `· ${id}: ${ex} → ${Math.max(ex, maxIdx+1)}문항`;
  }).join('\n');
  if(!confirm(`${label}에서 ${ids.length}개 퀴즈를 가져옵니다.\n(삭제·축소 없음 — 기존 문항은 덮어쓰거나 그대로 유지)\n\n${summary}\n\n진행할까요? 적용 직전 자동 백업됩니다.`)) return;
  document.getElementById('fullLoading').classList.add('show');
  try{
    for(const id of ids){
      const inc=incoming[id];
      const existing = allQuizzes[id] ? toArray(allQuizzes[id].questions).map(q=>({chapter:q.chapter||'',tagClass:q.tagClass||'purple',q:q.q||'',options:padOpts(toArray(q.options)),answer:(typeof q.answer==='number'?q.answer:0),explain:q.explain||'',hidden:!!q.hidden})) : [];
      const merged=mergeQuestionsNoShrink(existing, inc.byIdx);
      const order=(typeof inc.order==='number')?inc.order:((allQuizzes[id]&&typeof allQuizzes[id].order==='number')?allQuizzes[id].order:nextOrder());
      const obj=buildDbObj({id,unit:inc.unit,unitColor:inc.unitColor,color:inc.color,title:inc.title,subtitle:inc.subtitle,order,questions:merged});
      await backupCurrent(id);
      await db.ref('quizzes/'+id).set(obj);
      await db.ref('quizMeta/'+id).update(metaFromObj(obj));
      allQuizzes[id]=obj;
    }
    const metaSnap=await db.ref('quizMeta').once('value'); allQuizMeta=metaSnap.val()||{};
    renderQuizSelector(); if(currentQuizId){ document.getElementById('quizSelect').value=currentQuizId; }
    editorIsNew=false; loadEditor();
    alert(`가져오기 완료! ${ids.length}개 퀴즈가 학생 화면에 반영되었습니다.`);
  }catch(e){ console.error(e); alert('가져오기 실패: '+e.message); }
  finally{ document.getElementById('fullLoading').classList.remove('show'); }
}

initFirebase();
</script>
