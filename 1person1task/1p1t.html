<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1인 1역 수행 기록 · 2학년 7반</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
/* ── 리셋 & 기본 ── */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --primary: #2a9d8f;
  --primary-light: #e8f5f3;
  --primary-mid: #c8e6e0;
  --accent: #f4a261;
  --bg: #f5faf9;
  --card: #ffffff;
  --text: #1a1a2e;
  --text-sub: #6b7280;
  --border: #d4ede9;
  --disabled: #e5e7eb;
  --disabled-text: #9ca3af;
  --danger: #e76f51;
  --radius: 14px;
  --radius-sm: 10px;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
}

/* ── 앱 래퍼 ── */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background: var(--card);
  box-shadow: 0 0 40px rgba(0,0,0,0.08);
  position: relative;
}

/* ── 화면 전환 ── */
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* ════════════════════════
   입장 화면
════════════════════════ */
#screen-entry {
  padding: 0 0 env(safe-area-inset-bottom, 16px);
}

.entry-header {
  background: var(--primary);
  color: white;
  padding: 36px 24px 28px;
  padding-top: calc(36px + env(safe-area-inset-top, 0px));
  text-align: center;
}
.entry-header .app-icon { font-size: 40px; margin-bottom: 8px; }
.entry-header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.entry-header p { font-size: 14px; opacity: 0.85; }

.entry-body {
  flex: 1;
  padding: 24px 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.entry-label {
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-sub);
}

/* 번호 그리드 */
.number-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.num-btn {
  aspect-ratio: 1;
  border: 2px solid var(--border);
  background: var(--card);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.08s;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 52px;
}
.num-btn:active { transform: scale(0.92); background: var(--primary-light); border-color: var(--primary); }

/* 담임 버튼 */
.teacher-btn-wrap {
  padding-top: 4px;
  border-top: 1px solid var(--border);
}
.teacher-btn {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-sub);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
  min-height: 48px;
}
.teacher-btn:active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

/* 오류 메시지 */
.entry-error {
  text-align: center;
  font-size: 14px;
  color: var(--danger);
  min-height: 20px;
}

/* ════════════════════════
   학생 기록 화면
════════════════════════ */
#screen-record {
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

/* 상단 바 */
.record-header {
  background: var(--primary);
  color: white;
  padding: 16px 16px 14px;
  padding-top: calc(16px + env(safe-area-inset-top, 0px));
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  flex-shrink: 0;
}
.record-header-info { flex: 1; }
.record-header-name {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.3;
}
.record-header-role {
  font-size: 13px;
  opacity: 0.85;
  margin-top: 2px;
}
.header-back-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 12px;
  cursor: pointer;
  flex-shrink: 0;
  min-height: 48px;
  min-width: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.header-back-btn:active { background: rgba(255,255,255,0.35); }

/* 역할 안내 접이식 */
.role-guide {
  background: var(--primary-light);
  border-bottom: 1px solid var(--primary-mid);
  flex-shrink: 0;
}
.role-guide-toggle {
  width: 100%;
  padding: 12px 16px;
  background: none;
  border: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  cursor: pointer;
  min-height: 44px;
}
.role-guide-toggle .arrow { transition: transform 0.2s; font-size: 11px; }
.role-guide-toggle.open .arrow { transform: rotate(180deg); }
.role-guide-body {
  display: none;
  padding: 0 16px 12px;
  font-size: 13px;
  color: #3d7a74;
  line-height: 1.7;
  white-space: pre-line;
}
.role-guide-body.open { display: block; }

/* 주차 네비게이션 */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.week-nav-btn {
  background: var(--primary-light);
  border: 1px solid var(--primary-mid);
  border-radius: 8px;
  color: var(--primary);
  font-size: 18px;
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.week-nav-btn:active { background: var(--primary-mid); }
.week-nav-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  line-height: 1.5;
}
.week-nav-sub {
  font-size: 11px;
  color: var(--text-sub);
  font-weight: 400;
}

/* 읽기 전용 배너 */
.readonly-banner {
  display: none;
  background: #fff3e0;
  color: #b45309;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  padding: 8px;
  flex-shrink: 0;
}
.readonly-banner.show { display: block; }

/* 요일 탭 */
.day-tabs {
  display: flex;
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
  background: var(--card);
}
.day-tab {
  flex: 1;
  padding: 10px 4px 8px;
  border: none;
  background: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: color 0.15s;
  min-height: 52px;
  position: relative;
}
.day-tab .tab-day { font-size: 14px; }
.day-tab .tab-date { font-size: 11px; color: var(--text-sub); }
.day-tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}
.day-tab.active .tab-date { color: var(--primary); }
.day-tab.today .tab-day::after {
  content: '';
  display: block;
  width: 5px;
  height: 5px;
  background: var(--accent);
  border-radius: 50%;
  position: absolute;
  top: 6px;
  right: calc(50% - 14px);
}
.day-tab.disabled {
  opacity: 0.4;
  cursor: default;
  pointer-events: none;
}
.day-tab .tab-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary);
  display: none;
}
.day-tab.has-record .tab-dot { display: block; }

/* 기록 입력 영역 */
.record-body {
  flex: 1;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
}

.record-date-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
}
.record-textarea {
  width: 100%;
  flex: 1;
  min-height: 180px;
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-size: 16px;
  font-family: inherit;
  color: var(--text);
  resize: none;
  line-height: 1.7;
  background: var(--card);
  transition: border-color 0.15s;
  -webkit-user-select: text;
  user-select: text;
}
.record-textarea:focus {
  outline: none;
  border-color: var(--primary);
}
.record-textarea:disabled {
  background: var(--disabled);
  color: var(--disabled-text);
  cursor: default;
}

/* 저장 버튼 (하단 고정) */
.record-footer {
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid var(--border);
  background: var(--card);
  flex-shrink: 0;
}
.save-btn {
  width: 100%;
  padding: 15px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.08s;
  min-height: 52px;
}
.save-btn:active { transform: scale(0.98); background: #228b7e; }
.save-btn:disabled {
  background: var(--disabled);
  color: var(--disabled-text);
  cursor: default;
}

/* ── 토스트 ── */
#toast {
  position: fixed;
  bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1a1a2e;
  color: white;
  padding: 10px 20px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 9999;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── 공통 모달 ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 500;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: slideUp 0.28s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.modal-handle {
  width: 36px;
  height: 4px;
  background: #d1d5db;
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
}
.modal-header {
  padding: 12px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
.modal-close {
  background: #f3f4f6;
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  font-size: 16px;
  cursor: pointer;
  color: var(--text-sub);
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-body {
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

/* ── 비밀번호 키패드 모달 ── */
.pw-display {
  font-size: 32px;
  letter-spacing: 14px;
  text-align: center;
  color: var(--primary);
  margin: 8px 0 20px;
  font-weight: 700;
  min-height: 44px;
}
.pw-keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.pw-key {
  padding: 16px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  color: var(--text);
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
}
.pw-key:active { background: var(--primary-light); border-color: var(--primary); }
.pw-error {
  color: var(--danger);
  font-size: 13px;
  text-align: center;
  margin-top: 10px;
  min-height: 20px;
}

/* ════════════════════════
   담임 화면
════════════════════════ */
#screen-teacher {
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.teacher-header {
  background: #264653;
  color: white;
  padding: 16px;
  padding-top: calc(16px + env(safe-area-inset-top, 0px));
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.teacher-header h2 { font-size: 17px; font-weight: 700; }
.teacher-header-sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }
.teacher-back-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 12px;
  cursor: pointer;
  min-height: 44px;
}

.teacher-week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--card);
}
.teacher-week-nav .week-nav-btn {
  background: #e8f0ee;
  border-color: #c5d9d5;
  color: #264653;
}
.unrecorded-badge {
  font-size: 12px;
  color: var(--danger);
  font-weight: 600;
  background: #fff0ee;
  border: 1px solid #fcd9d3;
  border-radius: 999px;
  padding: 3px 10px;
}

/* 전체 현황 표 */
.overview-scroll {
  flex: 1;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}
.overview-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 480px;
}
.overview-table th {
  background: #f0faf8;
  color: var(--primary);
  font-weight: 700;
  padding: 9px 6px;
  border-bottom: 2px solid var(--primary-mid);
  text-align: center;
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 1;
}
.overview-table th.col-name {
  text-align: left;
  padding-left: 12px;
  min-width: 100px;
  position: sticky;
  left: 0;
  z-index: 2;
  background: #e8f5f3;
}
.overview-table td {
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  vertical-align: middle;
  cursor: pointer;
}
.overview-table td.col-name {
  text-align: left;
  padding-left: 12px;
  background: var(--card);
  position: sticky;
  left: 0;
  z-index: 1;
  cursor: pointer;
}
.overview-table tr:last-child td { border-bottom: none; }
.overview-table tr:hover td { background: var(--primary-light); }
.overview-table tr:hover td.col-name { background: var(--primary-light); }

.td-name-main { font-weight: 600; font-size: 13px; }
.td-name-role { font-size: 11px; color: var(--text-sub); margin-top: 1px; }

.td-check {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.td-check-icon { color: var(--primary); font-size: 14px; font-weight: 700; }
.td-check-preview {
  font-size: 10px;
  color: var(--text-sub);
  max-width: 72px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.td-empty { color: #d1d5db; font-size: 18px; }

/* 기록 상세 모달 */
#record-detail-modal .modal-box { border-radius: 20px 20px 0 0; }
.detail-student-info {
  font-size: 13px;
  color: var(--text-sub);
  margin-bottom: 10px;
}
.detail-content {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 14px;
  min-height: 80px;
}
.detail-empty { color: var(--text-sub); font-style: italic; }

/* 학생 이력 모달 */
.student-history-week {
  margin-bottom: 16px;
}
.history-week-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--primary-mid);
}
.history-day-item {
  padding: 6px 10px;
  border-radius: 8px;
  margin-bottom: 5px;
  background: var(--bg);
}
.history-day-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 2px;
}
.history-day-content { font-size: 13px; color: var(--text); white-space: pre-wrap; }
.history-empty { color: var(--text-sub); font-size: 13px; text-align: center; padding: 20px; }

/* ── 담임 하단 툴바 ── */
.teacher-toolbar {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid var(--border);
  background: var(--card);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.toolbar-btn {
  flex: 1;
  min-width: calc(50% - 4px);
  padding: 11px 8px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  min-height: 44px;
  transition: background 0.12s;
}
.toolbar-btn.export-csv  { background: #eef4ff; color: #4a7fd4; border: 1px solid #c0d4f5; }
.toolbar-btn.export-json { background: #f0f9f0; color: #3a8a3a; border: 1px solid #b8ddb8; }
.toolbar-btn.import-json { background: #f5f0ff; color: #7c4dca; border: 1px solid #d0bff5; }
.toolbar-btn.edit-mode   { background: #fff8ec; color: #b45309; border: 1px solid #fcd49a; }
.toolbar-btn.edit-mode.active { background: #b45309; color: white; border-color: #b45309; }
.toolbar-btn.view-log    { background: #eef0ff; color: #4a4fc8; border: 1px solid #c5c8f0; }
.toolbar-btn.manage-pw   { background: #fdf0ff; color: #8b2fc8; border: 1px solid #ddbff5; }
.toolbar-btn:active { opacity: 0.8; }

/* ── 변경 로그 모달 ── */
.log-item {
  padding: 10px 12px;
  border-radius: 10px;
  background: var(--bg);
  margin-bottom: 8px;
  border-left: 3px solid var(--primary);
}
.log-item.log-delete { border-left-color: var(--danger); opacity: 0.65; }
.log-item-header {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 3px;
}
.log-time  { font-size: 11px; color: var(--text-sub); flex-shrink: 0; }
.log-name  { font-size: 13px; font-weight: 700; color: var(--text); }
.log-day   { font-size: 12px; color: var(--text-sub); margin-left: auto; flex-shrink: 0; }
.log-preview { font-size: 12px; color: var(--text-sub); line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
.log-actor-teacher {
  font-size: 10px; background: #264653; color: white;
  padding: 1px 6px; border-radius: 999px; flex-shrink: 0;
}
.log-ip {
  font-size: 10px; color: var(--text-sub); font-family: monospace;
  background: #f3f4f6; padding: 1px 5px; border-radius: 4px; flex-shrink: 0;
}
.log-empty { text-align: center; padding: 28px 0; color: var(--text-sub); font-size: 13px; }

/* ── 학생 비밀번호 모달 ── */
.spw-student-name {
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.spw-subtitle {
  text-align: center;
  font-size: 13px;
  color: var(--text-sub);
  margin-bottom: 16px;
  line-height: 1.6;
}

/* ── 담임 비밀번호 관리 ── */
.pw-reset-item {
  display: flex;
  align-items: center;

// 클라이언트 IP 캐시 (세션 내 1회 조회)
let clientIP = null;

async function fetchClientIP() {
  if (clientIP !== null) return clientIP;
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 3000);
    const res = await fetch('https://api.ipify.org?format=json', { signal: controller.signal });
    clearTimeout(timer);
    const data = await res.json();
    clientIP = data.ip || '';
  } catch {
    clientIP = '';
  }
  return clientIP;
}

// 변경 로그 기록 (실패해도 무시)
async function logChange(studentId, wk, dayKey, value, actor) {
  const ip = await fetchClientIP();
  const user = auth.currentUser;
  const actualActor = actor
    || (user?.email === TEACHER_EMAIL ? 'teacher' : 'student');
  db.ref('logs').push({
    studentId, wk, dayKey,
    value: value || '',
    timestamp: firebase.database.ServerValue.TIMESTAMP,
    actor: actualActor,
    ip: ip || ''
  }).catch(() => {});
}

// ══════════════════════════════════════
function getToday() {
  const d = new Date();
  return { y: d.getFullYear(), m: d.getMonth()+1, d: d.getDate(), dow: d.getDay() };
}

// ISO 주차 번호
function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
  const w1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d - w1) / 86400000 - 3 + (w1.getDay()+6)%7) / 7);
}

// 주차의 월요일 Date 반환
function getMondayOfWeek(year, week) {
  const jan4 = new Date(year, 0, 4);
  const jan4dow = (jan4.getDay()+6)%7;
  const monday = new Date(jan4);
  monday.setDate(jan4.getDate() - jan4dow + (week-1)*7);
  return monday;
}

// 현재 주차 기준 오프셋 → {year, week}
let weekOffset = 0;

function getCurrentWeekInfo() {
  const today = new Date();
  const baseWeek = getISOWeek(today);
  const baseYear = today.getFullYear();

  const monday = getMondayOfWeek(baseYear, baseWeek);
  monday.setDate(monday.getDate() + weekOffset * 7);

  const year = monday.getFullYear();
  const week = getISOWeek(monday);

  // 이번 주 월~금 날짜
  const dates = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d);
  }

  // 월차 계산 (해당 월의 몇 번째 주)
  const firstMonday = getMondayOfWeek(dates[0].getFullYear(), getISOWeek(dates[0]));
  const monthWeekNum = Math.ceil((dates[0].getDate() + (new Date(dates[0].getFullYear(), dates[0].getMonth(), 1).getDay()+6)%7) / 7);

  return { year, week, dates, monthWeekNum, month: dates[0].getMonth()+1 };
}

function isCurrentWeek() { return weekOffset === 0; }

function isFutureDate(date) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  return d > today;
}

function isTodayDate(date) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  return d.getTime() === today.getTime();
}

function formatDate(date) {
  return `${date.getMonth()+1}/${date.getDate()}`;
}

async function renderWeekView() {

  document.getElementById('readonly-banner').classList.toggle('show', readonly);
  document.getElementById('save-btn').disabled = readonly;

  const todayIdx = isCurrentWeek()
    ? info.dates.findIndex(d => isTodayDate(d))
    : -1;

  if (isCurrentWeek() && todayIdx >= 0) {
    activeDayIndex = todayIdx;
  } else if (!isCurrentWeek()) {
    activeDayIndex = 0;
  }

  // Firebase에서 이번 주 데이터 로드 (캐시)
  await loadWeekCache(currentStudent.id, info.year, info.week);

  renderDayTabs(info, todayIdx, readonly);

  unsaved = false;
}

function renderDayTabs(info, todayIdx, readonly) {
  const tabsEl = document.getElementById('day-tabs');
  tabsEl.innerHTML = '';

  info.dates.forEach((date, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab';
    const future = isFutureDate(date);
    const hasRecord = getCached(DAYS_KEY[i]) !== '';

    if (i === activeDayIndex) btn.classList.add('active');
    if (i === todayIdx) btn.classList.add('today');
    if (future) btn.classList.add('disabled');
    if (hasRecord) btn.classList.add('has-record');

    btn.innerHTML = `
      <span class="tab-day">${DAYS_KO[i]}</span>
      <span class="tab-date">${formatDate(date)}</span>
      <span class="tab-dot"></span>
    `;

    if (!future) {
      btn.addEventListener('click', () => switchDay(i, info, readonly));
    }
    tabsEl.appendChild(btn);
  });
}

function switchDay(idx, info, readonly) {
  activeDayIndex = idx;
  renderDayTabs(info, info.dates.findIndex(d => isTodayDate(d)), readonly);
  renderDayContent(info, readonly);
}

function renderDayContent(info, readonly) {
  const date = info.dates[activeDayIndex];
  const future = isFutureDate(date);
  const isReadonly = readonly || future;

  document.getElementById('record-date-label').textContent =
    `${info.year}. ${String(date.getMonth()+1).padStart(2,'0')}. ${String(date.getDate()).padStart(2,'0')} (${DAYS_KO[activeDayIndex]})`;

  const textarea = document.getElementById('record-textarea');
  textarea.value = getCached(DAYS_KEY[activeDayIndex]);

  textarea.placeholder = isReadonly
    ? (future ? '아직 기록할 수 없어요' : '지난 주차는 수정할 수 없습니다')

  newTA.addEventListener('input', () => { unsaved = true; });
}

function openStudentHistory(student) {

  const body = document.getElementById('history-modal-body');

  const studentData = rolesCache?.[student.id] || {};
  const wkKeys = Object.keys(studentData).sort().reverse(); // "2025_W16" 형태

  if (wkKeys.length === 0) {
    body.innerHTML = '<div class="history-empty">아직 기록이 없습니다.</div>';
  } else {

        const val = dayData[dk];

          <div class="history-day-label">${DAYS_KO[i]} ${formatDate(d)}</div>

      return `<div class="student-history-week">
        <div class="history-week-title">${yr}년 W${week} (${formatDate(monday)}~${formatDate(endFri)})</div>
        ${items || '<div style="font-size:12px;color:var(--text-sub);padding:4px 0">기록 없음</div>'}
      </div>`;
    }).join('');

let spwMode = 'enter';   // 'enter' | 'set-first' | 'set-confirm'
let spwBuffer = '';
let spwFirstPw = '';
let spwStudent = null;

function openStudentPwModal(mode, student) {
  spwStudent = student;
  spwBuffer = '';
  spwFirstPw = '';
  spwMode = mode === 'set' ? 'set-first' : 'enter';
  updateSpwUI();
  document.getElementById('spw-error').textContent = '';

}

function updateSpwUI() {
  document.getElementById('spw-display').textContent = '　';
  document.getElementById('spw-student-name').textContent =
    `${spwStudent.num}번 ${spwStudent.name}`;
  const subtitle = document.getElementById('spw-subtitle');
  const title = document.getElementById('spw-title');
  if (spwMode === 'enter') {
    title.textContent = '🔒 비밀번호 입력';
    subtitle.textContent = '비밀번호 4자리를 입력해주세요.';
  } else if (spwMode === 'set-first') {
    title.textContent = '🔑 비밀번호 설정';
    subtitle.textContent = '처음 입장이에요.\n사용할 비밀번호 4자리를 설정하세요.';
  } else {
    title.textContent = '🔑 비밀번호 확인';
    subtitle.textContent = '한 번 더 입력해주세요.';
  }
}

function spwInput(d) {
  if (spwBuffer.length >= 4) return;
  spwBuffer += d;
  document.getElementById('spw-display').textContent = '●'.repeat(spwBuffer.length);
  if (spwBuffer.length === 4) setTimeout(spwConfirm, 180);
}

function spwDelete() {
  spwBuffer = spwBuffer.slice(0, -1);
  const disp = document.getElementById('spw-display');
  disp.textContent = spwBuffer.length ? '●'.repeat(spwBuffer.length) : '　';
}

async function spwConfirm() {
  if (spwBuffer.length < 4) return;
  const errEl = document.getElementById('spw-error');

  if (spwMode === 'enter') {
    // Firebase Auth 로그인
    showLoading(true);
    try {
      await auth.signInWithEmailAndPassword(
        studentEmail(spwStudent), spwBuffer + '#s27'
      );
      document.getElementById('student-pw-modal').classList.remove('show');
      proceedAsStudent(spwStudent);
    } catch {
      errEl.textContent = '비밀번호가 틀렸습니다.';
      spwBuffer = '';
      document.getElementById('spw-display').textContent = '　';
    } finally {
      showLoading(false);
    }

  } else if (spwMode === 'set-first') {
    spwFirstPw = spwBuffer;
    spwBuffer = '';
    spwMode = 'set-confirm';
    updateSpwUI();
    errEl.textContent = '';

  } else { // set-confirm
    if (spwBuffer === spwFirstPw) {
      showLoading(true);
      try {
        // Firebase Auth 계정 생성
        const cred = await auth.createUserWithEmailAndPassword(
          studentEmail(spwStudent), spwBuffer + '#s27'
        );
        // UID를 DB에 저장 (write-once: 보안 규칙으로 보호)
        await db.ref(`studentMeta/${spwStudent.id}/uid`).set(cred.user.uid);
        document.getElementById('student-pw-modal').classList.remove('show');
        showToast('비밀번호가 설정됐어요 🔑');
        proceedAsStudent(spwStudent);
      } catch(e) {
        errEl.textContent = '저장 실패. 다시 시도해주세요.';
        spwBuffer = '';
        document.getElementById('spw-display').textContent = '　';
      } finally {
        showLoading(false);
      }
    } else {
      spwBuffer = '';
      spwFirstPw = '';
      spwMode = 'set-first';
      updateSpwUI();
      document.getElementById('spw-error').textContent = '비밀번호가 일치하지 않아요. 처음부터 다시 입력하세요.';
    }
  }
}

function openLogModal() {
  document.getElementById('log-modal').classList.add('show');
  const body = document.getElementById('log-modal-body');
  body.innerHTML = '<div class="log-empty">불러오는 중...</div>';

  if (logListener) db.ref('logs').off('value', logListener);

  logListener = db.ref('logs').limitToLast(100).on('value', (snap) => {
    const data = snap.val();
    if (!data) {
      body.innerHTML = '<div class="log-empty">아직 변경 기록이 없습니다.</div>';
      return;
    }
    const entries = Object.entries(data)
      .map(([k, v]) => ({ key: k, ...v }))
      .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

    body.innerHTML = entries.map(entry => {
      const student = STUDENTS.find(s => s.id === entry.studentId);
      if (!student) return '';
      const ts = entry.timestamp ? new Date(entry.timestamp) : null;
      const timeStr = ts ? formatLogTime(ts) : '';
      const dayIdx = DAYS_KEY.indexOf(entry.dayKey);
      const dayLabel = dayIdx >= 0 ? DAYS_KO[dayIdx] : entry.dayKey;
      const dateStr = getDateFromWkDay(entry.wk, entry.dayKey);
      const isDelete = !entry.value;
      const preview = isDelete
        ? '(내용 삭제됨)'
        : entry.value.replace(/\n/g, ' ').slice(0, 50) + (entry.value.length > 50 ? '…' : '');
      const actorBadge = entry.actor === 'teacher'
        ? '<span class="log-actor-teacher">담임</span>' : '';
      const ipBadge = entry.ip ? `<span class="log-ip">${entry.ip}</span>` : '';
      return `<div class="log-item${isDelete ? ' log-delete' : ''}">
        <div class="log-item-header">
          <span class="log-time">${timeStr}</span>
          <span class="log-name">${student.num} ${student.name}</span>
          ${actorBadge}
          <span class="log-day">${dateStr}(${dayLabel})</span>
        </div>
        ${ipBadge}
        <div class="log-preview">${preview}</div>
      </div>`;
    }).join('');
  });
}

function closeLogModal() {
  document.getElementById('log-modal').classList.remove('show');
  if (logListener) {
    db.ref('logs').off('value', logListener);
    logListener = null;
  }
}

function formatLogTime(date) {
  const now = new Date();
  const isToday = date.toDateString() === now.toDateString();
  const h = date.getHours();
  const m = String(date.getMinutes()).padStart(2, '0');
  const ampm = h < 12 ? '오전' : '오후';
  const h12 = h % 12 || 12;
  if (isToday) return `오늘 ${ampm} ${h12}:${m}`;
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  if (date.toDateString() === yesterday.toDateString()) return `어제 ${ampm} ${h12}:${m}`;
  return `${date.getMonth()+1}/${date.getDate()} ${ampm} ${h12}:${m}`;
}

function getDateFromWkDay(wk, dayKey) {
  if (!wk) return '';
  try {
    const [yr, wn] = wk.split('_');
    const week = parseInt(wn.replace('W', ''));
    const monday = getMondayOfWeek(parseInt(yr), week);
    const dayIdx = DAYS_KEY.indexOf(dayKey);
    const d = new Date(monday);
    d.setDate(monday.getDate() + Math.max(dayIdx, 0));
    return formatDate(d) + ' ';
  } catch { return ''; }
}

document.getElementById('t-import-file').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      const incoming = parsed.data || parsed;
      // incoming은 { studentId: { weekKey: { dayKey: value } } } 형태
      if (!Object.keys(incoming).length) { showToast('올바른 백업 파일이 아닙니다'); return; }
      if (!confirm('백업 데이터를 Firebase에 업로드합니다. 기존 데이터와 병합됩니다.')) return;
      showLoading(true);
      const writes = [];
      for (const [sid, weeks] of Object.entries(incoming)) {
        for (const [wk, days] of Object.entries(weeks)) {
          for (const [dk, val] of Object.entries(days)) {
            if (val) writes.push(db.ref(`roles/${sid}/${wk}/${dk}`).set(val));
          }
        }
      }
      await Promise.all(writes);
      showLoading(false);
      showToast(`업로드 완료 📂`);
    } catch (err) {
      showLoading(false);
      showToast('파일 읽기 오류');
    }
  };
  reader.readAsText(file, 'utf-8');
  e.target.value = '';
});

function studentEmail(student) {
  const rc = student._resetCount || 0;
  return `s${student.id}c${rc}@c27.local`;
}

async function enterAsStudent(student) {
  showLoading(true);
  try {
    const [uidSnap, rcSnap] = await Promise.all([
      db.ref(`studentMeta/${student.id}/uid`).once('value'),
      db.ref(`studentMeta/${student.id}/resetCount`).once('value'),
    ]);
    student._hasAccount  = uidSnap.val() !== null;
    student._resetCount  = rcSnap.val() || 0;
  } catch {
    student._hasAccount = false;
    student._resetCount = 0;
  } finally {
    showLoading(false);
  }

  if (!student._hasAccount) {
    openStudentPwModal('set', student);
  } else {
    openStudentPwModal('enter', student);
  }
}

  addRecentEntry(student.id);

// ══════════════════════════════════════
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const footer = document.querySelector('.record-footer');
    if (!footer) return;
    const gap = window.innerHeight - window.visualViewport.height;
    footer.style.paddingBottom = gap > 50
      ? `${gap}px`
      : `calc(12px + env(safe-area-inset-bottom, 0px))`;
  });
}
