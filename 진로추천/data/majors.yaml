      전국 10개 교육대학교(서울·경인·부산·대구·광주·춘천·공주·전주·진주·청주)는 대학 전체가
      초등교원 양성기관이라 일반 '단과대' 구분이 없음.
      종합대학 중에는 이화여대(사범대 초등교육과)·한국교원대(제1대학)·제주대(교육대학)에 초등교육과가 있음.
      졸업 시 초등 2급 정교사 자격, 국·공립 교사는 임용시험 합격 필요. 수도권(서울·경인) 입결이 가장 높음.
    source:
      - "전국 교육대학 목록 https://ko.wikipedia.org/wiki/대한민국의_교육대학"
      - "한국교원대 제1대학 초등교육과 https://www.knue.ac.kr/www/contents.do?key=745"
      - "이화여대 사범대학 초등교육과: 이화여대 입학처 모집단위에서 확인(사립 종합대 중 유일)"

