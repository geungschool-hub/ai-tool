    majors: [법학과, 법학부]
    universities:
      top:
        - { name: 동국대학교, college: 법과대학, major: 법학과 }
        - { name: 숙명여자대학교, college: 법과대학(여대), major: 법학부 }
      mid_high:
        - { name: 홍익대학교, college: 법과대학, major: 법학부 }
        - { name: 국민대학교, college: 법과대학, major: 법학부 }
      mid:
        - { name: 단국대학교, college: 법과대학, major: 법학과 }
        - { name: 숭실대학교, college: 법과대학, major: 법학과 }
        - { name: 조선대학교, college: 법사회대학, major: 법학과 }
    careers:
      - 법조인(변호사·판사·검사) — 로스쿨 진학 후
      - 법원·검찰 공무원, 행정·입법 공무원
      - 기업 법무팀·준법(컴플라이언스)
      - 경찰·세무·노무 등 자격·공직
    notes: >
      ⚠ 가장 중요한 점: 2009년 로스쿨(법학전문대학원) 도입으로 서울대·연세대·고려대·성균관대 등
      로스쿨 설치 25개 대학은 학부 법학과를 폐지함(2008년이 마지막 학부 신입생).
      따라서 위 목록은 '로스쿨이 없어 학부 법학과를 유지하는 대학'들임.
      변호사·판사·검사가 되려면 어느 학부를 나오든 졸업 후 로스쿨(3년) 진학이 일반 경로 —
      반드시 학부 법학과가 아니어도 됨. 별도로 경찰대학 법학과는 전액 국비·졸업 후 경찰 간부 임용(특수목적·최상위).
    source:
      - "동국대 법과대학 법학과 https://law.dongguk.edu/main"
      - "숙명여대 법학부 https://www.sookmyung.ac.kr/kr/university-graduate/law.do"
      - "숭실대 법과대학 법학과 https://law.ssu.ac.kr/"
      - "조선대 법사회대학 법학과 https://lawdep.chosun.ac.kr/"
